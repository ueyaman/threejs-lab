<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 - Emergent Portrait | Three.js Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #b9a98c; --border: #2a2722; }
    html, body { height: 100%; }
    /* tall scroll area drives the 2D->3D reveal */
    body { background: #060605; color: #e8e3d8; font-family: "SF Mono", "Cascadia Code", Consolas, monospace; }
    #stage { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; }
    #scroller { position: relative; z-index: 1; height: 360vh; pointer-events: none; }

    #back {
      position: fixed; top: 1rem; left: 1rem; z-index: 10;
      color: var(--accent); font-size: 0.85rem; text-decoration: none;
      background: rgba(0,0,0,0.5); padding: 0.3rem 0.6rem;
      border-radius: 4px; border: 1px solid var(--border); pointer-events: auto;
    }
    #back:hover { border-color: var(--accent); }

    /* scroll-pinned captions */
    .caption {
      position: fixed; left: 1.5rem; bottom: 2.2rem; z-index: 9; max-width: 26ch;
      font-size: 0.82rem; line-height: 1.7; color: #b9b3a6;
      opacity: 0; transition: opacity 0.6s; pointer-events: none;
      text-shadow: 0 1px 8px #000;
    }
    .caption.show { opacity: 1; }
    .caption b { color: var(--accent); font-weight: 600; }

    #hint {
      position: fixed; left: 50%; bottom: 1.1rem; transform: translateX(-50%); z-index: 9;
      font-size: 0.72rem; color: #6f6a5e; letter-spacing: 0.08em;
      animation: pulse 2.4s ease-in-out infinite; pointer-events: none;
    }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.85} }

    #title {
      position: fixed; top: 1rem; right: 1.2rem; z-index: 9; text-align: right;
      pointer-events: none;
    }
    #title .ja { font-size: 0.95rem; color: #d8d2c4; letter-spacing: 0.18em; }
    #title .en { font-size: 0.66rem; color: #6f6a5e; letter-spacing: 0.24em; text-transform: uppercase; margin-top: 0.2rem; }

    #loading {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center; background: #060605;
      color: #6f6a5e; font-size: 0.85rem; transition: opacity .6s; letter-spacing: 0.1em;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <a id="back" href="index.html">← 一覧へ</a>
  <div id="stage"></div>
  <div id="scroller"></div>

  <div id="title">
    <div class="ja">浮上する肖像</div>
    <div class="en">Emergent Portrait</div>
  </div>

  <div class="caption" id="cap1"><b>一枚の写真。</b><br>薄暗がりに、誰かがいる。</div>
  <div class="caption" id="cap2"><b>解釈されはじめる。</b><br>輪郭が、立体として浮かぶ。</div>
  <div class="caption" id="cap3"><b>そこに在るもの。</b><br>写真は、像になった。</div>

  <div id="hint">SCROLL ↓ &nbsp;/&nbsp; MOVE MOUSE</div>
  <div id="loading">loading…</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // ---------- config ----------
    const BACKDROP = 'assets/04-backdrop.webp';    // 2D plate (the woman in a dim room)
    const MODEL    = 'assets/04-portrait.glb';     // Tripo3D bust of the same woman
    const MAX_ROT  = 10 * Math.PI / 180;           // model rotation clamp (±10°) — hide AI-3D flaws

    // ---------- scene ----------
    const stage = document.getElementById('stage');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060605);
    scene.fog = new THREE.Fog(0x060605, 6, 14);

    const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    stage.appendChild(renderer.domElement);

    // ---------- lights ----------
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const keyLight = new THREE.PointLight(0xfff4e2, 22, 40, 2); // mouse-following
    keyLight.position.set(2, 2.5, 3);
    scene.add(keyLight);
    const rim = new THREE.DirectionalLight(0x8899bb, 0.6);
    rim.position.set(-2, 1, -3);
    scene.add(rim);
    const fill = new THREE.DirectionalLight(0x99a0c0, 0.25);
    fill.position.set(-3, -1, 2);
    scene.add(fill);

    // ---------- backdrop plane (2D photo) ----------
    let backdrop = null, backdropMat = null;
    const texLoader = new THREE.TextureLoader();
    function frameBackdropAspect(tex) {
      // size the backdrop plane to cover the viewport at its z, keeping image aspect
      const imgAspect = tex.image.width / tex.image.height;
      const dist = camera.position.z - BACKDROP_Z;
      const vH = 2 * Math.tan((camera.fov * Math.PI / 180) / 2) * dist;
      const vW = vH * camera.aspect;
      // cover: scale so the plane fills the larger viewport dimension
      let h = vH, w = vH * imgAspect;
      if (w < vW) { w = vW; h = vW / imgAspect; }
      backdrop.scale.set(w, h, 1);
    }
    const BACKDROP_Z = -2.2;
    texLoader.load(BACKDROP, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      backdropMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 1, depthWrite: false });
      backdrop = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), backdropMat);
      backdrop.position.z = BACKDROP_Z;
      scene.add(backdrop);
      frameBackdropAspect(tex);
      maybeReady();
    }, undefined, () => { backdropReady = true; maybeReady(); });

    // ---------- 3D model (Tripo bust) ----------
    let model = null, modelGroup = new THREE.Group();
    scene.add(modelGroup);
    let modelMats = [];        // materials we fade
    let edgeLines = null;      // contour overlay shown mid-transition

    const gltfLoader = new GLTFLoader();
    // GLB is Draco-compressed (14.7MB -> 1.75MB). Decoder version must match the importmap three version.
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/gltf/');
    gltfLoader.setDRACOLoader(dracoLoader);
    let backdropReady = false, modelReady = false;
    function maybeReady() {
      if ((backdrop || backdropReady) && (model || modelReady)) hideLoading();
    }

    gltfLoader.load(MODEL, gltf => {
      model = gltf.scene;
      // Normalize: Tripo bust is ~1 unit tall, centered. Scale up & frame the face.
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3(); box.getSize(size);
      const center = new THREE.Vector3(); box.getCenter(center);
      const targetH = 3.0;
      const s = targetH / size.y;
      model.scale.setScalar(s);
      model.position.sub(center.multiplyScalar(s));
      model.position.y -= 0.15; // nudge so the face sits a touch above center
      // Tripo exports this bust facing −X; rotate +270° about Y so the face looks
      // at the camera (+Z). Verified by sweeping yaw and finding the front at 270°.
      model.rotation.y = Math.PI * 1.5;

      // Lean the bust toward plaster: keep texture but kill the metallic look,
      // soften roughness. (Tripo exports metallic=1/rough=1 PBR.)
      model.traverse(o => {
        if (o.isMesh && o.material) {
          const m = o.material;
          m.metalness = 0.0;
          m.roughness = 0.92;
          m.transparent = true;
          m.opacity = 0;            // starts invisible, fades in on scroll
          m.depthWrite = false;
          modelMats.push(m);
          // contour overlay from this mesh's geometry
          if (!edgeLines) {
            const eg = new THREE.EdgesGeometry(o.geometry, 24);
            edgeLines = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({
              color: 0xb9a98c, transparent: true, opacity: 0
            }));
          }
        }
      });
      modelGroup.add(model);
      // edges were built from the raw geometry, which faces −X like the model —
      // copy rotation too or the contour renders the side profile.
      if (edgeLines) { edgeLines.scale.copy(model.scale); edgeLines.position.copy(model.position); edgeLines.rotation.copy(model.rotation); modelGroup.add(edgeLines); }
      modelReady = true;
      maybeReady();
      dracoLoader.dispose(); // single decode — free the WASM worker
    }, undefined, e => { console.warn('GLB load failed', e); modelReady = true; maybeReady(); dracoLoader.dispose(); });

    // ---------- pointer parallax ----------
    const mouse = new THREE.Vector2(0, 0);
    const mTarget = new THREE.Vector2(0, 0);
    window.addEventListener('pointermove', e => {
      mTarget.x = (e.clientX / innerWidth) * 2 - 1;
      mTarget.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    // ---------- scroll progress ----------
    let scroll = 0; // 0..1
    function onScroll() {
      const max = document.body.scrollHeight - innerHeight;
      scroll = max > 0 ? Math.min(1, Math.max(0, scrollY / max)) : 0;
    }
    window.addEventListener('scroll', onScroll, { passive: true });

    // smoothstep helper
    const smooth = (a, b, x) => { const t = Math.min(1, Math.max(0, (x - a) / (b - a))); return t * t * (3 - 2 * t); };

    // ---------- captions ----------
    const cap1 = document.getElementById('cap1'), cap2 = document.getElementById('cap2'), cap3 = document.getElementById('cap3');
    const hint = document.getElementById('hint');

    // ---------- resize ----------
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      if (backdrop && backdropMat && backdropMat.map) frameBackdropAspect(backdropMat.map);
    });

    // ---------- loading ----------
    const loadingEl = document.getElementById('loading');
    let loadingHidden = false;
    function hideLoading() { if (!loadingHidden) { loadingHidden = true; loadingEl.classList.add('hide'); } }
    setTimeout(hideLoading, 8000);

    // ---------- loop ----------
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      // ease pointer
      mouse.x += (mTarget.x - mouse.x) * 0.06;
      mouse.y += (mTarget.y - mouse.y) * 0.06;

      // mouse-following key light (grazes the bust to reveal form)
      keyLight.position.x += (mouse.x * 3.5 - keyLight.position.x) * 0.05;
      keyLight.position.y += (mouse.y * 3.0 + 1.0 - keyLight.position.y) * 0.05;
      keyLight.position.z = 3.0;

      // camera parallax (subtle — Q: "気づくと動いている" 程度)
      camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.05;
      camera.position.y += (mouse.y * 0.35 - camera.position.y) * 0.05;
      camera.lookAt(0, 0, 0);

      // ----- scroll-driven 2D -> 3D reveal -----
      // phase A (0.0-0.45): backdrop fades/sinks, model fades in faintly, edges peak
      // phase B (0.45-1.0): model becomes solid and comes forward, edges fade out
      const fadeOut = smooth(0.1, 0.7, scroll);      // backdrop opacity 1->~0.35
      if (backdropMat) backdropMat.opacity = 1 - 0.65 * fadeOut;
      if (backdrop) backdrop.position.z = BACKDROP_Z - 2.0 * smooth(0.1, 0.9, scroll); // sink away

      const modelIn = smooth(0.12, 0.6, scroll);     // model opacity 0->1
      // depthWrite only once fully opaque: off during the transparent fade, but a solid
      // 500k-tri bust needs real self-occlusion (triangle order is not back-to-front).
      for (const m of modelMats) { m.opacity = modelIn; m.depthWrite = modelIn > 0.99; }
      modelGroup.position.z = -1.2 + 1.6 * smooth(0.2, 1.0, scroll); // come forward

      // contour overlay: peaks around the mid transition then fades
      if (edgeLines) {
        const e = smooth(0.12, 0.4, scroll) * (1 - smooth(0.5, 0.75, scroll));
        edgeLines.material.opacity = 0.5 * e;
      }

      // model micro-rotation: mouse + scroll, clamped to ±MAX_ROT
      const ry = Math.max(-MAX_ROT, Math.min(MAX_ROT, mouse.x * MAX_ROT * 1.2));
      const rx = Math.max(-MAX_ROT * 0.6, Math.min(MAX_ROT * 0.6, -mouse.y * MAX_ROT * 0.6));
      modelGroup.rotation.y += (ry - modelGroup.rotation.y) * 0.06;
      modelGroup.rotation.x += (rx - modelGroup.rotation.x) * 0.06;

      // captions by scroll band
      cap1.classList.toggle('show', scroll < 0.22);
      cap2.classList.toggle('show', scroll >= 0.35 && scroll < 0.62);
      cap3.classList.toggle('show', scroll >= 0.78);
      hint.style.display = scroll > 0.05 ? 'none' : '';

      renderer.render(scene, camera);
    }
    animate();
    onScroll();
  </script>
</body>
</html>
