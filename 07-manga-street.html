  /* --- メイン道路(坂の街は buildHillside がテラス道路を作るのでスキップ) --- */
  if (!isHillside) {
    box(S, 0, 0.005, 0, roadW, 0.03, L + 30, cAsphalt);
    for (const s of [1, -1]) {
      box(S, s * (roadW / 2 + 0.25), 0.006, 0, 0.5, 0.028, L + 30, cGutter);
    }
    for (const s of [1, -1]) {
      for (const [a, b] of segmentsAvoiding(-L / 2 - 10, L / 2 + 10, bands, 0.4)) {
        box(S, s * (roadW / 2 + 0.575), 0.075, (a + b) / 2, 0.15, 0.15, b - a, cCurb);
      }
    }
    if (isArt) {
      for (const s of [1, -1]) {
        for (const [a, b] of segmentsAvoiding(-L / 2 - 10, L / 2 + 10, bands, 0.4)) {
          box(S, s * (roadW / 2 + 0.65 + sidewalkW / 2), 0.04, (a + b) / 2, sidewalkW, 0.08, b - a, cSidewalk);
        }
      }
      for (const [a, b] of segmentsAvoiding(-L / 2, L / 2, bands, 1)) {
        for (let cz = a + 2; cz + 5 < b - 2; cz += 8) {
          box(S, 0, 0.022, cz + 2.5, 0.15, 0.006, 5, 0xf5f5f0);
        }
      }
    }
  }

  /* --- 側道(海辺では陸側にのみ伸ばす) --- */
  const srCx = layout.isSeaside ? (-46 + roadW / 2) / 2 : 0;
  const srW = layout.isSeaside ? 46 + roadW / 2 : 90;
  for (const sr of sideRoads) {
    box(S, srCx, 0.004, sr.z, srW, 0.026, sr.w, cAsphalt);
    for (const s of [1, -1]) {
      box(S, srCx, 0.005, sr.z + s * (sr.w / 2 + 0.2), srW, 0.024, 0.4, cGutter);
    }
  }

  /* --- 踏切(非電化単線: バラスト・レール・枕木・踏切道) --- */
  if (railway) {
    const rz = railway.z;
    box(S, 0, 0.01, rz, 220, 0.05, 5.2, 0x8e8a82);                    // バラスト
    for (let tx = -110; tx < 110; tx += 0.62) {                        // 枕木
      if (Math.abs(tx) < roadW / 2 + 1.4) continue;                    // 踏切道部は舗装
      box(S, tx + 0.2, 0.045, rz, 0.24, 0.05, 2.3, 0x5a5048);
    }
    for (const dz of [-0.72, 0.72]) {                                  // レール 2 条
      box(S, 0, 0.1, rz + dz, 220, 0.1, 0.09, 0x86888c);
    }
    box(S, 0, 0.028, rz, roadW + 2.6, 0.056, 4.6, 0x9a968e);           // 踏切道(舗装板)
    for (const dz of [-0.72, 0.72]) {                                  // 踏切道のレール溝再現(上に細レール)
      box(S, 0, 0.075, rz + dz, roadW + 2.6, 0.05, 0.09, 0x7e8084);
    }
  }

  /* --- 駅(#9: ホーム・駅舎・跨線橋・ロータリー。station のみ) --- */
  if (layout.station) buildStation(layout, S, G, W, SIGN, D, GLOW);

  /* --- 海外様式の街路家具(#11) --- */
  if (layout.isEuro) buildEuroStreet(layout, S, D, GLOW);   // 石畳の目地+ガス灯
  if (layout.isSub)  buildSuburbStreet(layout, S, seed);    // 消火栓
  if (layout.isKow)  buildKowloonStreet(layout, S, D, GLOW);// 屋台+街灯

  /* --- 区画(坂の街は groundY だけ持ち上げて段に載せる) --- */
  for (const plot of plots) {
    placePlot(plot, layout, S, G, W, SIGN, PADDY);
  }

  /* --- 路面標示(停止線・横断歩道・ダイヤ)+「止まれ」 --- */
  const rngM = mulberry32(hash2(seed, 555));
  for (const sr of sideRoads) {
    for (const s of (layout.isSeaside ? [-1] : [1, -1])) {   // 停止線(側道側。海辺は陸側のみ)
      box(S, s * (roadW / 2 + 1.3), 0.02, sr.z + 1.1, 0.45, 0.008, 2.6, 0xeeeeea);
      if (PARAMS.signs && !isOverseas) {   // 「止まれ」は日本の路面標示なので海外では出さない
        signPlane(SIGN, 'tomare', s * (roadW / 2 + 2.9), 0.025, sr.z + 1.1, 0.85, 2.3, s > 0 ? Math.PI / 2 : -Math.PI / 2, -Math.PI / 2);
      }
    }
  }
  if (sideRoads.length) {        // 横断歩道は最初の交差点に
    const cw = sideRoads[0];
    const cwZ = cw.z - cw.w / 2 - 1.5;
    for (let i = 0; i < Math.floor(roadW / 0.9); i++) {
      box(S, -roadW / 2 + 0.65 + i * 0.9, 0.02, cwZ, 0.5, 0.008, 2.2, 0xeeeeea);
    }
    // ダイヤマーク(手前)
    for (const dz of [14, 24]) {
      box(S, 0, 0.02, cwZ + dz, 0.5, 0.008, 1.5, 0xeeeeea, Math.PI / 4);
    }
  }

  /* --- カーブミラー(交差点角。海辺は陸側) --- */
  for (const sr of sideRoads) {
    const ms = layout.isSeaside ? -1 : 1;
    const mx = ms * (roadW / 2 + 0.7), mz = sr.z + sr.w / 2 + 0.7;
    cyl(S, mx, 1.3, mz, 0.045, 2.6, 0x8a8e92);
    cylX(S, mx, 2.35, mz, 0.38, 0.07, 0xe8862a, ms * Math.PI / 4);                        // 橙枠
    cylX(S, mx + ms * 0.028, 2.35, mz - 0.028, 0.31, 0.035, 0xcfd8de, ms * Math.PI / 4);  // 鏡面
  }

  /* --- 自販機(電柱の隣にたまに) --- */
  for (const p of poles) {
    if (rngM() > 0.28) continue;
    const vd = p.dir ?? -1;
    const gy = p.y || 0;
    const vx = p.x - vd * 0.85, vz = p.z + 1.3;   // 電柱の奥(道路と反対)側
    const bodyC = rngM() < 0.5 ? 0xd8dcde : 0xb43c3c;
    box(S, vx, 0.92 + gy, vz, 0.72, 1.84, 1.05, bodyC);
    box(G, vx + vd * 0.38, 1.15 + gy, vz, 0.05, 1.05, 0.85, 0xd8e4ea);   // 前面パネル(道路向き)
    W.push({ gi: G.length - 1, kind: 'vend' });                  // 夜は常時点灯
    decal(D, vx + vd * 1.0, 0.045 + gy, vz, 2.4, 0xbfe0f0);
    GLOW.pos.push(vx + vd * 0.42, 1.2 + gy, vz);
    GLOW.col.push(0.7, 0.88, 1);
  }

  /* --- ゴミ集積ネット(側道角にたまに) --- */
  for (const sr of sideRoads) {
    if (rngM() > 0.5) continue;
    box(S, -(roadW / 2 + 1.1), 0.26, sr.z + sr.w / 2 + 1.6, 1.0, 0.5, 1.5, 0x5e6e60);
  }

  /* --- 火の見櫓(田舎に 1 基。帯を避けられなければ建てない) --- */
  let towerOk = false, towerZ = 0;
  if (PARAMS.location === 'rural') {
    const rngR = mulberry32(hash2(seed, 2222));
    for (let tryI = 0; tryI < 8 && !towerOk; tryI++) {
      towerZ = -L / 2 + rr(rngR, 40, 165);
      towerOk = !sideRoads.some(sr => Math.abs(towerZ - sr.z) < 6) && !(railway && Math.abs(towerZ - railway.z) < 8);
    }
  }
  if (towerOk) {
    const fz = towerZ;
    const fx = -(roadW / 2 + 2.6);
    for (const dx of [-0.55, 0.55]) for (const dz of [-0.55, 0.55]) {
      box(S, fx + dx, 3.4, fz + dz, 0.1, 6.8, 0.1, 0xc0483a);       // 4 隅柱
    }
    for (const hy of [1.8, 3.8, 5.8]) {                              // 梁 3 段
      box(S, fx, hy, fz - 0.55, 1.25, 0.08, 0.08, 0xc0483a);
      box(S, fx, hy, fz + 0.55, 1.25, 0.08, 0.08, 0xc0483a);
      box(S, fx - 0.55, hy, fz, 0.08, 0.08, 1.25, 0xc0483a);
      box(S, fx + 0.55, hy, fz, 0.08, 0.08, 1.25, 0xc0483a);
    }
    box(S, fx, 6.9, fz, 1.55, 0.09, 1.55, 0xb8b4ac);                 // 見張り床
    for (const s2 of [1, -1]) {
      box(S, fx + s2 * 0.72, 7.3, fz, 0.05, 0.7, 1.5, 0x8e8a82);     // 手すり
      box(S, fx, 7.3, fz + s2 * 0.72, 1.5, 0.7, 0.05, 0x8e8a82);
    }
    hipRoof(S, fx, 7.85, fz, 1.9, 1.9, 0.6, 0x84403a);               // 小屋根
    cyl(S, fx, 7.35, fz, 0.15, 0.34, 0x8a7752);                      // 半鐘
  }

  /* --- 街路樹(桜・紅葉の季節のみ。独立 rng で他要素を動かさない) --- */
  if (PARAMS.season === 'sakura' || PARAMS.season === 'autumn') {
    const rngT = mulberry32(hash2(seed, 333));
    const leafC = seasonLeaf();
    const trunkC = PARAMS.season === 'sakura' ? 0x6e5648 : 0x6a5a48;
    for (let tz = -L / 2 + 12; tz < L / 2 - 8; tz += 21) {
      for (const s of (layout.isSeaside ? [-1] : [1, -1])) {
        const oz = tz + (s > 0 ? 10 : 0);
        if (railway && Math.abs(oz - railway.z) < 7) continue;
        if (sideRoads.some(sr => Math.abs(oz - sr.z) < sr.w / 2 + 2.5)) continue;
        if (s === layout.poleSide && poles.some(p => Math.abs(p.z - oz) < 2.4)) continue;
        const tx = s * (roadW / 2 + 1.05);
        const th2 = rr(rngT, 2.4, 3.2);
        const gy = hy(oz);
        cyl(S, tx, th2 * 0.5 + gy, oz, 0.11, th2, trunkC);
        blob(S, tx, th2 + 0.9 + gy, oz, rr(rngT, 2.2, 2.9), pick(rngT, leafC));
        blob(S, tx + 0.7, th2 + 0.4 + gy, oz + 0.5, rr(rngT, 1.4, 1.9), pick(rngT, leafC));
        blob(S, tx - 0.6, th2 + 0.5 + gy, oz - 0.4, rr(rngT, 1.3, 1.8), pick(rngT, leafC));
      }
    }
  }

  /* --- 吊りバナー街灯(商店街のみ・夜は球灯が光る) --- */
  if (PARAMS.location === 'shotengai') {
    const BANNER_C = [0xc4574a, 0x3e6a58, 0x4a5a8a];
    let bi = 0;
    for (let bz = -L / 2 + 10; bz < L / 2 - 8; bz += 17) {
      for (const s of [1, -1]) {
        const oz = bz + (s > 0 ? 0 : 8.5);               // 左右で互い違い(回避判定は実位置で)
        if (railway && Math.abs(oz - railway.z) < 7) continue;
        if (sideRoads.some(sr => Math.abs(oz - sr.z) < sr.w / 2 + 1.5)) continue;
        if (s > 0 && poles.some(p => Math.abs(p.z - oz) < 2.2)) continue;   // 電柱(+x 側)と重ねない
        const bx = s * (roadW / 2 + 0.95);
        cyl(S, bx, 2.55, oz, 0.055, 5.1, 0x707880);      // 柱
        cyl(S, bx, 5.25, oz, 0.16, 0.3, 0xe8e4da);       // 球灯
        box(S, bx, 4.35, oz, 0.05, 1.45, 0.5, BANNER_C[bi++ % 3]);   // バナー旗
        box(S, bx, 5.06, oz, 0.06, 0.05, 0.56, 0x707880);            // 旗バー
        decal(D, bx - s * 0.2, 0.042, oz, 3.6, 0xffe4b0);
        GLOW.pos.push(bx, 5.25, oz);
        GLOW.col.push(1, 0.9, 0.68);
      }
    }
  }

  /* --- 電柱+電線+防犯灯 --- */
  if (poles.length) {
    let adI = 0;
    for (const p of poles) {
      const dir = p.dir ?? -1;   // 道路向き(海辺では電柱が陸側に建つ)
      const gy = p.y || 0;       // 坂の街: 電柱の建つ段の高さ
      const poleC = PARAMS.location === 'rural' ? 0x8a7460 : 0xb4b2ac;   // 田舎は木製電柱
      cyl(S, p.x, 5.0 + gy, p.z, 0.13, 10.0, poleC);               // 柱
      // 巻き看板(たまに)
      if (PARAMS.signs && rngM() < 0.3) {
        const key = adI++ % 2 ? 'pole1' : 'pole2';
        box(S, p.x + dir * 0.16, 2.6 + gy, p.z, 0.07, 1.5, 0.4, 0xe8e6de);
        signPlane(SIGN, key, p.x + dir * 0.21, 2.6 + gy, p.z, 0.36, 1.44, dir * Math.PI / 2);
      }
      box(S, p.x, 9.3 + gy, p.z, 1.7, 0.09, 0.09, 0x9a988f);       // 腕金(道路直交)
      for (const ax of [-0.7, 0, 0.7]) {                            // 碍子
        cyl(S, p.x + ax, 9.42 + gy, p.z, 0.05, 0.16, 0xe8e6e0);
      }
      if (rngM() < 0.4) cyl(S, p.x - dir * 0.28, 8.35 + gy, p.z, 0.33, 1.0, 0x8e8c84);  // 変圧器(道路の反対側)
      // 黄黒の注意テープ(根元)
      for (let i = 0; i < 3; i++) {
        cyl(S, p.x, 0.65 + i * 0.42 + gy, p.z, 0.135, 0.21, i % 2 ? 0x2e2e30 : 0xd8b32e);
      }
      // 防犯灯(道路側アーム)+夜のプール・グロー
      box(S, p.x + dir * 0.5, 5.42 + gy, p.z, 1.0, 0.05, 0.06, 0x8a8e92);
      box(S, p.x + dir * 0.95, 5.33 + gy, p.z, 0.44, 0.13, 0.17, 0xd8dce0);
      decal(D, p.x + dir * 0.95, 0.04 + gy, p.z, 5.5, 0xffdda0);
      GLOW.pos.push(p.x + dir * 0.95, 5.26 + gy, p.z);
      GLOW.col.push(1, 0.85, 0.55);
    }
    if (PARAMS.wires) {
      const wireC = 0x2e2e32;
      for (let i = 0; i < poles.length - 1; i++) {
        const a = poles[i], b = poles[i + 1];
        const ga = a.y || 0, gb = b.y || 0;   // 坂: 電柱ごとに段が違うので端点を各段の高さに合わせる
        const sag = Math.abs(b.z - a.z) / 55;
        for (const [dx, wy] of [[-0.7, 9.42], [0.7, 9.42], [0, 9.95]]) {
          wire(S, a.x + dx, wy + ga, a.z, b.x + dx, wy + gb, b.z, sag, 0.035, wireC);
        }
        // 中層の通信線
        wire(S, a.x, 7.6 + ga, a.z, b.x, 7.6 + gb, b.z, sag * 1.3, 0.045, 0x3a3a3e);
      }
      // 引込線(電柱 → 同側 row0 の最寄りの家の軒)
      for (const p of poles) {
        let best = null, bd2 = 1e9;
        for (const pl of plots) {
          if (pl.row !== 0 || pl.side !== layout.poleSide || !pl.house || pl.house.isApt) continue;
          const dz = Math.abs((pl.z0 + pl.z1) / 2 - p.z);
          if (dz < bd2) { bd2 = dz; best = pl; }
        }
        if (best && bd2 < 16) {
          const h = best.house;
          wire(S, p.x, 8.9 + (p.y || 0), p.z, h.cx, 0.44 + h.H - 0.25 + (best.groundY || 0), h.cz + 0.4, 0.35, 0.028, wireC);
        }
      }
      // 支線(両端の電柱から地面へ。奥=道路と反対側に張る)
      for (const p of [poles[0], poles[poles.length - 1]]) {
        const zdir = p === poles[0] ? -1 : 1;
        const back = -(p.dir ?? -1);   // 道路の反対方向(residential では +x=従来どおり)
        const az = p.z + zdir * 3.2;
        const gp = p.y || 0, gaz = hy(az);
        tube(S, new THREE.LineCurve3(new THREE.Vector3(p.x, 9.0 + gp, p.z), new THREE.Vector3(p.x + back * 0.3, 0 + gaz, az)), 0.03, 0x4a4a4e, 2);
        tube(S, new THREE.LineCurve3(new THREE.Vector3(p.x + back * 0.22, 2.4 + gaz, az - zdir * 0.8), new THREE.Vector3(p.x + back * 0.3, 0.05 + gaz, az)), 0.07, 0xd8c832, 2);
      }
    }
  }

  /* --- 遠景ビル群(海辺は陸側に折る/田舎は 2 棟だけ。rngD の消費数は不変) --- */
  const isRural = PARAMS.location === 'rural';
  const rngD = mulberry32(hash2(seed, 777));
  for (let i = 0; i < 14; i++) {
    let bx = rr(rngD, 38, 90) * (rngD() < 0.5 ? 1 : -1);
    if (layout.isSeaside) bx = -Math.abs(bx);
    const bz = rr(rngD, -L / 2 - 40, L / 2 + 40);
    const bw = rr(rngD, 8, 16), bd = rr(rngD, 8, 14), bh = rr(rngD, 9, 26);
    const bcol = pick(rngD, PAL.bldg);   // 全消費を終えてから skip(消費数の不変条件)
    if (isRural && i >= 2) continue;     // 田舎の遠景は疎
    const gyD = hy(bz);                  // 坂: 遠景ビルもテラスに載せる
    box(S, bx, (isRural ? bh / 4 : bh / 2) + gyD, bz, bw, isRural ? bh / 2 : bh, bd, bcol);
    box(S, bx, (isRural ? bh / 2 : bh) + 0.3 + gyD, bz, bw + 0.4, 0.6, bd + 0.4, 0x9fa3a8);
  }
  for (let i = 0; i < 4; i++) {
    const bx = layout.isSeaside ? rr(rngD, -32, -6) : rr(rngD, -18, 18);   // 海辺は陸側へ(消費数不変)
    const bh = rr(rngD, 10, 22);
    const bz2 = -L / 2 - rr(rngD, 25, 55), bw2 = rr(rngD, 10, 18), bd2 = rr(rngD, 8, 14), bc = pick(rngD, PAL.bldg);
    if (isRural) continue;             // 田舎の正面はビルなし(山が主役)
    box(S, bx, bh / 2 + hy(bz2), bz2, bw2, bh, bd2, bc);
  }

  /* --- 海(seaside: 海面・堤防・テトラポッド・波線・灯台・防風林) --- */
  let seaMesh = null;
  if (layout.isSeaside) {
    const rngSea = mulberry32(hash2(seed, 4444));
    const dyke = roadW / 2 + 2.3;
    // 遊歩道(道路と堤防の間)
    box(S, (roadW / 2 + 0.65 + dyke - 0.25) / 2, 0.045, 0, dyke - 0.25 - roadW / 2 - 0.65, 0.09, L + 20,
        SNOW ? 0xe2e5e8 : 0xcfccc4);
    // 堤防(低め=柵越しに海が見える高さ)+転落防止柵
    box(S, dyke + 0.25, 0.44, 0, 0.5, 0.88, L + 20, 0xc6c4bc);
    box(S, dyke + 0.25, 0.94, 0, 0.66, 0.12, L + 20, 0xd4d2ca);
    for (let fz = -L / 2 - 8; fz < L / 2 + 8; fz += 2.2) {
      box(S, dyke + 0.25, 1.3, fz, 0.05, 0.6, 0.05, 0x8a9096);
    }
    for (const fy of [1.26, 1.54]) {
      box(S, dyke + 0.25, fy, 0, 0.04, 0.04, L + 20, 0x8a9096);
    }
    // テトラポッド帯(blob 乱積み)
    for (let i = 0; i < 60; i++) {
      const tx = dyke + 0.9 + rr(rngSea, 0, 3.6);
      const tz = rr(rngSea, -L / 2 - 6, L / 2 + 6);
      blob(S, tx, rr(rngSea, -0.25, 0.42), tz, rr(rngSea, 0.8, 1.5), pick(rngSea, [0x9a9c9e, 0x8f9294, 0xa4a6a8]));
    }
    // 海面(専用マテリアル=applyLight で空色を拾う。L0 なので水平線が線画に出る)
    const seaGeo = new THREE.PlaneGeometry(280, L + 160).rotateX(-Math.PI / 2);
    seaGeo.translate(dyke + 4 + 140, -0.55, 0);
    seaMesh = new THREE.Mesh(seaGeo, matSea);
    // 波線(白い泡 box=albedo エッジで LINE に「まばらな波線」が出る)
    for (let i = 0; i < 34; i++) {
      const wx = dyke + 6 + rr(rngSea, 0, 55);
      const wz = rr(rngSea, -L / 2 - 10, L / 2 + 10);
      box(S, wx, -0.5, wz, rr(rngSea, 1.6, 5), 0.05, rr(rngSea, 0.1, 0.16), 0xf2f4f4);
    }
    // 灯台(防波堤の先・遠景)
    const lhZ = -L / 2 - 34;
    box(S, 30, -0.2, lhZ, 34, 0.9, 3.2, 0xbdbbb4);                 // 防波堤
    cyl(S, 44, 3.6, lhZ, 1.05, 8.4, 0xf0efe9);
    cyl(S, 44, 5.4, lhZ, 1.08, 1.1, 0xc84a3e);                     // 赤帯
    cyl(S, 44, 8.1, lhZ, 0.75, 0.8, 0x3a3e44);                     // 灯室
    // 防風林(松のクラスタ・路肩の陸側寄り)
    for (let pz2 = -L / 2 + 18; pz2 < L / 2 - 10; pz2 += rr(rngSea, 26, 40)) {
      if (sideRoads.some(sr => Math.abs(pz2 - sr.z) < sr.w / 2 + 3)) continue;
      for (let k = 0; k < 2; k++) {
        const px2 = dyke - 1.15, pzk = pz2 + k * 2.2;
        const ph = rr(rngSea, 2.2, 3.1);
        cyl(S, px2, ph * 0.5, pzk, 0.09, ph, 0x6a5844);
        blob(S, px2, ph + 0.5, pzk, rr(rngSea, 1.5, 2.0), pick(rngSea, [0x4a6248, 0x3f5840]));
        blob(S, px2 + 0.4, ph + 0.1, pzk + 0.4, rr(rngSea, 1.0, 1.3), 0x455e44);
      }
    }
  }

  /* --- 山並みシルエット(fog に溶ける unlit 稜線。L1=線画対象外) --- */
  const mountainMeshes = [];
  if (PARAMS.mountains) {
    const rngMt = mulberry32(hash2(seed, 999));
    // 頂点色は無彩の係数(遠=空に近い/近=わずかに濃い)。実際の色は applyLight が空色を乗算。雪は白く、田舎は近く大きく
    const mtPos = isRural ? [[-252, 62], [-226, 44]] : [[-315, 46], [-285, 30]];
    const mtHex = SNOW ? [0xffffff, 0xf6f6f6] : [0xf2f2f2, 0xdedede];
    const mtCols = mtPos.map(([bz, hMax], i) => [bz, hMax, mtHex[i]]);
    for (const [bz, hMax, hex] of mtCols) {
      const geo = mountainGeo(rngMt, hMax, hex);
      geo.translate(0, 0, bz);
      const m = new THREE.Mesh(geo, matMountain);
      m.layers.set(1);
      mountainMeshes.push(m);
    }
  }

  /* --- マージ --- */
  const group = new THREE.Group();
  const geos = [];
  const solidGeo = mergeGeometries(S, false);
  solidGeo.computeBoundingSphere();
  const solidMesh = new THREE.Mesh(solidGeo, matSolid);
  solidMesh.castShadow = true;
  solidMesh.receiveShadow = true;
  group.add(solidMesh);
  geos.push(solidGeo);
  for (const m of mountainMeshes) { group.add(m); geos.push(m.geometry); }
  if (seaMesh) { group.add(seaMesh); geos.push(seaMesh.geometry); }

  if (PADDY.length) {
    const pGeo2 = mergeGeometries(PADDY, false);
    pGeo2.computeBoundingSphere();
    const pMesh2 = new THREE.Mesh(pGeo2, matPaddy);
    pMesh2.receiveShadow = true;
    group.add(pMesh2);
    geos.push(pGeo2);
  }

  let glassMesh = null;
  if (G.length) {
    const glassGeo = mergeGeometries(G, false);
    glassGeo.computeBoundingSphere();
    glassMesh = new THREE.Mesh(glassGeo, matGlass);
    group.add(glassMesh);
    geos.push(glassGeo);
  }

  /* --- 夜間 FX(デカール+グロー、L1) --- */
  if (D.length) {
    const dGeo = mergeGeometries(D, false);
    dGeo.computeBoundingSphere();
    const dMesh = new THREE.Mesh(dGeo, matDecal);
    dMesh.layers.set(1);
    dMesh.renderOrder = 5;
    group.add(dMesh);
    geos.push(dGeo);
  }

  /* --- 水たまり(雨のとき matPuddle.opacity で現れる。L1) --- */
  const PD = [];
  for (let i = 0; i < 16; i++) {
    const px = rr(rngM, -roadW / 2 + 0.5, roadW / 2 - 0.5) * 0.85;
    const pz = rr(rngM, -L / 2 + 5, L / 2 - 5);
    decal(PD, px, 0.033 + hy(pz), pz, rr(rngM, 0.5, 1.7), 0xffffff);   // 坂: 段の道路面に載せる
  }
  for (const sr of sideRoads) {
    decal(PD, rr(rngM, -20, 20), 0.033, sr.z + rr(rngM, -1.2, 1.2), rr(rngM, 0.5, 1.3), 0xffffff);
  }
  {
    const pGeo = mergeGeometries(PD, false);
    pGeo.computeBoundingSphere();
    const pMesh = new THREE.Mesh(pGeo, matPuddle);
    pMesh.layers.set(1);
    pMesh.renderOrder = 4;
    group.add(pMesh);
    geos.push(pGeo);
  }
  if (GLOW.pos.length) {
    const gGeo = new THREE.BufferGeometry();
    gGeo.setAttribute('position', new THREE.Float32BufferAttribute(GLOW.pos, 3));
    gGeo.setAttribute('color', new THREE.Float32BufferAttribute(GLOW.col, 3));
    const gPts = new THREE.Points(gGeo, matGlow);
    gPts.layers.set(1);
    gPts.renderOrder = 6;
    group.add(gPts);
    geos.push(gGeo);
  }

  /* --- 看板(L2: albedo に素材のまま追い描き) --- */
  if (SIGN.length) {
    const sGeo = mergeGeometries(SIGN, false);
    sGeo.computeBoundingSphere();
    const sMesh = new THREE.Mesh(sGeo, matSign);
    sMesh.layers.set(2);
    sMesh.receiveShadow = true;
    group.add(sMesh);
    geos.push(sGeo);
  }

  /* --- 踏切の動的オブジェクト(警報機・遮断機・電車) --- */
  let crossing = null;
  if (railway) {
    crossing = buildCrossingDynamics(railout(layout), group, geos);
    if (layout.station) crossing.stopX = 22;   // 駅停車位置(編成中心≒ホーム中央 28)
  }

  /* --- 俯瞰デバッグ線 --- */
  const dbg = buildDebugLines(layout);
  dbg.visible = topView;
  dbg.layers.set(1);   // 線画 RT に混ぜない
  group.add(dbg);
  geos.push(dbg.geometry);

  return { group, geos, layout, dbg, windows: W, glassMesh, crossing };
}
function railout(layout) {
  return { rz: layout.railway.z, roadW: layout.roadW };
}

/* --- 踏切: 警報機 2 基+遮断機 2 基+2 両ディーゼル(動的) --- */
const matLampOff = new THREE.MeshStandardMaterial({ color: 0x581818, roughness: 0.6 });
const matLampOn  = new THREE.MeshBasicMaterial({ color: 0xff2a20 });
function buildCrossingDynamics({ rz, roadW }, group, geos) {
  const cross = { state: 'idle', t: 0, nextAt: 6, gates: [], lamps: [], train: null, rz };
  const dg = [];   // 動的で使い捨てない小 geometry(dispose 用)
  const track = g => { dg.push(g); return g; };

  // 警報機(道路の両側・対角): 柱+×印+ランプ 2
  for (const s of [1, -1]) {
    const px = s * (roadW / 2 + 1.3), pz = rz - s * 3.1;   // 対角配置
    const g1 = [];
    box(g1, px, 2.0, pz, 0.1, 4.0, 0.1, 0x3a3a3e);
    // ×印(z 回転棒 2 本)+ランプ台
    for (const a of [Math.PI / 4, -Math.PI / 4]) {
      const bar = track(UNIT_BOX.clone());
      _q.setFromAxisAngle(new THREE.Vector3(0, 0, 1), a);
      _m4.compose(_v.set(px, 3.75, pz), _q, _s.set(1.5, 0.14, 0.06));
      bar.applyMatrix4(_m4);
      g1.push(colorize(bar, 0xdfdcd4));
    }
    box(g1, px, 3.1, pz, 0.85, 0.32, 0.12, 0x2e2e32);   // ランプ台
    const sGeo = mergeGeometries(g1, false);
    const sm = new THREE.Mesh(sGeo, matSolid);
    sm.castShadow = true;
    group.add(sm);
    geos.push(sGeo);
    // ランプ 2 灯(色切替のため個別メッシュ)
    for (const dx of [-0.28, 0.28]) {
      const lampGeo = track(new THREE.CylinderGeometry(0.13, 0.13, 0.09, 12).rotateX(Math.PI / 2).toNonIndexed());
      lampGeo.deleteAttribute('uv');
      const lamp = new THREE.Mesh(lampGeo, matLampOff);
      lamp.position.set(px + dx, 3.1, pz + (rz > pz ? -0.08 : 0.08));
      group.add(lamp);
      geos.push(lampGeo);
      cross.lamps.push(lamp);
    }
    // 遮断機: ピボット Group+縞バー
    const pivot = new THREE.Group();
    pivot.position.set(px, 1.05, pz + (rz > pz ? 1.0 : -1.0));
    const barLen = roadW / 2 + 1.1;
    const segs = [];
    const nSeg = 6;
    for (let i = 0; i < nSeg; i++) {
      segs.push(track(UNIT_BOX.clone()));
      _m4.compose(_v.set(-s * (i + 0.5) * (barLen / nSeg), 0, 0), _q.identity(), _s.set(barLen / nSeg, 0.09, 0.09));
      segs[i].applyMatrix4(_m4);
      colorize(segs[i], i % 2 ? 0x2e2e30 : 0xe8c832);
    }
    const barGeo = mergeGeometries(segs, false);
    const barMesh = new THREE.Mesh(barGeo, matSolid);
    barMesh.castShadow = true;
    pivot.add(barMesh);
    pivot.rotation.z = s * THREE.MathUtils.degToRad(82);   // 初期=上がっている
    group.add(pivot);
    geos.push(barGeo);
    cross.gates.push({ pivot, s });
  }

  // 2 両ディーゼル(x 方向に通過)
  const train = new THREE.Group();
  const tBody = [];
  for (const off of [0, 12.6]) {
    box(tBody, off, 1.9, 0, 12, 2.6, 2.55, 0xc8d0d4);                    // 車体
    box(tBody, off, 3.28, 0, 11.6, 0.18, 2.35, 0x8a8e92);                // 屋根
    box(tBody, off, 2.35, 0, 11.2, 0.78, 2.62, 0x3e4a58);                // 窓帯
    box(tBody, off, 0.92, 0, 11.4, 0.5, 2.4, 0x8a4838);                  // 裾帯
    for (const bx of [-3.6, 3.6]) {
      box(tBody, off + bx, 0.42, 0, 2.2, 0.55, 2.2, 0x2e2e32);           // 台車
    }
  }
  const tGeo = mergeGeometries(tBody, false);
  const tMesh = new THREE.Mesh(tGeo, matSolid);
  tMesh.castShadow = true;
  train.add(tMesh);
  train.position.set(400, 0.1, rz);   // 画面外で待機
  group.add(train);
  geos.push(tGeo);
  cross.train = train;

  dg.length = 0;   // track した一時 geometry は merge 済みなので参照だけ切る
  return cross;
}

/* 踏切ステートマシン(tick から) */
function updateCrossing(dt) {
  const c = city?.crossing;
  if (!c) return;
  c.t += dt;
  const setGates = (deg) => {
    for (const g of c.gates) g.pivot.rotation.z = g.s * THREE.MathUtils.degToRad(deg);
  };
  const blink = () => {
    const on = Math.floor(c.t / 0.55) % 2;
    c.lamps.forEach((l, i) => { l.material = (i % 2 === on) ? matLampOn : matLampOff; });
  };
  switch (c.state) {
    case 'idle':
      if (c.t > c.nextAt) { c.state = 'warn'; c.t = 0; }
      break;
    case 'warn': {
      blink();
      const k = Math.min(1, c.t / 3);
      setGates(82 * (1 - k * k));
      if (k >= 1) { c.state = 'closed'; c.t = 0; c.train.position.x = 170; }
      break;
    }
    case 'closed': {
      blink();
      if (!c.stopX) {
        c.train.position.x = 170 - c.t * 26;  // 26 m/s ≒ 94km/h のローカル線
      } else {
        // 駅停車(#9): 等減速で進入 → 停車 → 等加速で発車。遮断機は下りたまま
        const v = 26, D1 = 170 - c.stopX, tA = 2 * D1 / v, tB = 7;
        if (c.t < tA) {
          const k = c.t / tA;
          c.train.position.x = 170 - D1 * k * (2 - k);        // 初速 26 → 0
        } else if (c.t < tA + tB) {
          c.train.position.x = c.stopX;
        } else {
          const t2 = c.t - tA - tB, acc = 1.9, tR = v / acc;  // 0 → 26 m/s
          c.train.position.x = c.stopX - (t2 < tR ? 0.5 * acc * t2 * t2
                                                  : 0.5 * acc * tR * tR + v * (t2 - tR));
        }
      }
      if (c.train.position.x < -190) { c.state = 'open'; c.t = 0; }
      break;
    }
    case 'open': {
      const k = Math.min(1, c.t / 2.2);
      setGates(82 * k * k);
      if (k >= 1) {
        c.state = 'idle'; c.t = 0;
        c.nextAt = 20 + Math.random() * 22;
        c.lamps.forEach(l => l.material = matLampOff);
        c.train.position.x = 400;
      }
      break;
    }
  }
}

/* ============================================================
   坂の街(#10): 段状地盤+テラス道路+階段路地+擁壁
   メイン rng に一切触れない決定的ジオメトリ(hillside のみ呼ばれる)
============================================================ */
function buildHillside(layout, S, cSoil, cRoad, cCurb) {
  const { roadW } = layout;
  const SNOW = PARAMS.season === 'snow';
  const cWall = SNOW ? 0xdfe2e4 : 0xb6ac9c;    // 擁壁(石垣/コンクリ)
  const cCope = SNOW ? 0xe8eaec : 0xa39a8c;    // 笠石
  const cRail = 0x9aa0a6;
  const { terr: TL, step: SH, n: N } = HILL;
  const RUN = 4.2;                              // 段差 1 段あたりの階段の踏み込み長
  const HW = roadW / 2;

  for (let i = 0; i < N; i++) {
    const z0 = -L / 2 + i * TL, z1 = z0 + TL, cz = (z0 + z1) / 2, hi = i * SH;

    // 両脇の地盤(道路チャンネル |x|<HW を除く。全テラス長・下端 -1 で下段を覆う)
    for (const s of [1, -1]) {
      const x0 = HW, x1 = 210;
      box(S, s * (x0 + x1) / 2, (hi - 1) / 2, cz, x1 - x0, hi + 1, TL + 0.02, cSoil);
    }

    // 道路の平場(landing)= 上り境界の階段分を空ける。路盤(下端 -1)+舗装面+縁石
    const landZ0 = z0 + (i > 0 ? RUN : 0), landLen = z1 - landZ0, landCz = (landZ0 + z1) / 2;
    box(S, 0, (hi - 1) / 2, landCz, roadW, hi + 1, landLen, cSoil);       // 路盤
    box(S, 0, hi + 0.03, landCz, roadW, 0.06, landLen, cRoad);           // 舗装
    for (const s of [1, -1]) box(S, s * (HW + 0.15), hi + 0.13, landCz, 0.16, 0.16, landLen, cCurb);

    if (i > 0) {
      // 階段(下段 h(i-1) → hi。各段は下端 -1 まで詰まった塊=そのまま接地する)
      const nStep = 7, rise = SH / nStep, tread = RUN / nStep;
      for (let k = 0; k < nStep; k++) {
        const top = (i - 1) * SH + rise * (k + 1);        // この段の踏面高
        box(S, 0, (top - 1) / 2, z0 + tread * (k + 0.5), roadW, top + 1, tread + 0.02, cRoad);
      }
      // 階段手すり(両側: 斜めレール+支柱)
      for (const s of [1, -1]) {
        const rg = UNIT_BOX.clone();
        rg.applyMatrix4(new THREE.Matrix4().makeScale(0.06, 0.06, Math.hypot(RUN, SH)));
        rg.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.atan2(SH, RUN)));   // +z 端が上がる
        rg.translate(s * (HW - 0.2), (i - 1) * SH + SH / 2 + 0.85, z0 + RUN / 2);
        S.push(colorize(rg, cRail));
        for (let k = 0; k <= nStep; k += 2) {
          box(S, s * (HW - 0.2), (i - 1) * SH + rise * k + 0.45, z0 + tread * k, 0.05, 0.9, 0.05, cRail);
        }
      }
      // 擁壁(このテラスの下端 z0 沿い・区画側。道路チャンネルは階段が通るので開ける)
      for (const s of [1, -1]) {
        box(S, s * (HW + 0.4 + 29), hi - SH / 2, z0, 58, SH, 0.5, cWall);
        box(S, s * (HW + 0.4 + 29), hi + 0.06, z0, 58, 0.18, 0.6, cCope);   // 笠石
        for (let fx = HW + 1.2; fx < 58; fx += 2.4) {                        // 転落防止柵
          box(S, s * fx, hi + 0.52, z0, 0.05, 0.8, 0.05, cRail);
        }
      }
    }
  }
  // 街の外(z<-105 / z>105)にも clamp 高さの平地を敷く(カメラ ±140・遠景ビルの接地先)
  box(S, 0, -0.5, -152.5, 420, 1, 95, cSoil);                          // 低い端(h=0)
  box(S, 0, (N - 1) * SH - 0.5, 152.5, 420, 1, 95, cSoil);             // 高い端(h=最上段)
}

/* 坂の街: 区画を groundY だけ剛体移動して段に載せる(建物が段差でちぎれない)。
   W.gi は G への append オフセットで補正=窓の gi*36 前提を維持 */
function placePlot(plot, layout, S, G, W, SIGN, PADDY) {
  const gy = plot.groundY || 0;   // 敷地を載せる高さ=footprint の山側(最高)地形
  if (!gy) return buildPlot(plot, layout, S, G, W, SIGN, PADDY);
  // 基礎スカート: 谷側地形-1 から gy まで詰める(段をまたぐ区画・ランドマークでも浮き/食い込みゼロ)
  const gyBot = hillYAt(layout.isHillside, plot.z0);   // 谷側(最低)の地形高
  const fx0 = plot.side * plot.xNear, fx1 = plot.side * (plot.xNear + plot.depth);
  box(S, (fx0 + fx1) / 2, (gyBot - 1 + gy) / 2, (plot.z0 + plot.z1) / 2,
      plot.depth, gy - gyBot + 1, plot.z1 - plot.z0, 0xb6ac9c);
  const Sl = [], Gl = [], Wl = [], SIGNl = [], PADl = [];
  buildPlot(plot, layout, Sl, Gl, Wl, SIGNl, PADl);
  const gBase = G.length;
  const tm = new THREE.Matrix4().makeTranslation(0, gy, 0);
  for (const g of Sl) { g.applyMatrix4(tm); S.push(g); }
  for (const g of Gl) { g.applyMatrix4(tm); G.push(g); }
  for (const g of SIGNl) { g.applyMatrix4(tm); SIGN.push(g); }
  for (const g of PADl) { g.applyMatrix4(tm); PADDY.push(g); }
  for (const w of Wl) { w.gi += gBase; W.push(w); }   // 局所 gi(0基点)を全体 G の位置へ
}

/* --- 1 区画 --- */
function buildPlot(plot, layout, S, G, W, SIGN, PADDY) {
  const rng = mulberry32(plot.sub);
  const { side, row, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const cx = side * (xNear + depth / 2);
  const cz = (z0 + z1) / 2;

  if (plot.kind === 'paddy') { buildPaddy(plot, rng, S, PADDY); return; }
  if (plot.kind === 'landmark') { buildLandmark(plot, rng, S, G, W); return; }
  if (plot.kind === 'euro') { buildEuroBlock(plot, rng, S, G, W, SIGN); return; }        // #11 欧州旧市街
  if (plot.kind === 'suburb') { buildSuburbHouse(plot, rng, S, G, W, SIGN); return; }    // #11 米郊外
  if (plot.kind === 'kowloon') { buildKowloonBlock(plot, rng, S, G, W, SIGN); return; }  // #11 アジア密集街

  // 敷地面
  const cPlot = PARAMS.season === 'snow' ? 0xe3e6e9 : plot.kind === 'lot' ? PAL.gravel : PAL.concrete;
  box(S, cx, 0.012, cz, depth, 0.05, w, cPlot);

  if (plot.kind === 'lot') {  // 月極駐車場: フェンス+看板+駐車車両
    for (const zz of [z0 + 0.1, z1 - 0.1]) {
      box(S, cx, 0.55, zz, depth, 1.0, 0.06, PAL.fence);
    }
    box(S, side * (xNear + depth - 0.05), 0.55, cz, 0.06, 1.0, w, PAL.fence);
    if (PARAMS.signs) {
      const sx = side * (xNear + 0.35);
      box(S, sx, 1.25, cz, 0.08, 0.85, 1.65, 0xe8e6e0);
      cyl(S, sx, 0.45, cz - 0.6, 0.035, 0.9, 0x8a8e92);
      cyl(S, sx, 0.45, cz + 0.6, 0.035, 0.9, 0x8a8e92);
      signPlane(SIGN, 'tsukigime', sx - side * 0.06, 1.25, cz, 1.55, 0.78, side > 0 ? -Math.PI / 2 : Math.PI / 2);
    }
    const nCars = 1 + Math.floor(rng() * Math.min(3, w / 3));
    for (let i = 0; i < nCars; i++) {
      if (rng() < 0.3) continue;
      clayCar(S, side * (xNear + depth * 0.5), 0.02, z0 + 1.9 + i * 2.8, Math.PI / 2 + rr(rng, -0.04, 0.04), pick(rng, CAR_COLORS));
    }
    return;
  }

  if (plot.kind === 'shop') { buildShop(plot, rng, S, G, W, SIGN); return; }   // 商店は塀・庭木なし
  if (plot.kind === 'apt') buildApt(plot, rng, S, G, W, SIGN);
  else buildHouse(plot, rng, S, G, W);

  /* --- 塀(前面・門開口つき) --- */
  const setback = PARAMS.setback;
  if (row === 0 && setback > 0.25) {
    const fenceX = side * (xNear + 0.06);
    const gateW = rng() < PARAMS.garageRatio ? rr(rng, 2.6, 4.6) : rr(rng, 1.2, 1.9);
    const gateC = cz + rr(rng, -w * 0.2, w * 0.2);
    const segs = [[z0 + 0.05, gateC - gateW / 2], [gateC + gateW / 2, z1 - 0.05]].filter(s => s[1] - s[0] > 0.3);
    const fType = rng();
    for (const [a, b] of segs) {
      const len = b - a, mz = (a + b) / 2;
      if (fType < 0.45) {          // ブロック塀(段+目地線)
        for (let i = 0; i < 3; i++) {
          box(S, fenceX, 0.2 + i * 0.4, mz, 0.14, 0.4, len, PAL.block[i % 2]);
        }
        for (let i = 1; i < 3; i++) {
          box(S, fenceX, i * 0.4, mz, 0.148, 0.022, len, 0xb0aca2);   // 目地
        }
        box(S, fenceX, 1.26, mz, 0.18, 0.07, len, 0xc5c1b8);
      } else if (fType < 0.75) {   // フェンス(基礎+横棒+支柱)
        box(S, fenceX, 0.22, mz, 0.13, 0.44, len, PAL.block[0]);
        box(S, fenceX, 0.66, mz, 0.05, 0.05, len, PAL.fence);
        box(S, fenceX, 0.95, mz, 0.05, 0.05, len, PAL.fence);
        for (let pz = a + 0.6; pz < b - 0.3; pz += 1.8) {
          box(S, fenceX, 0.7, pz, 0.05, 0.55, 0.05, PAL.fence);
        }
      } else {                     // 生け垣(セグメントで緑を交互)
        const n = Math.max(1, Math.round(len / 1.4));
        for (let i = 0; i < n; i++) {
          const sz = len / n;
          box(S, fenceX, 0.55, a + sz * (i + 0.5), 0.5, 1.05, sz * 0.96, PAL.hedge[i % 2]);
        }
      }
    }
    // 門柱
    for (const gz of [gateC - gateW / 2, gateC + gateW / 2]) {
      if (gz > z0 && gz < z1) box(S, fenceX, 0.68, gz, 0.28, 1.36, 0.28, PAL.block[0]);
    }
  }

  /* --- 庭木 --- */
  const trees = row === 0 ? Math.floor(rng() * 2.4) : Math.floor(rng() * 1.4);
  for (let i = 0; i < trees; i++) {
    const tx = side * (xNear + rr(rng, depth * 0.55, depth * 0.9));
    const tz = rr(rng, z0 + 1, z1 - 1);
    const th = rr(rng, 1.6, 3.2);
    cyl(S, tx, th * 0.35, tz, 0.07, th * 0.7, PAL.trunk);
    blob(S, tx, th * 0.75, tz, th * 0.75, pick(rng, seasonLeaf()));
    blob(S, tx + 0.3, th * 0.95, tz + 0.2, th * 0.5, pick(rng, seasonLeaf()));
  }
}

/* --- 窓(サッシ=S、ガラス=G+W メタ)。nx=壁面法線の向き(±x) --- */
function frontWindow(S, G, W, fx, cy, cz, w, h, nx, rng) {
  box(S, fx + nx * 0.02, cy, cz, 0.12, h + 0.14, w + 0.14, PAL.sash);
  box(G, fx + nx * 0.085, cy, cz, 0.02, h, w, PAL.glassDay);   // サッシ前面より僅かに前
  W.push({ gi: G.length - 1, kind: 'win', litAt: 16.6 + rng() * 4.6 });
}
function sideWindow(S, G, W, cx, cy, fz, w, h, nz, rng) {
  box(S, cx, cy, fz + nz * 0.02, w + 0.14, h + 0.14, 0.12, PAL.sash);
  box(G, cx, cy, fz + nz * 0.085, w, h, 0.02, PAL.glassDay);
  W.push({ gi: G.length - 1, kind: 'win', litAt: 16.6 + rng() * 4.6 });
}

/* --- 戸建て --- */
function buildHouse(plot, rng, S, G, W) {
  const { side, row, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const gap = PARAMS.houseGap, setback = PARAMS.setback;
  const bw = Math.max(4.5, w - gap * 2);                       // 間口(z)
  const bd = Math.min(rr(rng, 6.5, 9), depth - setback - 2);   // 奥行(x)
  const floors = row === 0 ? pick(rng, [1, 2, 2, 2, 2, 3]) : pick(rng, [1, 2, 2]);
  const fh = 2.85;
  const H = floors * fh;
  const cx = side * (xNear + setback + bd / 2);
  const cz = (z0 + z1) / 2 + rr(rng, -0.4, 0.4);
  const wall = pick(rng, PAL.walls);
  const roof = pick(rng, PARAMS.season === 'snow' ? SNOW_ROOFS : PAL.roofs);  // 雪化粧
  const frontX = side * (xNear + setback);   // 前面の壁位置(符号付き)

  // 基礎+本体
  box(S, cx, 0.22, cz, bd + 0.06, 0.44, bw + 0.06, 0x9b968e);
  box(S, cx, 0.44 + H / 2, cz, bd, H, bw, wall);

  const out = -side;   // 前面(道路)方向

  // ガレージ型(ビルトイン): 前面下部にシャッター面
  const hasGarage = row === 0 && rng() < PARAMS.garageRatio;
  let garageZ = null;
  if (hasGarage && floors >= 2) {
    garageZ = cz + (rng() < 0.5 ? -1 : 1) * bw * 0.22;
    box(S, frontX + out * 0.06, 0.44 + 1.15, garageZ, 0.14, 2.3, 2.6, PAL.shutter);
    box(S, frontX + out * 0.02, 0.44 + 2.42, garageZ, 0.3, 0.24, 2.8, wall);   // まぐさ
  } else if (hasGarage) {
    // カーポート+車
    const px = side * (xNear + 1.7);
    const pz = rng() < 0.5 ? z0 + 1.7 : z1 - 1.7;
    for (const dx of [-1.1, 1.1]) for (const dz of [-2.1, 2.1]) {
      box(S, px + side * dx, 1.15, pz + dz, 0.09, 2.3, 0.09, 0x8b8f94);
    }
    box(S, px, 2.34, pz, 2.6, 0.08, 4.6, 0xb9bcbf);
    if (rng() < 0.65) clayCar(S, px, 0.02, pz, Math.PI / 2, pick(rng, CAR_COLORS));
  }

  // 屋根(oversize)
  const rw = bd + 0.55, rl = bw + 0.55, ry0 = 0.44 + H;
  const rt = rng();
  if (rt < 0.5)      gableRoof(S, cx, ry0, cz, rw, rl, rr(rng, 1.2, 1.9), roof);
  else if (rt < 0.8) hipRoof(S, cx, ry0, cz, rw, rl, rr(rng, 1.1, 1.6), roof);
  else {             // 陸屋根+パラペット
    box(S, cx, ry0 + 0.1, cz, rw - 0.2, 0.2, rl - 0.2, roof);
    for (const s2 of [1, -1]) {
      box(S, cx + s2 * (rw / 2 - 0.15), ry0 + 0.3, cz, 0.12, 0.55, rl, wall);
      box(S, cx, ry0 + 0.3, cz + s2 * (rl / 2 - 0.15), rw, 0.55, 0.12, wall);
    }
  }

  // 玄関(前面 1F): ドア+庇+ポーチ+植木鉢
  const doorZ = cz + (rng() < 0.5 ? -1 : 1) * rr(rng, bw * 0.15, bw * 0.32);
  box(S, frontX + out * 0.055, 0.44 + 1.05, doorZ, 0.1, 2.1, 0.95, PAL.door);
  box(S, frontX + out * 0.35, 0.44 + 2.28, doorZ, 0.9, 0.09, 1.5, roof);
  box(S, frontX + out * 0.3, 0.2, doorZ, 0.8, 0.12, 1.3, PAL.concrete);
  if (rng() < 0.5) {
    for (let i = 0; i < 1 + Math.floor(rng() * 2.4); i++) {
      const pz2 = doorZ + 0.95 + i * 0.32;
      cyl(S, frontX + out * 0.25, 0.11, pz2, 0.12, 0.22, 0x9a6a4a);
      blob(S, frontX + out * 0.25, 0.32, pz2, 0.3, pick(rng, seasonLeaf()));
    }
  }

  /* --- 窓 --- */
  // 1F: 掃き出し窓(玄関・ガレージと反対側)
  const w1z = 2 * cz - doorZ;   // 玄関の反対
  if (!garageZ || Math.abs(w1z - garageZ) > 2.2) {
    frontWindow(S, G, W, frontX, 0.44 + 1.15, w1z, 1.65, 1.8, out, rng);
  }
  // 2F〜: 前面窓グリッド
  for (let f = 2; f <= floors; f++) {
    const cy = 0.44 + (f - 1) * fh + 1.45;
    const hasBalcony = f === 2 && row === 0 && rng() < 0.55;
    if (hasBalcony) {
      const blen = Math.min(bw - 0.8, 3.6);
      const by = 0.44 + (f - 1) * fh;
      const bx = frontX + out * 0.48;
      box(S, bx, by + 0.05, cz, 1.0, 0.1, blen, wall);                     // スラブ
      box(S, frontX + out * 0.93, by + 0.6, cz, 0.08, 1.0, blen, shade(wall, 0.88)); // 手すり壁
      for (const s2 of [1, -1]) {
        box(S, bx, by + 0.6, cz + s2 * (blen / 2 - 0.04), 0.9, 1.0, 0.08, shade(wall, 0.88));
      }
      frontWindow(S, G, W, frontX, cy - 0.15, cz, Math.min(2.6, blen - 0.7), 1.75, out, rng);
      if (rng() < 0.3) {   // 布団
        box(S, frontX + out * 0.93, by + 1.08, cz + rr(rng, -0.5, 0.5), 0.3, 0.5, 1.7, pick(rng, [0xd8b8b8, 0xb8c4d8, 0xd8d0b0]));
      }
    } else {
      const nWin = bw > 7 ? 2 : 1;
      for (let i = 0; i < nWin; i++) {
        const wz = cz + (nWin === 1 ? rr(rng, -0.8, 0.8) : (i - 0.5) * bw * 0.42);
        frontWindow(S, G, W, frontX, cy, wz, 1.2, 1.05, out, rng);
      }
    }
  }
  // 側面の小窓(z± の見えやすい側)
  if (row === 0) {
    const zFace = rng() < 0.5 ? cz - bw / 2 : cz + bw / 2;
    const nz = zFace > cz ? 1 : -1;
    for (let f = 1; f <= floors; f++) {
      if (rng() < 0.4) continue;
      sideWindow(S, G, W, cx + rr(rng, -bd * 0.2, bd * 0.2), 0.44 + (f - 1) * fh + 1.5, zFace, 0.65, 0.65, nz, rng);
    }
  }

  /* --- 雨樋(縦樋)+室外機+プロパン --- */
  cyl(S, frontX + out * 0.08, H / 2 + 0.44, cz - bw / 2 + 0.12, 0.045, H, shade(wall, 0.8));
  if (rng() < 0.7) {
    const az = rng() < 0.5 ? z0 + 0.9 : z1 - 0.9;
    box(S, cx + rr(rng, -1, 1), 0.35, az, 0.29, 0.56, 0.8, 0xe4e4e0);
  }
  if (rng() < 0.3) {
    for (const dz of [0, 0.42]) cyl(S, side * (xNear + depth - 0.5), 0.6, cz + dz, 0.17, 1.2, 0xdcdcd8);
  }

  plot.house = { cx, cz, bd, bw, H, floors, fh, wall, roof, doorZ, frontX: xNear + setback };
}
/* 季節ごとの葉色(pick の消費数は不変=季節を変えても他要素は動かない) */
const SNOW_ROOFS = [0xe4e7ea, 0xdde1e5, 0xe8ebee, 0xe1e4e8];
function seasonLeaf() {
  switch (PARAMS.season) {
    case 'sakura': return [0xf0bfce, 0xe9aec2];
    case 'autumn': return [0xd08a3c, 0xbf5f2e, 0xc9a03e];
    case 'snow':   return [0x9fb0a2, 0xc6d0ca];
    default:       return PAL.leaf;
  }
}

/* 色を暗くする(頂点色バリエーション用) */
function shade(hex, k) {
  const r = Math.round(((hex >> 16) & 255) * k), g2 = Math.round(((hex >> 8) & 255) * k), b = Math.round((hex & 255) * k);
  return (r << 16) | (g2 << 8) | b;
}

/* --- 水田(畦の格子が albedo エッジで LINE に乗る) --- */
function buildPaddy(plot, rng, S, PADDY) {
  const { side, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const cx = side * (xNear + depth / 2);
  const cz = (z0 + z1) / 2;
  const season = PARAMS.season;

  // 田面(matPaddy 専用メッシュ=季節色は applyLight が塗る)
  box(PADDY, cx, 0.008, cz, depth - 0.5, 0.03, w - 0.5, 0xffffff);

  // 畦(周囲 4 辺+内部 1-2 本の格子)
  const azeC = season === 'snow' ? 0xdfe3e6 : 0xab9668;
  const azeH = 0.15, azeW = 0.42;
  box(S, cx, azeH / 2, z0 + azeW / 2, depth, azeH, azeW, azeC);
  box(S, cx, azeH / 2, z1 - azeW / 2, depth, azeH, azeW, azeC);
  box(S, side * (xNear + azeW / 2), azeH / 2, cz, azeW, azeH, w, azeC);
  box(S, side * (xNear + depth - azeW / 2), azeH / 2, cz, azeW, azeH, w, azeC);
  if (w > 11) box(S, cx, azeH / 2, z0 + w * rr(rng, 0.4, 0.6), depth, azeH, azeW * 0.8, azeC);
  if (depth > 13 && rng() < 0.6) box(S, side * (xNear + depth * rr(rng, 0.4, 0.6)), azeH / 2, cz, azeW * 0.8, azeH, w, azeC);

  // 条(夏=緑・秋=金の稲列。春の水鏡・雪原にはなし)
  if (season === 'none' || season === 'autumn') {
    const rowC = season === 'autumn' ? 0xbc9a42 : 0x5b8840;
    for (let rz2 = z0 + 1.3; rz2 < z1 - 1.0; rz2 += 1.45) {
      box(S, cx, 0.05, rz2, depth - 1.4, 0.06, 0.15, rowC);
    }
  }

  // ビニールハウス(たまに。半分埋めた円筒)
  if (rng() < 0.16 && w > 12) {
    const hx = side * (xNear + depth * 0.55);
    const hz = cz + rr(rng, -w * 0.12, w * 0.12);
    cylX(S, hx, 0.55, hz, 1.9, Math.min(10, w * 0.5), 0xe9edec, Math.PI / 2);
  }

  // のぼり(道路際にたまに)
  if (rng() < 0.22 && plot.row === 0) {
    const nx = side * (xNear + 0.7), nz = cz + rr(rng, -w * 0.3, w * 0.3);
    cyl(S, nx, 1.5, nz, 0.025, 3.0, 0x8a8478);
    box(S, nx, 2.05, nz + 0.24, 0.04, 1.4, 0.42, pick(rng, [0xe8e4da, 0xd8524a, 0x4a70b8]));
  }
}

/* ============================================================
   ランドマーク(#8: 神社・学校・公園) — どのロケーションにも 1 区画
============================================================ */

/* 時計(枠+文字盤+10:10 の針)。nxs=文字盤を張る法線方向(±x)の配列 */
function clock(S, fx, fy, fz, r, nxs) {
  cylX(S, fx, fy, fz, r + 0.06, 0.12, 0x3a3e44);              // 枠・裏板(軸=x)
  for (const nx of nxs) {
    cylX(S, fx + nx * 0.03, fy, fz, r, 0.08, 0xf2f1ec);       // 文字盤
    for (const [len, ang] of [[r * 0.6, 1.05], [r * 0.42, -1.05]]) {   // 長針・短針(10:10)
      const g = UNIT_BOX.clone();
      g.applyMatrix4(new THREE.Matrix4().makeScale(0.045, len, 0.07));
      g.translate(0, len / 2, 0);
      g.applyMatrix4(new THREE.Matrix4().makeRotationX(ang * nx));   // 裏面は鏡像で同時刻
      g.translate(fx + nx * 0.1, fy, fz);
      S.push(colorize(g, 0x2e2e32));
    }
  }
}

function buildLandmark(plot, rng, S, G, W) {
  if (plot.lmType === 'shrine') buildShrine(plot, rng, S);
  else if (plot.lmType === 'school') buildSchool(plot, rng, S, G, W);
  else buildPark(plot, rng, S);
}

/* --- 神社(鳥居・石段・玉垣・社・狛犬・石灯籠・鎮守の森) --- */
function buildShrine(plot, rng, S) {
  const { side, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const cz = (z0 + z1) / 2;
  const X = d => side * (xNear + d);            // 敷地内の奥行 d(m) → world x
  const SNOW = PARAMS.season === 'snow';
  const VERM = 0xc23a2a, VERM_D = 0x8e2a1e;     // 朱・濃朱
  const STONE = 0xd6d3ca;

  // 敷地(玉砂利)+参道石畳(道路→社)
  box(S, X(depth / 2), 0.015, cz, depth, 0.05, w, SNOW ? 0xe3e6e9 : PAL.gravel);
  box(S, X(depth * 0.36), 0.05, cz, depth * 0.72, 0.06, 2.3, STONE);

  // 玉垣(道路際の低い石柵。鳥居部は開口)
  for (const [a, b] of [[z0 + 0.3, cz - 2.2], [cz + 2.2, z1 - 0.3]]) {
    if (b - a < 0.6) continue;
    const mz = (a + b) / 2, len = b - a;
    box(S, X(0.25), 0.42, mz, 0.18, 0.84, len, STONE);
    box(S, X(0.25), 0.9, mz, 0.26, 0.12, len, 0xc8c5bc);       // 笠石
    for (let pz = a + 0.5; pz < b - 0.3; pz += 1.5) {
      box(S, X(0.25), 1.04, pz, 0.16, 0.32, 0.24, STONE);      // 親柱
    }
  }

  // 鳥居(参道の道路寄り): 2 柱+根巻き+貫+額束+島木+笠木
  const tx = X(1.6), th = 3.3, tg = 2.7;        // 柱間 tg
  for (const s2 of [-1, 1]) {
    cyl(S, tx, th / 2, cz + s2 * tg / 2, 0.15, th, VERM);
    cyl(S, tx, 0.16, cz + s2 * tg / 2, 0.22, 0.32, 0x8a8578);
  }
  box(S, tx, th - 0.78, cz, 0.18, 0.2, tg + 0.7, VERM);        // 貫
  box(S, tx, th - 0.28, cz, 0.13, 0.44, 0.28, VERM);           // 額束
  box(S, tx, th + 0.1, cz, 0.3, 0.24, tg + 1.1, VERM);         // 島木
  box(S, tx, th + 0.38, cz, 0.42, 0.28, tg + 1.7, VERM_D);     // 笠木

  // 狛犬(参道両脇・道路向きに前傾)
  for (const s2 of [-1, 1]) {
    const kz = cz + s2 * 1.9, kx = X(3.6);
    box(S, kx, 0.35, kz, 0.7, 0.7, 0.7, STONE);
    box(S, kx, 0.98, kz, 0.52, 0.56, 0.4, 0xc9c6bd);
    blob(S, kx - side * 0.14, 1.42, kz, 0.42, 0xc9c6bd);
  }

  // 石灯籠 1 対(参道中程)
  for (const s2 of [-1, 1]) {
    const lz = cz + s2 * 1.8, lx = X(depth * 0.52);
    box(S, lx, 0.15, lz, 0.6, 0.3, 0.6, STONE);
    cyl(S, lx, 0.75, lz, 0.09, 0.9, STONE);
    box(S, lx, 1.32, lz, 0.42, 0.24, 0.42, STONE);
    box(S, lx, 1.62, lz, 0.34, 0.36, 0.34, 0xe4e1d8);          // 火袋
    hipRoof(S, lx, 1.84, lz, 0.76, 0.76, 0.3, 0xb8b5ac);       // 笠
  }

  // 石段(2 段)→基壇→社殿(切妻・平入り)+木階+賽銭箱
  const bxD = depth - 3.4;                       // 社の奥行位置
  const bx = X(bxD);
  box(S, X(bxD - 3.2), 0.09, cz, 0.6, 0.18, 3.4, STONE);
  box(S, X(bxD - 2.8), 0.2, cz, 0.6, 0.4, 3.4, STONE);
  box(S, bx, 0.3, cz, 4.8, 0.6, 5.4, 0xcac7be);                // 基壇
  box(S, bx, 0.6 + 1.1, cz, 2.6, 2.2, 3.4, 0x7a5f48);          // 社殿(木造)
  gableRoof(S, bx, 0.6 + 2.2, cz, 3.5, 4.5, 1.3, 0x4e4a44);    // 屋根(oversize)
  box(S, bx, 0.6 + 3.55, cz, 0.26, 0.24, 4.6, 0x3e3a36);       // 棟木
  box(S, X(bxD - 1.8), 0.48, cz, 0.9, 0.24, 1.5, 0x6e5844);    // 木階
  box(S, X(bxD - 1.2), 0.95, cz, 0.55, 0.7, 0.95, 0x5e4a3a);   // 賽銭箱

  // 鎮守の森(常緑。社殿と重なる株は間引く — rng は全消費してから skip)
  const EVG = SNOW ? [0x647a62, 0x59705c] : [0x4a6248, 0x3f5840];
  for (let i = 0; i < 6; i++) {
    const fz = rr(rng, z0 + 1.4, z1 - 1.4);
    const fd = rr(rng, depth * 0.45, depth - 0.9);
    const fH = rr(rng, 3.2, 4.6);
    const fs = rr(rng, 1.6, 2.3);
    const fc = pick(rng, EVG);
    if (Math.abs(fz - cz) < 3.2 && Math.abs(fd - bxD) < 3.6) continue;
    cyl(S, X(fd), fH * 0.4, fz, 0.13, fH * 0.8, 0x5e4e40);
    blob(S, X(fd), fH, fz, fs, fc);
    blob(S, X(fd) + 0.5, fH - 0.6, fz + 0.4, fs * 0.62, fc);
  }
}

/* --- 学校(3F 校舎+時計・校庭・フェンス・桜並木=#5 連携) --- */
function buildSchool(plot, rng, S, G, W) {
  const { side, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const cz = (z0 + z1) / 2;
  const X = d => side * (xNear + d);
  const out = -side;
  const SNOW = PARAMS.season === 'snow';
  const FENCE_C = 0x7f9188;                      // 緑系ネットフェンス

  // 校庭(土)+白線+朝礼台
  box(S, X(depth / 2), 0.012, cz, depth, 0.04, w, SNOW ? 0xe4e7e9 : 0xc9bfa4);
  if (!SNOW) {
    box(S, X(depth * 0.34), 0.035, cz, 0.14, 0.012, w * 0.5, 0xf0efe8);
    box(S, X(depth * 0.34), 0.035, cz - w * 0.25, depth * 0.32, 0.012, 0.14, 0xf0efe8);
  }
  box(S, X(depth * 0.52), 0.3, cz + w * 0.2, 1.1, 0.6, 1.5, 0xb8bcc0);

  // 校舎(奥・横長 3F・陸屋根)
  const bd = 4.6;
  const bxD = depth - bd / 2 - 0.4;
  const bw = Math.min(w - 2.2, 24);
  const fh = 3.1, H = 3 * fh;
  const wall = 0xdad7ce;
  const fx = X(bxD - bd / 2);                    // 前面(校庭側)壁
  box(S, X(bxD), 0.25, cz, bd + 0.12, 0.5, bw + 0.12, 0x9b968e);
  box(S, X(bxD), 0.5 + H / 2, cz, bd, H, bw, wall);
  box(S, X(bxD), 0.5 + H + 0.25, cz, bd + 0.16, 0.5, bw + 0.16, shade(wall, 0.9));
  box(S, X(bxD + 0.5), 0.5 + H + 0.9, cz - bw * 0.28, 2.4, 0.8, 3.0, 0xb4b8bc);   // 屋上機械室

  // 窓(各階横連続。1F 中央は玄関)+玄関+庇
  for (let f = 1; f <= 3; f++) {
    const cy = 0.5 + (f - 1) * fh + 1.72;
    for (let wz = cz - bw / 2 + 1.7; wz < cz + bw / 2 - 1.5; wz += 2.15) {
      if (f === 1 && Math.abs(wz - cz) < 1.7) continue;
      frontWindow(S, G, W, fx, cy, wz, 1.7, 1.3, out, rng);
    }
  }
  box(S, fx + out * 0.06, 1.25, cz, 0.12, 2.5, 2.4, 0x8a857c);           // 玄関(両開き)
  box(S, fx + out * 0.5, 2.66, cz, 1.0, 0.1, 3.0, shade(wall, 0.82));    // 庇

  // 時計(最上部中央・校庭向き)+掲揚ポール
  clock(S, fx + out * 0.08, 0.5 + H - 0.85, cz, 0.55, [out]);
  cyl(S, X(bxD - bd / 2 - 2.4), 3.6, cz + bw / 2 - 1.2, 0.045, 7.2, 0xaab0b6);

  // フェンス(道路際は正門開口・両側面)+門柱
  const gz = cz;
  for (const [a, b] of [[z0 + 0.15, gz - 1.9], [gz + 1.9, z1 - 0.15]]) {
    const mz = (a + b) / 2, len = b - a;
    box(S, X(0.25), 0.1, mz, 0.16, 0.2, len, 0xb0ada4);
    for (const fy of [0.78, 1.48]) box(S, X(0.25), fy, mz, 0.05, 0.06, len, FENCE_C);
    for (let pz = a + 0.7; pz < b - 0.4; pz += 2.0) {
      box(S, X(0.25), 0.85, pz, 0.06, 1.54, 0.06, FENCE_C);
    }
  }
  for (const zz of [z0 + 0.12, z1 - 0.12]) {
    for (const fy of [0.78, 1.48]) box(S, X(depth * 0.5), fy, zz, depth - 1.2, 0.06, 0.05, FENCE_C);
    for (let dd = 1.2; dd < depth - 0.8; dd += 2.2) {
      box(S, X(dd), 0.85, zz, 0.06, 1.54, 0.06, FENCE_C);
    }
  }
  for (const s2 of [-1, 1]) box(S, X(0.3), 0.8, gz + s2 * 1.9, 0.42, 1.6, 0.42, 0xc5c1b8);

  // 桜並木(フェンス内側・道路寄り。#5 連携=seasonLeaf が季節色を返す)
  const leafC = seasonLeaf();
  for (let tz = z0 + 2.2; tz < z1 - 1.8; tz += 4.2) {
    const tH = rr(rng, 2.6, 3.4);
    const ts = rr(rng, 1.7, 2.3);
    const c1 = pick(rng, leafC), c2 = pick(rng, leafC);
    if (Math.abs(tz - gz) < 2.4) continue;       // 正門前は空ける(rng 消費済み)
    cyl(S, X(1.7), tH * 0.5, tz, 0.13, tH, 0x6e5648);
    blob(S, X(1.7), tH + 0.7, tz, ts, c1);
    blob(S, X(1.7) + 0.5, tH + 0.2, tz + 0.4, ts * 0.62, c2);
  }
}

/* --- 公園(すべり台・ブランコ・砂場・ベンチ・時計柱) --- */
function buildPark(plot, rng, S) {
  const { side, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const cz = (z0 + z1) / 2;
  const X = d => side * (xNear + d);
  const SNOW = PARAMS.season === 'snow';
  const IRON = 0x6a8296;                         // 遊具フレーム(青緑)

  // 敷地(土)+芝の一角
  box(S, X(depth / 2), 0.012, cz, depth, 0.04, w, SNOW ? 0xe4e7e9 : 0xc4bda6);
  box(S, X(depth * 0.7), 0.022, cz + w * 0.3, depth * 0.55, 0.045, w * 0.36, SNOW ? 0xdfe3e4 : 0x9cab7e);

  // 低フェンス(道路際・入口開口)+車止めポール
  const ez = cz - w * 0.18;
  for (const [a, b] of [[z0 + 0.15, ez - 1.2], [ez + 1.2, z1 - 0.15]]) {
    if (b - a < 0.5) continue;
    const mz = (a + b) / 2, len = b - a;
    for (const fy of [0.36, 0.72]) box(S, X(0.22), fy, mz, 0.05, 0.06, len, IRON);
    for (let pz = a + 0.5; pz < b - 0.3; pz += 1.7) box(S, X(0.22), 0.4, pz, 0.07, 0.8, 0.07, IRON);
  }
  cyl(S, X(0.6), 0.35, ez, 0.06, 0.7, 0xc9c5bc);

  // すべり台(階段+頂上台+滑走斜面。滑走方向=-z)
  const slX = X(depth * 0.62), slZ = cz - w * 0.24, slH = 1.8;
  const stepH = slH / 4;
  for (let i = 0; i < 4; i++) {
    const hh = (i + 1) * stepH;
    box(S, slX, hh / 2, slZ + 1.35 - i * 0.34, 0.85, hh, 0.34, 0xc4c8cc);
  }
  box(S, slX, slH + 0.09, slZ - 0.15, 0.9, 0.18, 1.0, 0xc4c8cc);          // 頂上台
  for (const s2 of [-1, 1]) {
    box(S, slX + s2 * 0.42, slH + 0.5, slZ - 0.15, 0.05, 0.66, 1.0, IRON); // 手すり
    box(S, slX + s2 * 0.38, slH / 2, slZ + 0.2, 0.07, slH, 0.07, IRON);    // 支柱
  }
  {
    const len = 2.7, rise = slH - 0.28;
    const ang = -Math.atan2(rise, len);      // Rx 負回転=+z 端(頂上台側)が上がる
    const g = UNIT_BOX.clone();
    g.applyMatrix4(new THREE.Matrix4().makeScale(0.8, 0.09, Math.hypot(len, rise) + 0.3));
    g.applyMatrix4(new THREE.Matrix4().makeRotationX(ang));
    g.translate(slX, (slH + 0.28) / 2 + 0.05, slZ - 0.65 - len / 2);
    S.push(colorize(g, 0xd8dade));
    for (const s2 of [-1, 1]) {                                            // 側板
      const sg = UNIT_BOX.clone();
      sg.applyMatrix4(new THREE.Matrix4().makeScale(0.05, 0.3, Math.hypot(len, rise)));
      sg.applyMatrix4(new THREE.Matrix4().makeRotationX(ang));
      sg.translate(slX + s2 * 0.4, (slH + 0.28) / 2 + 0.14, slZ - 0.65 - len / 2);
      S.push(colorize(sg, IRON));
    }
  }

  // ブランコ(A 脚=tube 斜め線+横バー+チェーン+座板 2)
  const swX = X(depth * 0.35), swZ = cz + w * 0.22, swH = 2.2, swW = 2.8;
  for (const s2 of [-1, 1]) {
    const az = swZ + s2 * swW / 2;
    for (const dx of [-0.75, 0.75]) {
      tube(S, new THREE.LineCurve3(
        new THREE.Vector3(swX + dx, 0.02, az + s2 * 0.2),
        new THREE.Vector3(swX, swH, az)), 0.05, IRON, 2);
    }
  }
  box(S, swX, swH, swZ, 0.09, 0.09, swW, IRON);
  for (const dz of [-0.6, 0.6]) {
    for (const dx of [-0.24, 0.24]) {
      box(S, swX + dx, swH / 2 + 0.32, swZ + dz, 0.028, swH - 0.66, 0.028, 0x9aa0a6);
    }
    box(S, swX, 0.66, swZ + dz, 0.55, 0.06, 0.26, 0x8a5f3e);
  }

  // 砂場(枠 4 辺+砂)
  const sbX = X(depth * 0.3), sbZ = cz - w * 0.3, sbS = 2.6;
  for (const s2 of [-1, 1]) {
    box(S, sbX + s2 * (sbS / 2 - 0.11), 0.1, sbZ, 0.22, 0.2, sbS, 0xcdc9c0);
    box(S, sbX, 0.1, sbZ + s2 * (sbS / 2 - 0.11), sbS - 0.44, 0.2, 0.22, 0xcdc9c0);
  }
  box(S, sbX, 0.06, sbZ, sbS - 0.4, 0.14, sbS - 0.4, SNOW ? 0xe8eaec : 0xdccfa8);

  // ベンチ 2 基(道路寄り・道路向き)
  for (const bz of [cz + w * 0.38, cz - w * 0.38]) {
    const bX = X(depth * 0.18);
    box(S, bX, 0.42, bz, 0.44, 0.06, 1.5, 0x8a6a48);
    box(S, bX + side * 0.19, 0.7, bz, 0.06, 0.6, 1.5, 0x8a6a48);
    for (const dz of [-0.55, 0.55]) box(S, bX, 0.2, bz + dz, 0.38, 0.4, 0.08, 0x6a6e72);
  }

  // 時計柱(両面)
  const ckX = X(depth * 0.42), ckZ = cz + w * 0.4;
  cyl(S, ckX, 1.6, ckZ, 0.05, 3.2, 0x8a8e92);
  clock(S, ckX, 3.4, ckZ, 0.32, [1, -1]);

  // 木(季節連動)+低木
  const leafC = seasonLeaf();
  for (let i = 0; i < 2; i++) {
    const tz = rr(rng, z0 + 1.6, z1 - 1.6);
    const td = rr(rng, depth * 0.72, depth * 0.92);
    const tH = rr(rng, 2.6, 3.4);
    const ts = rr(rng, 1.8, 2.4);
    const c1 = pick(rng, leafC);
    cyl(S, X(td), tH * 0.5, tz, 0.12, tH, PAL.trunk);
    blob(S, X(td), tH + 0.8, tz, ts, c1);
  }
  for (const dz of [w * 0.12, -w * 0.42]) {
    blob(S, X(depth * 0.88), 0.42, cz + dz, 0.9, pick(rng, PAL.hedge));
  }
}

/* ============================================================
   駅(#9: 単式ホーム・平屋駅舎・跨線橋・駅前ロータリー)
   配置は決定的(メイン rng に一切触れない)。station のみ呼ばれる
============================================================ */
function buildStation(layout, S, G, W, SIGN, D, GLOW) {
  const st = layout.station;
  const rz = st.rz;
  const SNOW = PARAMS.season === 'snow';
  const IRON = 0x7a8288;

  /* x-y 面内の斜め板(跨線橋の階段・手すり用)。Rz 正回転=+x 端が上がる */
  const slope = (x0, y0, x1, y1, z, thick, w2, hex) => {
    const g = UNIT_BOX.clone();
    g.applyMatrix4(new THREE.Matrix4().makeScale(Math.hypot(x1 - x0, y1 - y0), thick, w2));
    g.applyMatrix4(new THREE.Matrix4().makeRotationZ(Math.atan2(y1 - y0, x1 - x0)));
    g.translate((x0 + x1) / 2, (y0 + y1) / 2, z);
    S.push(colorize(g, hex));
  };

  /* --- 単式ホーム(線路の +z 側) --- */
  const pfX0 = 10, pfX1 = 52, pfH = 0.9;
  const pfZ0 = rz + 1.95, pfZ1 = rz + 5.1;
  const pfCx = (pfX0 + pfX1) / 2, pfCz = (pfZ0 + pfZ1) / 2;
  box(S, pfCx, pfH / 2, pfCz, pfX1 - pfX0, pfH, pfZ1 - pfZ0, 0xc9c6bd);            // ホーム体
  box(S, pfCx, pfH + 0.008, pfCz, pfX1 - pfX0, 0.016, pfZ1 - pfZ0 - 0.2, SNOW ? 0xe4e7e9 : 0xbdbab2);
  box(S, pfCx, pfH + 0.022, rz + 2.55, pfX1 - pfX0 - 1, 0.014, 0.3, 0xf2c83e);     // 点字ブロック
  box(S, pfCx, pfH + 0.02, rz + 2.22, pfX1 - pfX0 - 1, 0.012, 0.12, 0xf0efe8);     // 縁白線

  /* ホーム屋根(中央部: 柱+梁+片流れ。Rx 正回転=+z 端が下がる=広場側へ水勾配) */
  for (let px = 18; px <= 38; px += 5) {
    cyl(S, px, pfH + 1.35, rz + 4.35, 0.07, 2.7, IRON);
  }
  box(S, 28, pfH + 2.62, rz + 4.35, 21, 0.09, 0.12, IRON);                          // 梁
  {
    const g = UNIT_BOX.clone();
    g.applyMatrix4(new THREE.Matrix4().makeScale(22.5, 0.08, 3.3));
    g.applyMatrix4(new THREE.Matrix4().makeRotationX(0.13));
    g.translate(28, pfH + 2.82, rz + 3.85);
    S.push(colorize(g, 0x6d747c));
  }

  /* ホーム備品: ベンチ・時刻表・駅名標・照明(夜グロー) */
  for (const bx of [22, 34]) {
    box(S, bx, pfH + 0.38, rz + 4.55, 1.6, 0.06, 0.42, 0x8a6a48);
    for (const dx of [-0.6, 0.6]) box(S, bx + dx, pfH + 0.19, rz + 4.55, 0.08, 0.38, 0.36, 0x6a6e72);
  }
  box(S, 30.5, pfH + 1.18, rz + 4.78, 1.1, 0.84, 0.06, 0xeceae2);                   // 時刻表板
  signPlane(SIGN, 'jikoku', 30.5, pfH + 1.18, rz + 4.74, 0.62, 0.76, Math.PI);
  for (const px of [29.98, 31.02]) cyl(S, px, pfH + 0.42, rz + 4.78, 0.03, 0.84, IRON);
  for (const ex of [14, 46]) {                                                      // 駅名標(両面)
    for (const dx of [-0.8, 0.8]) cyl(S, ex + dx, pfH + 0.92, rz + 3.1, 0.04, 1.84, 0xd8d6ce);
    box(S, ex, pfH + 1.6, rz + 3.1, 1.92, 0.68, 0.07, 0xf0efe9);
    signPlane(SIGN, 'ekimei', ex, pfH + 1.6, rz + 3.055, 1.8, 0.6, Math.PI);
    signPlane(SIGN, 'ekimei', ex, pfH + 1.6, rz + 3.145, 1.8, 0.6, 0);
  }
  for (const lx of [20, 28, 36]) {                                                  // 屋根下蛍光灯
    box(S, lx, pfH + 2.42, rz + 3.7, 1.1, 0.07, 0.16, 0xe8e8e4);
    GLOW.pos.push(lx, pfH + 2.36, rz + 3.7);
    GLOW.col.push(0.95, 0.95, 0.85);
    decal(D, lx, pfH + 0.05, rz + 3.7, 2.6, 0xfff2cc);
  }

  /* --- 駅舎(平屋・寄棟・改札開口が正面/背面を貫通) --- */
  const bX0 = 22, bX1 = 34, bZ0 = pfZ1, bZ1 = pfZ1 + 6.2;
  const bCx = (bX0 + bX1) / 2, bCz = (bZ0 + bZ1) / 2, bW = bX1 - bX0, bD = bZ1 - bZ0;
  const wallC = 0xe6e1d4, H = 3.4;
  box(S, bCx, 0.22, bCz, bW + 0.15, 0.44, bD + 0.15, 0x9b968e);                     // 基礎
  const doorW = 2.6;
  for (const zf of [bZ1 - 0.075, bZ0 + 0.075]) {                                    // 正面(+z)・背面(ホーム)
    box(S, (bX0 + bCx - doorW / 2) / 2, 0.44 + H / 2, zf, bCx - doorW / 2 - bX0, H, 0.15, wallC);
    box(S, (bCx + doorW / 2 + bX1) / 2, 0.44 + H / 2, zf, bX1 - bCx - doorW / 2, H, 0.15, wallC);
    box(S, bCx, 0.44 + H - 0.42, zf, doorW, 0.84, 0.15, wallC);                     // 垂れ壁
  }
  for (const xf of [bX0 + 0.075, bX1 - 0.075]) {                                    // 側壁
    box(S, xf, 0.44 + H / 2, bCz, 0.15, H, bD, wallC);
  }
  hipRoof(S, bCx, 0.44 + H, bCz, bW + 1.5, bD + 1.5, 1.2, 0x5f6772);                // 寄棟(棟=x 長軸)
  // 正面まわり: 駅名板・庇・出札窓・ポスト・自販機
  box(S, bCx, 0.44 + H - 0.95, bZ1 + 0.35, doorW + 1.6, 0.09, 0.9, 0x6d747c);       // 庇
  box(S, bCx, 0.44 + H - 0.35, bZ1 + 0.06, 3.4, 0.62, 0.1, 0xf0eee6);               // 駅名板の下地
  signPlane(SIGN, 'stName', bCx, 0.44 + H - 0.35, bZ1 + 0.115, 3.24, 0.56, 0);
  box(G, bCx - 3.1, 0.44 + 1.5, bZ1 + 0.005, 1.7, 1.15, 0.045, PAL.glassDay);       // 出札窓(夜点灯)
  W.push({ gi: G.length - 1, kind: 'shop' });
  box(G, bX0 + 0.02, 0.44 + 1.55, bCz, 0.045, 1.15, 2.4, PAL.glassDay);             // 側面窓
  W.push({ gi: G.length - 1, kind: 'shop' });
  box(G, bX1 - 0.02, 0.44 + 1.55, bCz, 0.045, 1.15, 2.4, PAL.glassDay);
  W.push({ gi: G.length - 1, kind: 'shop' });
  cyl(S, bX1 + 1.3, 0.62, bZ1 + 1.1, 0.17, 1.0, 0xc0392e);                          // 丸ポスト
  cyl(S, bX1 + 1.3, 1.2, bZ1 + 1.1, 0.19, 0.16, 0xa83226);
  box(S, bX0 - 1.4, 0.92, bZ1 + 0.75, 0.72, 1.84, 1.05, 0xd8dcde);                  // 自販機
  box(G, bX0 - 1.4, 1.15, bZ1 + 1.29, 0.85, 1.05, 0.05, 0xd8e4ea);
  W.push({ gi: G.length - 1, kind: 'vend' });
  decal(D, bCx, 0.045, bZ1 + 1.6, 3.4, 0xffe9c0);                                   // 夜の駅明かりだまり
  GLOW.pos.push(bCx, 0.44 + H - 0.9, bZ1 + 0.3);
  GLOW.col.push(1, 0.9, 0.7);
  // 改札ラッチ(背面=ホーム側の通路)
  for (const dx of [-0.7, 0.1, 0.9]) {
    box(S, bCx + dx, 0.44 + 0.45, bZ0 - 0.55, 0.14, 0.9, 1.1, 0xb8bcc2);
  }
  // ホームへのスロープ(駅舎背面開口 → ホーム面)
  box(S, bCx, pfH / 2 + 0.22, bZ0 + 0.0, doorW + 0.8, pfH, 1.2, 0xc9c6bd);

  /* --- 跨線橋(線路を跨いで駅裏へ。柱+桁+手すり壁+階段 2 基) --- */
  const fbX = 45, fbY = 4.7, fbZ0 = rz - 6.4, fbZ1 = rz + 3.6;
  for (const [px, pz] of [[fbX - 0.75, fbZ0 + 0.5], [fbX + 0.75, fbZ0 + 0.5], [fbX - 0.75, fbZ1 - 0.5], [fbX + 0.75, fbZ1 - 0.5]]) {
    box(S, px, fbY / 2, pz, 0.16, fbY, 0.16, IRON);                                 // 支柱
  }
  box(S, fbX, fbY, (fbZ0 + fbZ1) / 2, 2.0, 0.22, fbZ1 - fbZ0, 0x8a9096);            // 桁
  for (const dx of [-0.92, 0.92]) {
    box(S, fbX + dx, fbY + 0.62, (fbZ0 + fbZ1) / 2, 0.08, 1.0, fbZ1 - fbZ0, 0x9aa2a8);   // 手すり壁
  }
  // 階段: ホーム側(+z)は x+ へ、駅裏側(-z)も x+ へ降りる
  slope(fbX + 1.0, fbY, fbX + 5.6, pfH + 0.05, fbZ1 - 0.9, 0.14, 1.7, 0x8a9096);
  slope(fbX + 1.0, fbY + 1.0, fbX + 5.6, pfH + 1.05, fbZ1 - 1.72, 0.06, 0.06, IRON);      // 手すり
  slope(fbX + 1.0, fbY + 1.0, fbX + 5.6, pfH + 1.05, fbZ1 - 0.08, 0.06, 0.06, IRON);
  slope(fbX + 1.0, fbY, fbX + 6.4, 0.05, fbZ0 + 0.9, 0.14, 1.7, 0x8a9096);
  slope(fbX + 1.0, fbY + 1.0, fbX + 6.4, 1.05, fbZ0 + 1.72, 0.06, 0.06, IRON);
  slope(fbX + 1.0, fbY + 1.0, fbX + 6.4, 1.05, fbZ0 + 0.08, 0.06, 0.06, IRON);

  /* --- 駅前ロータリー --- */
  const rX0 = st.x0 + 0.6, rX1 = 38, rZ0 = bZ1 + 0.9, rZ1 = st.z1 - 0.5;
  box(S, (rX0 + rX1) / 2, 0.032, (rZ0 + rZ1) / 2, rX1 - rX0, 0.05, rZ1 - rZ0, SNOW ? 0xc4c6c9 : PAL.asphalt);
  // 中央島(縁石+植栽+駅前時計)
  const ciX = 20, ciZ = (rZ0 + rZ1) / 2;
  cyl(S, ciX, 0.1, ciZ, 3.1, 0.16, 0xd8d7d4);
  cyl(S, ciX, 0.16, ciZ, 2.7, 0.12, SNOW ? 0xdfe3e4 : 0x9cab7e);
  blob(S, ciX - 1.1, 0.55, ciZ + 0.7, 1.0, pick0(PAL.hedge));
  blob(S, ciX + 0.9, 0.5, ciZ - 0.8, 0.9, pick0(PAL.hedge, 1));
  cyl(S, ciX, 1.7, ciZ, 0.055, 3.4, 0x8a8e92);                                      // 駅前時計柱
  clock(S, ciX, 3.6, ciZ, 0.34, [1, -1]);
  // バス停(標識+ベンチ)+タクシー区画白線+客待ちタクシー
  const bsX = rX0 + 1.6, bsZ = rZ0 + 1.4;
  cyl(S, bsX, 1.15, bsZ, 0.035, 2.3, IRON);
  cylX(S, bsX, 2.45, bsZ, 0.34, 0.06, 0xe8e6de, Math.PI / 2);                       // 円板(バス停標識)
  box(S, bsX + 1.6, 0.38, bsZ, 1.5, 0.06, 0.4, 0x8a6a48);
  for (const dx of [-0.55, 0.55]) box(S, bsX + 1.6 + dx, 0.19, bsZ, 0.08, 0.38, 0.34, 0x6a6e72);
  for (let i = 0; i < 3; i++) {                                                     // タクシー区画白線
    box(S, 29 + i * 2.6, 0.062, rZ1 - 2.4, 0.12, 0.012, 4.2, 0xeeeeea);
  }
  clayCar(S, 30.3, 0.07, rZ1 - 2.6, Math.PI / 2, 0xe8e8e6);                         // 客待ちタクシー
  clayCar(S, 32.9, 0.07, rZ1 - 2.2, Math.PI / 2, 0xe8e8e6);
  // 広場外周の車止めポール(道路側)
  for (let pz = rZ0 + 0.6; pz < rZ1 - 0.4; pz += 2.6) {
    cyl(S, rX0 + 0.25, 0.38, pz, 0.055, 0.76, 0xc9c5bc);
  }
}
/* pick の rng 非依存版(駅は決定的配置なので index 直指定) */
function pick0(arr, i = 0) { return arr[i % arr.length]; }

/* --- 粘土自転車(商店街の店前) --- */
function clayBike(S, cx, cz, ry) {
  const c = Math.cos(ry), s2 = Math.sin(ry);
  const px = (dx, dz) => [cx + c * dx + s2 * dz, cz - s2 * dx + c * dz];
  for (const dz of [-0.52, 0.52]) {
    const [wx, wz] = px(0, dz);
    cylX(S, wx, 0.3, wz, 0.3, 0.035, 0x2e3034, ry);   // 車軸=進行に直交(横向き)
  }
  box(S, cx, 0.55, cz, 0.05, 0.05, 1.0, 0x4a5058, ry);        // トップチューブ
  const [sx1, sz1] = px(0, -0.3);
  box(S, sx1, 0.78, sz1, 0.24, 0.05, 0.1, 0x2e3034, ry);      // サドル
  cyl(S, sx1, 0.66, sz1, 0.02, 0.24, 0x4a5058);
  const [hx1, hz1] = px(0, 0.42);
  box(S, hx1, 0.82, hz1, 0.36, 0.035, 0.035, 0x4a5058, ry);   // ハンドル
  cyl(S, hx1, 0.68, hz1, 0.02, 0.3, 0x4a5058);
  const [kx1, kz1] = px(0, 0.62);
  box(S, kx1, 0.72, kz1, 0.26, 0.18, 0.24, 0x8a8e92, ry);     // カゴ
}

/* --- 商店(1F=店front / 2F+=住居。setback 無視で道路に接する) --- */
const SHOP_KEY_COUNT = 8;
function buildShop(plot, rng, S, G, W, SIGN) {
  const { side, z0, z1, xNear } = plot;
  const w = z1 - z0;
  const bw = w - rr(rng, 0.25, 0.7);
  const bd = rr(rng, 7, 10);
  const floors = pick(rng, [2, 2, 2, 3]);
  const fh = 2.9;
  const H = floors * fh + 0.15;
  const cx = side * (xNear + bd / 2);
  const cz = (z0 + z1) / 2;
  const wall = pick(rng, [0xe8e2d6, 0xdcd6cc, 0xd8d0c0, 0xcfc8bc, 0xc9beb0, 0xb8ada2]);
  const frontX = side * xNear;
  const out = -side;

  box(S, cx, H / 2, cz, bd, H, bw, wall);
  box(S, cx, H + 0.22, cz, bd + 0.12, 0.44, bw + 0.12, shade(wall, 0.92));   // パラペット

  const sfW = bw - 0.5, sfH = 2.45;
  const isShut = rng() < PARAMS.shutterRatio;
  if (isShut) {
    // シャッター(横縞スラット)
    const nSlat = 7;
    for (let i = 0; i < nSlat; i++) {
      box(S, frontX + out * 0.05, 0.14 + (sfH / nSlat) * (i + 0.5), cz,
          0.06, sfH / nSlat - 0.025, sfW, i % 2 ? 0xb4b4b0 : 0xacaca8);
    }
    box(S, frontX + out * 0.08, sfH + 0.36, cz, 0.14, 0.4, sfW + 0.2, 0x8e8e8a);  // シャッターボックス
  } else {
    // 開店: 大ガラス(店明かり)+庇テント+置き看板+自転車
    box(S, frontX + out * 0.03, 0.14 + sfH / 2, cz, 0.08, sfH + 0.12, sfW + 0.18, 0x8a857c);
    box(G, frontX + out * 0.085, 0.14 + sfH / 2, cz, 0.045, sfH - 0.15, sfW - 0.12, PAL.glassDay);
    W.push({ gi: G.length - 1, kind: 'shop' });
    const awnC = pick(rng, [0x8a4a3e, 0x3e5a4a, 0x3e4a6a, 0xb0895a, 0x71424f, 0x4a5e6a]);
    box(S, frontX + out * 0.6, sfH + 0.5, cz, 1.2, 0.07, sfW + 0.35, awnC);       // 庇テント
    box(S, frontX + out * 1.12, sfH + 0.33, cz, 0.06, 0.3, sfW + 0.35, shade(awnC, 0.85)); // 前垂れ
    if (PARAMS.signs && rng() < 0.6) {
      const bz = cz + rr(rng, -bw * 0.28, bw * 0.28);
      const key = rng() < 0.5 ? 'aboard0' : 'aboard1';
      box(S, frontX + out * 0.62, 0.42, bz, 0.05, 0.8, 0.5, 0xe8e6de, 0.25 * side);   // 店先(路肩内)
      signPlane(SIGN, key, frontX + out * (0.62 + 0.035), 0.44, bz, 0.46, 0.68,
                (side > 0 ? -Math.PI / 2 : Math.PI / 2) + 0.25 * side);
    }
    if (rng() < 0.45) clayBike(S, frontX + out * 0.58, z0 + rr(rng, 0.6, 1.2), rr(rng, -0.3, 0.3));
  }

  // 袖看板(内照: G 発光面+L2 文字。夜に光る)
  if (PARAMS.signs && rng() < 0.85) {
    const sy = 0.3 + H * 0.58, sh = 1.55;
    const sz2 = cz + (rng() < 0.5 ? -1 : 1) * bw * 0.32;
    box(S, frontX + out * 0.38, sy, sz2, 0.72, sh + 0.12, 0.18, 0x8a857c);
    box(G, frontX + out * 0.38, sy, sz2, 0.64, sh, 0.12, 0xf2ecd8);
    W.push({ gi: G.length - 1, kind: 'shop' });
    const key = 'shop' + (plot.sub % SHOP_KEY_COUNT);
    signPlane(SIGN, key, frontX + out * 0.38, sy, sz2 + 0.092, 0.56, sh * 0.94, 0);
    signPlane(SIGN, key, frontX + out * 0.38, sy, sz2 - 0.092, 0.56, sh * 0.94, Math.PI);
  }

  // 2F+ の住居窓
  for (let f = 2; f <= floors; f++) {
    const cy = 0.15 + (f - 1) * fh + 1.42;
    const nWin = bw > 5.2 ? 2 : 1;
    for (let i = 0; i < nWin; i++) {
      const wz = cz + (nWin === 1 ? rr(rng, -0.5, 0.5) : (i - 0.5) * bw * 0.44);
      frontWindow(S, G, W, frontX, cy, wz, 1.15, 1.0, out, rng);
    }
  }
  // 室外機(2F 壁)
  if (rng() < 0.6) box(S, frontX + out * 0.25, fh + 1.0, cz + bw * 0.38, 0.3, 0.55, 0.78, 0xe0e0dc);

  plot.house = { cx, cz, bd, bw, H, floors, fh, wall, isShop: true };
}

/* --- アパート(3F・陸屋根・バルコニー連続) --- */
function buildApt(plot, rng, S, G, W, SIGN) {
  const { side, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const bw = w - 0.9, bd = Math.min(8.5, depth - PARAMS.setback - 1.5);
  const floors = 3, fh = 2.7, H = floors * fh;
  const cx = side * (xNear + PARAMS.setback + bd / 2);
  const cz = (z0 + z1) / 2;
  const wall = pick(rng, [0xe4e0d6, 0xd8d4cc, 0xcfd2d6]);
  const frontX = side * (xNear + PARAMS.setback);

  box(S, cx, 0.25, cz, bd + 0.1, 0.5, bw + 0.1, 0x9b968e);
  box(S, cx, 0.5 + H / 2, cz, bd, H, bw, wall);
  box(S, cx, 0.5 + H + 0.28, cz, bd + 0.15, 0.56, bw + 0.15, wall);
  box(S, cx, 0.5 + H / 2, z1 - 0.3, bd * 0.4, H, 1.4, 0xb7bcc2);  // 外階段の箱

  // 各階バルコニー(前面連続)+窓 2-3
  const out = -side;
  const blen = bw - 1.8;
  const units = Math.max(2, Math.floor(blen / 3));
  for (let f = 1; f <= floors; f++) {
    const by = 0.5 + (f - 1) * fh;
    box(S, frontX + out * 0.45, by + 0.05, cz - 0.6, 0.95, 0.1, blen, wall);
    box(S, frontX + out * 0.88, by + 0.58, cz - 0.6, 0.07, 0.96, blen, 0xaab0b6);
    for (let u = 0; u < units; u++) {
      const wz = cz - 0.6 + (u - (units - 1) / 2) * (blen / units);
      frontWindow(S, G, W, frontX, by + 1.4, wz, 1.5, 1.7, out, rng);
      if (rng() < 0.5) box(S, frontX + out * 0.6, by + 0.35, wz + 0.9, 0.28, 0.52, 0.75, 0xe4e4e0); // 室外機
    }
  }
  // 建物名プレート(前面壁の上部)
  if (SIGN && PARAMS.signs) {
    const key = rng() < 0.5 ? 'apt1' : 'apt2';
    signPlane(SIGN, key, frontX + out * 0.03, 0.5 + H - 0.65, cz + bw * 0.28, 2.1, 0.48,
              side > 0 ? -Math.PI / 2 : Math.PI / 2);
  }
  plot.house = { cx, cz, bd, bw, H, floors, fh, wall, isApt: true };
}

/* ============================================================
   #11 海外ロケーション — 建築様式パック(欧州旧市街 / 米郊外 / アジア密集街)
============================================================ */

/* --- 欧州旧市街(パリ/南欧風): 連棟組積造 4-6F・鎧戸・マンサード屋根・1F カフェ --- */
const EURO_WALLS = [0xe4d8c4, 0xdcc9a8, 0xd8c2b0, 0xcabfa4, 0xe0cdb2, 0xc9b89e, 0xd6bfa0];
const EURO_ROOFS = [0x5a5e63, 0x6a5048, 0x515560, 0x4e4a44];   // 亜鉛/スレート
const EURO_SHUT  = [0x5a6b52, 0x4a5a6a, 0x8a5a3e, 0x6a4a58, 0x46504a];
function buildEuroBlock(plot, rng, S, G, W, SIGN) {
  const { side, row, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const bw = w + 0.02;                          // 連棟=間口いっぱい(隣と接する)
  const bd = Math.min(rr(rng, 9, 12), depth - 1.5);
  const floors = pick(rng, [4, 4, 5, 5, 6]);
  const fh = 3.0;
  const H = floors * fh + 0.6;
  const cx = side * (xNear + bd / 2);
  const cz = (z0 + z1) / 2;
  const wall = pick(rng, EURO_WALLS);
  const frontX = side * xNear;
  const out = -side;
  const shut = pick(rng, EURO_SHUT);

  // 基壇+本体+階間コーニス(石の水平線=LINE で組積造に見える)
  box(S, cx, 0.3, cz, bd + 0.1, 0.6, bw + 0.02, shade(wall, 0.88));
  box(S, cx, 0.6 + H / 2, cz, bd, H, bw, wall);
  for (let f = 1; f < floors; f++) {
    box(S, frontX + out * 0.04, 0.6 + f * fh, cz, 0.16, 0.12, bw, shade(wall, 0.9));   // コーニス帯
  }
  box(S, frontX + out * 0.06, 0.6 + H - 0.35, cz, 0.2, 0.5, bw + 0.1, shade(wall, 0.82));  // 軒コーニス

  // マンサード屋根(急勾配の寄棟=パリの屋根線)+ルカルヌ(前面の裾に接地)+煙突
  const mBase = 0.6 + H;
  const roofC = pick(rng, EURO_ROOFS);
  hipRoof(S, cx, mBase, cz, bd + 0.3, bw + 0.3, 1.75, roofC);
  const nDorm = Math.max(1, Math.round(bw / 3.4));
  for (let i = 0; i < nDorm; i++) {
    const dz = cz + (i - (nDorm - 1) / 2) * (bw / (nDorm + 0.3));
    box(S, frontX + out * 0.02, mBase + 0.55, dz, 0.44, 0.95, 0.66, shade(wall, 0.96));   // 前壁面と面一
    box(G, frontX + out * 0.09, mBase + 0.55, dz, 0.05, 0.62, 0.44, PAL.glassDay);
    W.push({ gi: G.length - 1, kind: 'win', litAt: 17.5 + rng() * 4 });
    box(S, frontX + out * 0.06, mBase + 1.08, dz, 0.5, 0.12, 0.72, shade(roofC, 0.9));     // 小庇
  }
  for (const cz2 of [cz - bw * 0.3, cz + bw * 0.32]) {   // 煙突(たまに)
    if (rng() < 0.5) continue;
    box(S, cx + rr(rng, -bd * 0.15, bd * 0.15), mBase + 1.5, cz2, 0.4, 1.0, 0.5, shade(wall, 0.7));
  }

  // 各階の縦長窓(鎧戸つき)+2F の錬鉄バルコニー。1F は店舗/入口なので 2F から
  const nWin = Math.max(2, Math.round(bw / 2.2));
  for (let f = 2; f <= floors; f++) {
    const cy = 0.6 + (f - 1) * fh + fh * 0.55;
    const wh = 1.7, ww = 0.95;
    for (let i = 0; i < nWin; i++) {
      const wz = cz + (i - (nWin - 1) / 2) * (bw / nWin);
      box(S, frontX + out * 0.04, cy, wz, 0.14, wh + 0.24, ww + 0.24, shade(wall, 0.8));   // 窓枠石
      box(G, frontX + out * 0.11, cy, wz, 0.03, wh, ww, PAL.glassDay);
      W.push({ gi: G.length - 1, kind: 'win', litAt: 17.2 + (f + i) % 4 * 0.9 });
      // 鎧戸(左右に開いた板)
      for (const s3 of [1, -1]) {
        box(S, frontX + out * 0.13, cy, wz + s3 * (ww * 0.62), 0.04, wh, ww * 0.5, shut);
      }
      if (f === 2) {   // 2F はフレンチバルコニー(手すり)
        box(S, frontX + out * 0.22, cy - wh * 0.5 - 0.1, wz, 0.3, 0.06, ww + 0.5, 0x2e2e30);
        for (let b = 0; b < 5; b++) box(S, frontX + out * 0.3, cy - wh * 0.5 + 0.25, wz - (ww + 0.4) / 2 + b * (ww + 0.4) / 4, 0.04, 0.55, 0.03, 0x2e2e30);
        box(S, frontX + out * 0.36, cy - wh * 0.5 + 0.5, wz, 0.05, 0.05, ww + 0.5, 0x2e2e30);
      }
    }
  }

  // 1F: カフェ(大ガラス+オーニング+路上席)or 住居入口
  const isCafe = row === 0 && rng() < 0.55;
  if (isCafe) {
    box(S, frontX + out * 0.02, 1.3, cz, 0.06, 2.4, bw - 0.5, 0x3a3128);   // 店構えの枠
    box(G, frontX + out * 0.09, 1.25, cz, 0.04, 2.0, bw - 0.9, 0x2a323a);  // ガラス(店内)
    W.push({ gi: G.length - 1, kind: 'shop' });
    const awnC = pick(rng, [0x8a3a30, 0x2e5a44, 0x30405e, 0x6a5030]);
    box(S, frontX + out * 0.9, 2.55, cz, 1.7, 0.08, bw - 0.3, awnC);       // オーニング
    box(S, frontX + out * 1.72, 2.28, cz, 0.05, 0.5, bw - 0.3, shade(awnC, 0.85));   // 前垂れ
    if (PARAMS.signs) { const key = 'cafe' + (plot.sub % EURO_CAFE_COUNT);
      box(S, frontX + out * 0.07, 2.95, cz, 0.05, 0.5, Math.min(3.2, bw - 1), 0x2a2622);
      signPlane(SIGN, key, frontX + out * 0.1, 2.95, cz, Math.min(3.0, bw - 1.2), 0.42, out > 0 ? 0 : Math.PI); }
    // 路上席(小丸テーブル+椅子)
    for (let t = 0; t < Math.min(3, Math.floor(bw / 2.2)); t++) {
      const tz = z0 + 1.4 + t * 2.1, tx = frontX + out * 1.9;
      cyl(S, tx, 0.38, tz, 0.28, 0.05, 0xdedad0); cyl(S, tx, 0.19, tz, 0.04, 0.38, 0x8a8680);
      for (const cxo of [-0.55, 0.55]) { cyl(S, tx + cxo * 0.7, 0.22, tz, 0.16, 0.44, 0x6a5a48); box(S, tx + cxo * 0.7, 0.5, tz, 0.3, 0.3, 0.05, 0x6a5a48); }
    }
  } else {
    box(S, frontX + out * 0.05, 1.25, cz + rr(rng, -bw * 0.2, bw * 0.2), 0.1, 2.5, 1.3, 0x4a3e34);  // 大扉
    box(S, frontX + out * 0.12, 2.6, cz, 0.12, 0.2, bw, shade(wall, 0.75));                          // まぐさ
  }

  plot.house = { cx, cz, bd, bw, H, floors, fh, wall };
}

/* --- 米郊外(サバービア): 木造 2F+ポーチ・前庭芝生・ドライブウェイ・ピケットフェンス --- */
const SUB_WALLS = [0xdfe2df, 0xd6cebe, 0xcdd6d2, 0xe0d2c0, 0xbcc8c2, 0xd0d4d8, 0xc8bca8];
function buildSuburbHouse(plot, rng, S, G, W, SIGN) {
  const { side, row, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const SNOW = PARAMS.season === 'snow';
  const cx0 = side * xNear, cz = (z0 + z1) / 2;
  // 前庭の芝生(雪なら雪原)
  box(S, side * (xNear + depth / 2), 0.014, cz, depth, 0.04, w - 0.4, SNOW ? 0xe6e9ea : 0x8fa86a);

  const bw = Math.min(w - 2.4, 9.5);
  const bd = rr(rng, 7, 9);
  const setb = depth * 0.42;                    // 深い前庭
  const cx = side * (xNear + setb + bd / 2);
  const floors = pick(rng, [1, 2, 2, 2]);
  const fh = 2.8, H = floors * fh;
  const wall = pick(rng, SUB_WALLS);
  const roof = pick(rng, SNOW ? SNOW_ROOFS : [0x6a5048, 0x5a5e63, 0x4e4a44, 0x7a6a58]);
  const frontX = side * (xNear + setb);
  const out = -side;

  box(S, cx, 0.25, cz, bd + 0.1, 0.5, bw + 0.1, shade(wall, 0.85));
  box(S, cx, 0.5 + H / 2, cz, bd, H, bw, wall);
  gableRoof(S, cx, 0.5 + H, cz, bd + 0.7, bw + 0.7, rr(rng, 1.4, 2.0), roof);   // 切妻(妻が前)

  // ポーチ(前面に張り出し・柱+屋根)
  const porchD = 1.6;
  box(S, frontX + out * (porchD * 0.5), 0.28, cz, porchD, 0.14, bw * 0.8, shade(wall, 0.9));
  for (const dz of [-bw * 0.36, bw * 0.36]) {   // ポーチ柱(左右 2 本)
    box(S, frontX + out * (porchD - 0.15), 1.2, cz + dz, 0.12, 2.2, 0.12, 0xf0eee8);
  }
  box(S, frontX + out * (porchD * 0.55), 2.45, cz, porchD + 0.3, 0.12, bw * 0.85, roof);
  box(S, frontX + out * 0.06, 1.2, cz + rr(rng, -bw * 0.15, bw * 0.15), 0.1, 2.1, 1.0, pick(rng, [0x8a3a30, 0x2e4a6a, 0x3a5a44, 0x5a4a6a]));  // ドア(色)

  // 窓(シャッター無し・白枠)+切妻の妻窓
  for (let f = 1; f <= floors; f++) {
    const cy = 0.5 + (f - 1) * fh + 1.4;
    for (const dz of [-bw * 0.26, bw * 0.26]) {
      box(S, frontX + out * 0.03, cy, cz + dz, 0.12, 1.4, 1.15, 0xf2f0ea);
      box(G, frontX + out * 0.09, cy, cz + dz, 0.03, 1.15, 0.92, PAL.glassDay);
      W.push({ gi: G.length - 1, kind: 'win', litAt: 17.6 + rng() * 3.5 });
    }
  }

  // ドライブウェイ+ガレージ(横)
  const dwx = side * (xNear + rr(rng, 2, depth * 0.5));
  box(S, side * (xNear + depth * 0.32), 0.02, z1 - 1.6, depth * 0.6, 0.04, 2.8, SNOW ? 0xdfe2e4 : 0xbdbbb4);
  if (rng() < 0.6) clayCar(S, side * (xNear + depth * 0.4), 0.02, z1 - 1.6, 0, pick(rng, CAR_COLORS));

  // ピケットフェンス(前面・道路際)+メールボックス
  if (row === 0) {
    const fx = side * (xNear + 0.2);
    for (let pz = z0 + 0.4; pz < z1 - 0.3; pz += 0.42) {
      box(S, fx, 0.42, pz, 0.06, 0.84, 0.16, 0xf0eee6);   // 杭
    }
    box(S, fx, 0.66, cz, 0.05, 0.05, w - 0.6, 0xe8e6de);  // 横桟
    if (PARAMS.signs) {   // メールボックス
      const mz = z0 + 1.0;
      cyl(S, side * (xNear + 0.5), 0.5, mz, 0.05, 1.0, 0x5a5e62);
      box(S, side * (xNear + 0.5), 1.05, mz, 0.5, 0.28, 0.22, pick(rng, [0x2e4a6a, 0x8a3a30, 0x3a3e44]));
    }
  }
  // 庭木
  for (let i = 0; i < 1 + Math.floor(rng() * 2); i++) {
    const tx = side * (xNear + rr(rng, depth * 0.15, depth * 0.35));
    const tz = rr(rng, z0 + 1, z1 - 1), th = rr(rng, 2.6, 4.2);
    cyl(S, tx, th * 0.45, tz, 0.13, th * 0.9, 0x6a5644);
    blob(S, tx, th + 0.2, tz, rr(rng, 1.6, 2.4), pick(rng, seasonLeaf()));
  }
  plot.house = { cx, cz, bd, bw, H, floors, fh, wall };
}

/* --- アジア密集街(香港/九龍風): 高層雑居ビル・突き出し看板・室外機の壁・ネオン --- */
const KOW_WALLS = [0xb2ad9e, 0xbfb8a8, 0xa8a294, 0xb6a898, 0x9aa096, 0xb0a894];   // 深い谷で影落ちするので明るめ
const KOW_NEON  = [0xff3b52, 0x24c4d8, 0xffc21e, 0x39d97a, 0xff7a1e, 0xe23af0];
function buildKowloonBlock(plot, rng, S, G, W, SIGN) {
  const { side, row, z0, z1, xNear, depth } = plot;
  const w = z1 - z0;
  const bw = w + 0.02;                           // 密集=間口いっぱい
  const bd = Math.min(rr(rng, 9, 13), depth - 0.6);
  const floors = pick(rng, [7, 8, 9, 10, 11, 12]);
  const fh = 2.7, H = floors * fh;
  const cx = side * (xNear + bd / 2);
  const cz = (z0 + z1) / 2;
  const wall = pick(rng, KOW_WALLS);
  const frontX = side * xNear;
  const out = -side;

  box(S, cx, H / 2, cz, bd, H, bw, wall);
  box(S, cx, H + 0.2, cz, bd + 0.15, 0.4, bw + 0.15, shade(wall, 0.85));   // パラペット
  // 屋上の水タンク+雑然
  for (let i = 0; i < 2 + Math.floor(rng() * 3); i++) {
    box(S, cx + rr(rng, -bd * 0.3, bd * 0.3), H + 0.7 + rng() * 0.4, cz + rr(rng, -bw * 0.35, bw * 0.35), rr(rng, 0.8, 1.5), rr(rng, 0.8, 1.6), rr(rng, 0.8, 1.5), pick(rng, [0x9a9488, 0x6a6e72, 0x7a5a48]));
  }

  // 各階の窓グリッド(密)+室外機の壁+物干し
  const nWin = Math.max(3, Math.round(bw / 1.6));
  for (let f = 2; f <= floors; f++) {   // 1F は店先なので窓グリッドは 2F から
    const cy = (f - 1) * fh + fh * 0.55;
    for (let i = 0; i < nWin; i++) {
      const wz = cz + (i - (nWin - 1) / 2) * (bw / nWin);
      box(G, frontX + out * 0.06, cy, wz, 0.04, 1.2, 0.72, PAL.glassDay);
      W.push({ gi: G.length - 1, kind: 'win', litAt: 16.5 + (f * 3 + i) % 5 * 0.8 });
      if (rng() < 0.5) box(S, frontX + out * 0.28, cy - 0.5, wz, 0.4, 0.4, 0.55, 0xcfccc4);   // 室外機
      if (rng() < 0.3) box(S, frontX + out * (0.5 + rng()), cy, wz, 0.02, 0.5, 0.9, pick(rng, [0xd8d0c0, 0xb8c4d8, 0xd8b8b8]));  // 物干し
    }
  }

  // 突き出し看板の密林(漢字ネオン。夜=W で発光)
  if (PARAMS.signs) {
    const nSign = 3 + Math.floor(rng() * 4);
    for (let i = 0; i < nSign; i++) {
      const sy = 1.5 + rng() * (H - 3);
      const sh = rr(rng, 1.4, 2.6), sw2 = rr(rng, 0.5, 0.8);
      const proj = rr(rng, 1.2, 2.4);   // 道路への突き出し量
      const neon = pick(rng, KOW_NEON);
      const key = 'kow' + (Math.floor(rng() * KOW_SIGN_COUNT));
      // 看板の箱(裏板)+発光面+文字は同じ bz を共有(横ずれ防止)
      const bz = cz + rr(rng, -bw * 0.3, bw * 0.3) + (i - nSign / 2) * 0.15;
      box(S, frontX + out * (proj * 0.5), sy, bz, proj, sh + 0.1, sw2 + 0.06, 0x2a2622);
      box(G, frontX + out * proj, sy, bz, 0.06, sh, sw2, neon);
      W.push({ gi: G.length - 1, kind: 'neon', neon: [((neon >> 16) & 255) / 255, ((neon >> 8) & 255) / 255, (neon & 255) / 255] });
      signPlane(SIGN, key, frontX + out * (proj + 0.04), sy, bz, sw2 * 0.9, sh * 0.9, out > 0 ? Math.PI / 2 : -Math.PI / 2);
    }
  }
  // 1F 店先(シャッター or 開店の暖色灯)
  box(S, frontX + out * 0.05, 1.2, cz, 0.08, 2.4, bw - 0.3, 0x3a352e);
  box(G, frontX + out * 0.1, 1.15, cz, 0.04, 1.9, bw - 0.7, 0xffd8a0);
  W.push({ gi: G.length - 1, kind: 'shop' });
  plot.house = { cx, cz, bd, bw, H, floors, fh, wall };
}

/* --- 欧州の街路: 石畳の目地(albedo エッジで LINE に格子)+ガス灯 --- */
function buildEuroStreet(layout, S, D, GLOW) {
  const { roadW, seed } = layout;
  const SNOW = PARAMS.season === 'snow';
  const cPave = SNOW ? 0xd7dade : 0x9fa0a2;   // 石畳
  const cJoint = SNOW ? 0xc2c6ca : 0x86888a;  // 目地(やや暗)
  // 車道を石畳色で上塗り+目地格子(縦横の細線 box=albedo で線画に出る)
  box(S, 0, 0.012, 0, roadW, 0.02, L + 30, cPave);
  for (let cz = -L / 2 - 8; cz < L / 2 + 8; cz += 1.15) {              // 横目地(円弧気味に見せず直線で簡易)
    box(S, 0, 0.02, cz, roadW, 0.006, 0.06, cJoint);
  }
  for (let x = -roadW / 2 + 0.6; x < roadW / 2; x += 1.15) {          // 縦目地
    box(S, x, 0.02, 0, 0.06, 0.006, L + 30, cJoint);
  }
  // 歩道の縁石(両側の連続石)
  for (const s of [1, -1]) box(S, s * (roadW / 2 + 0.2), 0.09, 0, 0.34, 0.18, L + 30, SNOW ? 0xe4e6e8 : 0xb8b6b0);
  // ガス灯(鋳鉄柱+ランタン。夜に点灯)
  const rng = mulberry32(hash2(seed, 1111));
  for (let z = -L / 2 + 12; z < L / 2 - 8; z += 24) {
    for (const s of [1, -1]) {
      const gx = s * (roadW / 2 + 0.75), gz = z + (s > 0 ? 0 : 12);
      cyl(S, gx, 1.9, gz, 0.06, 3.8, 0x2e2e32);                        // 柱
      box(S, gx, 3.85, gz, 0.28, 0.5, 0.28, 0x33333a);                // ランタン枠
      box(S, gx, 4.16, gz, 0.34, 0.12, 0.34, 0x2e2e32);               // 笠
      GLOW.pos.push(gx, 3.85, gz); GLOW.col.push(1, 0.86, 0.55);
      decal(D, gx - s * 0.2, 0.03, gz, 4.2, 0xffdca0);
    }
  }
}

/* --- 米郊外の街路: 消火栓(たまに) --- */
function buildSuburbStreet(layout, S, seed) {
  const { roadW } = layout;
  const rng = mulberry32(hash2(seed, 1212));
  for (let z = -L / 2 + 20; z < L / 2 - 10; z += rr(rng, 34, 52)) {

    for (const s2 of [1, -1]) cyl(S, hx + s2 * 0.16, 0.42, z, 0.06, 0.16, 0xa83226);  // 側口

}

/* --- 九龍の街路: 屋台(たまに)+吊り街灯 --- */
function buildKowloonStreet(layout, S, D, GLOW) {
  const { roadW, seed } = layout;
  const rng = mulberry32(hash2(seed, 1313));
  for (let z = -L / 2 + 14; z < L / 2 - 8; z += rr(rng, 20, 30)) {
    const s = rng() < 0.5 ? 1 : -1;
    if (rng() < 0.5) {   // 屋台(赤テント+台)
      const sx = s * (roadW / 2 + 1.2);
      box(S, sx, 0.75, z, 1.6, 0.1, 1.8, 0x8a8578);
      for (const dx of [-0.7, 0.7]) for (const dz of [-0.8, 0.8]) box(S, sx + dx, 0.4, z + dz, 0.06, 0.8, 0.06, 0x6a6058);
      box(S, sx, 1.9, z, 1.9, 0.1, 2.1, pick(rng, [0xc23a2e, 0x3e6a58, 0xe0a828]));   // テント
