<script type="module">
import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { FullScreenQuad } from 'three/addons/postprocessing/Pass.js';

/* ============================================================
   utils — 乱数(mulberry32)・ヘルパー
============================================================ */
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const hash2 = (a, b) => {
  let h = (a | 0) ^ Math.imul(b | 0, 0x9E3779B1);
  h = Math.imul(h ^ h >>> 16, 0x85EBCA6B);
  h = Math.imul(h ^ h >>> 13, 0xC2B2AE35);
  return (h ^ h >>> 16) >>> 0;
};
const clamp = (x, a, b) => Math.min(b, Math.max(a, x));
const lerp = (a, b, t) => a + (b - a) * t;
const rr = (rng, a, b) => a + rng() * (b - a);
const pick = (rng, arr) => arr[Math.floor(rng() * arr.length) % arr.length];

/* ============================================================
   PARAMS — 再生成系(regen)とライブ系を分離
============================================================ */
const PARAMS = {
  seed: 20260710,
  location: 'residential',  // JP: residential/shotengai/seaside/rural/station/hillside | 海外: euro/suburbia/kowloon
  shutterRatio: 0.25,       // 商店街のシャッター店比率(1=シャッター街)
  season: 'none',           // none / sakura(桜) / autumn(紅葉) / snow(雪)
  landmark: 'none',         // none / shrine(神社) / school(学校) / park(公園) / random
  roadType: 'local',      // local=4.5m / arterial=13m
  sideRoadEvery: 55,      // 側道間隔(m)
  setback: 1.2,           // 道路際余白(m)
  houseGap: 0.8,          // 建物間ギャップ(m)
  garageRatio: 0.4,       // ガレージ型比率
  aptRatio: 0.12,         // アパート率
  wires: true,            // 電線(S6)
  signs: true,            // 看板文字(S11)
  crossing: true,         // 踏切(S12)
  mountains: true,        // 山並み(S8)
  // --- ライブ系 ---
  hour: 13.0,
  overcast: false,
  rain: 0,                // 雨の強さ 0-1(空・雨線・水たまり・傘に連動)
  exposure: 1.0,
  fov: 48, eyeH: 1.5, roll: 0,
  vpSnap: false,          // 消失点スナップ(yaw を最寄りの 90° 軸へ吸着)
  horizonLock: false,     // 水平線ロック(pitch=0)
  windowFrame: false,     // 窓越しフレーム(室内から見た構図)
  mode: 'clay',           // clay / line / tone
  lineWidth: 1, ss2x: true, nearBoost: true,
  toneGain: 1.0, tonePitch: 5,
  aspect: 'free', guides: false, mannequin: false, exportScale: 2,
  exportAlpha: false,     // 透過 PNG(紙を抜く。LINE/TONE のみ)
  layerNear: 22,          // レイヤー分け書き出しの境界: 近|中(m)
  layerMid: 70,           //                             中|遠(m)
  mobDensity: 0,          // #12 モブ密度 0(無人)〜1。位置アニメのみ・L0(線画に出る)
  mobExportEmpty: true,   // PNG 書き出し時はモブを消す(無人プレート)
};
const ROAD_W = { local: 4.5, arterial: 13 };

/* ============================================================
   パレット(sRGB hex → three が linear 変換)
============================================================ */
const PAL = {
  sky:      0xccd6e0,
  asphalt:  0xa4a4a2,
  curb:     0xd8d7d4,
  gutter:   0x8e8e8c,
  sidewalk: 0xc4c3c0,
  soil:     0xbdb6aa,
  concrete: 0xc9c7c2,
  gravel:   0xbfbcb4,
  walls:  [0xf1efe9, 0xe9e3d8, 0xdedcd8, 0xd8cebe, 0xc6ccd0, 0xcfc4b2, 0xb9ab98],
  roofs:  [0x70747a, 0x7c6c60, 0x5f6772, 0x8a8c8e, 0x635a52],
  block:  [0xd3cfc6, 0xccc8bf],
  fence:    0x9aa0a6,
  hedge:  [0x7f9370, 0x74886a],
  shutter:  0xb2b2ae,
  glassDay: 0x39424e,
  sash:     0xe8e8ea,
  door:     0x6f665c,
  bldg:   [0xc6cad0, 0xcdd0d4, 0xbfc4cb],
  trunk:    0x8a7a66,
  leaf:   [0x7d9270, 0x718666],
};

/* ============================================================
   renderer / scene / camera
============================================================ */
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });  // alpha は透過 PNG 書き出し用(表示は常に a=1)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(PAL.sky);
scene.fog = new THREE.Fog(PAL.sky, 70, 260);

const camera = new THREE.PerspectiveCamera(PARAMS.fov, 1, 0.1, 600);
const orthoCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 1, 500); // T 俯瞰
orthoCam.position.set(0, 200, 0);
orthoCam.up.set(0, 0, -1);      // 真下視点: up と視線の平行を回避
orthoCam.lookAt(0, 0, 0);

const L = 210; // 街の全長(z: -105..105)

/* --- ライト --- */
const hemi = new THREE.HemisphereLight(0xdfe8f0, 0x9a938a, 0.65);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff4e6, 2.6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 260;
const SHADOW_R = 55;
sun.shadow.camera.left = -SHADOW_R; sun.shadow.camera.right = SHADOW_R;
sun.shadow.camera.top = SHADOW_R;  sun.shadow.camera.bottom = -SHADOW_R;
sun.shadow.camera.updateProjectionMatrix();
sun.shadow.normalBias = 0.03;
scene.add(sun, sun.target);

/* ============================================================
   ジオメトリ部品 — 全パーツ {position,normal,color} 3属性に正規化
============================================================ */
const UNIT_BOX = new THREE.BoxGeometry(1, 1, 1).toNonIndexed();
UNIT_BOX.deleteAttribute('uv');
const UNIT_CYL = new THREE.CylinderGeometry(0.5, 0.5, 1, 10).toNonIndexed();
UNIT_CYL.deleteAttribute('uv');
const UNIT_ICO = new THREE.IcosahedronGeometry(0.5, 1);  // Polyhedron は元々 non-indexed
UNIT_ICO.deleteAttribute('uv');

const _m4 = new THREE.Matrix4(), _q = new THREE.Quaternion();
const _v = new THREE.Vector3(), _s = new THREE.Vector3();
const _c = new THREE.Color();
const Y_AXIS = new THREE.Vector3(0, 1, 0);

function colorize(g, hex) {
  _c.set(hex);
  const n = g.attributes.position.count;
  const arr = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) _c.toArray(arr, i * 3);
  g.setAttribute('color', new THREE.BufferAttribute(arr, 3));
  return g;
}
function place(unit, list, cx, cy, cz, sx, sy, sz, hex, ry = 0) {
  const g = unit.clone();
  _q.setFromAxisAngle(Y_AXIS, ry);
  _m4.compose(_v.set(cx, cy, cz), _q, _s.set(sx, sy, sz));
  g.applyMatrix4(_m4);
  list.push(colorize(g, hex));
}
const box = (list, cx, cy, cz, sx, sy, sz, hex, ry) => place(UNIT_BOX, list, cx, cy, cz, sx, sy, sz, hex, ry);
const cyl = (list, cx, cy, cz, r, h, hex) => place(UNIT_CYL, list, cx, cy, cz, r * 2, h, r * 2, hex);
const blob = (list, cx, cy, cz, s, hex) => place(UNIT_ICO, list, cx, cy, cz, s, s, s, hex);

/* 横倒し円柱(車輪・カーブミラー面など。軸=x → ry で向き変更) */
const UNIT_CYL_X = UNIT_CYL.clone();
UNIT_CYL_X.applyMatrix4(new THREE.Matrix4().makeRotationZ(Math.PI / 2));
const cylX = (list, cx, cy, cz, r, len, hex, ry) => place(UNIT_CYL_X, list, cx, cy, cz, len, r * 2, r * 2, hex, ry);

/* 電線・ワイヤ(カテナリー近似ベジェ or 直線) */
function tube(list, curve, r, hex, seg = 12) {
  const g = new THREE.TubeGeometry(curve, seg, r, 4, false).toNonIndexed();
  g.deleteAttribute('uv');
  g.deleteAttribute('normal');
  g.computeVertexNormals();
  list.push(colorize(g, hex));
}
function wire(list, x0, y0, z0, x1, y1, z1, sag, r, hex) {
  const mid = new THREE.Vector3((x0 + x1) / 2, (y0 + y1) / 2 - sag * 2, (z0 + z1) / 2);
  tube(list, new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(x0, y0, z0), mid, new THREE.Vector3(x1, y1, z1)), r, hex);
}

/* 山並み(稜線ポリゴンを直書き。fog 距離の外にあるため fog は切り、
   applyLight で空色連動のシルエット色を乗算する) */
const matMountain = new THREE.MeshBasicMaterial({ vertexColors: true, fog: false });

/* 海面(空色を拾う unlit。fog で遠くが空へ溶け、L0 なので水平線が線画に出る) */
const matSea = new THREE.MeshBasicMaterial({ color: 0x86a8c0 });

/* 水田の田面(季節連動: 春=水鏡(空色) / 夏=緑 / 秋=金色 / 雪=雪原) */
const matPaddy = new THREE.MeshStandardMaterial({ color: 0x6f9a4e, roughness: 0.85, metalness: 0 });
function mountainGeo(rng, hMax, hex) {
  const N = 26, W2 = 640;
  const ys = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const ridge = Math.sin(t * 9.2 + rng() * 1.4) * 0.35 + Math.sin(t * 3.1 + rng()) * 0.4 + 0.55;
    ys.push(Math.max(3, ridge * hMax * (0.55 + rng() * 0.45)));
  }
  const pos = [];
  for (let i = 0; i < N; i++) {
    const x0 = -W2 / 2 + (i / N) * W2, x1 = -W2 / 2 + ((i + 1) / N) * W2;
    pos.push(x0, 0, 0, x1, 0, 0, x1, ys[i + 1], 0,
             x0, 0, 0, x1, ys[i + 1], 0, x0, ys[i], 0);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
  g.computeVertexNormals();
  return colorize(g, hex);
}

/* 粘土カー */
const CAR_COLORS = [0xe8e8e6, 0xd8d8d6, 0xb8bcc2, 0x3a4048, 0x8a2e2e, 0x2e4a6a, 0xcfcabc];
function clayCar(S, cx, cy, cz, ry, hex) {
  box(S, cx, cy + 0.42, cz, 4.1, 0.62, 1.68, hex, ry);
  box(S, cx - Math.sin(ry) * 0.25, cy + 0.95, cz - Math.cos(ry) * 0.25, 2.1, 0.52, 1.5, hex, ry);
  const wob = [[1.32, 0.72], [1.32, -0.72], [-1.32, 0.72], [-1.32, -0.72]];
  for (const [dz, dx] of wob) {
    const wx = cx + Math.cos(ry) * dx + Math.sin(ry) * dz;
    const wz = cz - Math.sin(ry) * dx + Math.cos(ry) * dz;
    cylX(S, wx, cy + 0.3, wz, 0.3, 0.22, 0x2e2e32, ry);
  }
}

/* 三角形リスト直書き(切妻・寄棟用) */
function pushTris(list, pts, cx, cy, cz, hex, ry = 0) {
  const g = new THREE.BufferGeometry();
  const pos = new Float32Array(pts.length * 3);
  pts.forEach((p, i) => { pos[i*3] = p[0]; pos[i*3+1] = p[1]; pos[i*3+2] = p[2]; });
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.computeVertexNormals();
  _q.setFromAxisAngle(Y_AXIS, ry);
  _m4.compose(_v.set(cx, cy, cz), _q, _s.set(1, 1, 1));
  g.applyMatrix4(_m4);
  list.push(colorize(g, hex));
}
/* 切妻屋根(棟=z方向)。w=奥行(x) l=間口(z) h=棟高。CCW=外向き */
function gableRoof(list, cx, cy, cz, w, l, h, hex) {
  const x = w / 2, z = l / 2;
  pushTris(list, [
    [x,0,-z],[0,h,-z],[0,h,z],   [x,0,-z],[0,h,z],[x,0,z],     // 傾斜 +x
    [-x,0,z],[0,h,z],[0,h,-z],   [-x,0,z],[0,h,-z],[-x,0,-z],  // 傾斜 -x
    [x,0,z],[0,h,z],[-x,0,z],                                   // 妻 +z
    [-x,0,-z],[0,h,-z],[x,0,-z],                                // 妻 -z
  ], cx, cy, cz, hex);
}
/* 寄棟屋根。棟は長軸方向 */
function hipRoof(list, cx, cy, cz, w, l, h, hex) {
  let sw = w, sl = l, rot = 0;
  if (w > l) { sw = l; sl = w; rot = Math.PI / 2; } // 常に sl >= sw(棟=z)で組んで回す
  const x = sw / 2, z = sl / 2, rz = (sl - sw) / 2;
  const A = [-x,0,-z], B = [x,0,-z], C = [x,0,z], D = [-x,0,z];
  const P1 = [0,h,-rz], P2 = [0,h,rz];
  pushTris(list, [
    B,A,P1,            // 妻側三角 -z
    D,C,P2,            // 妻側三角 +z
    B,P1,P2, B,P2,C,   // 台形 +x
    D,P2,P1, D,P1,A,   // 台形 -x
  ], cx, cy, cz, hex, rot);
}

/* ============================================================
   レイアウトエンジン — メッシュを作らない純データ
============================================================ */
const LM_W = { shrine: 15, school: 26, park: 14 };   // ランドマークの必要間口(m)

/* 坂の街(#10): z に沿って段状に上がるテラス地形。
   hillYAt(false, z)=0 なので他ロケーションは一切影響を受けない(乱数消費も不変) */
const HILL = { terr: 21, step: 2.3, n: 10 };   // テラス長 21m・段差 2.3m・10 段(≈23m の高低差)
function hillYAt(isHill, z) {
  if (!isHill) return 0;
  const i = Math.min(HILL.n - 1, Math.max(0, Math.floor((z + L / 2) / HILL.terr)));
  return i * HILL.step;
}
function genLayout(P) {
  const seed = P.seed | 0;
  const rng = mulberry32(seed);
  const roadW = ROAD_W[P.roadType];
  const isArt = P.roadType === 'arterial';
  const sidewalkW = isArt ? 2.0 : 0;
  const edge0 = roadW / 2 + 0.5 + 0.15 + sidewalkW; // 側溝+縁石+歩道

  // --- 側道帯(坂の街は段状のため側道なし=階段路地が動線) ---
  const bands = [];   // {z0, z1, kind}
  const sideRoads = [];
  const isHillside = P.location === 'hillside';
  if (!isHillside) {
    let z = -L / 2 + rr(rng, 18, 32);
    while (z < L / 2 - 24) {
      sideRoads.push({ z, w: 4.5 });
      bands.push({ z0: z - 2.25 - 0.6, z1: z + 2.25 + 0.6, kind: 'road' });
      z += P.sideRoadEvery * rr(rng, 0.85, 1.3);
    }
  }

  // --- 踏切予約帯(側道と近すぎたら数回リトライ。海辺・坂では踏切なし。駅前は線路必須) ---
  const isSeaside = P.location === 'seaside';
  const isStation = P.location === 'station';
  let railway = null;
  if ((P.crossing || isStation) && !isSeaside && !isHillside) {
    for (let tryI = 0; tryI < (isStation ? 20 : 8) && !railway; tryI++) {
      const rz = -L / 2 + rr(rng, 40, 150);
      const ok = bands.every(b => rz + 5.5 < b.z0 - 6 || rz - 5.5 > b.z1 + 6);
      if (ok) {
        railway = { z: rz, w: 9 };
        bands.push({ z0: rz - 4.5, z1: rz + 4.5, kind: 'rail' });
      }
    }
    if (!railway && isStation) {           // 駅は線路が無いと成立しない: 決定的スキャンで帯を避けて確保
      for (let rz = -L / 2 + 40; rz <= -L / 2 + 150 && !railway; rz += 7) {
        if (bands.every(b => rz + 5.5 < b.z0 - 6 || rz - 5.5 > b.z1 + 6)) railway = { z: rz, w: 9 };
      }
      if (!railway) railway = { z: -L / 2 + 95, w: 9 };   // 理論上は到達しない最終手段
      bands.push({ z0: railway.z - 4.5, z1: railway.z + 4.5, kind: 'rail' });
    }
  }
  // 坂の街: テラス境界を帯にして区画がまたがらないよう分割(段差での食い込み/浮きを根絶)
  if (isHillside) {
    for (let i = 1; i < HILL.n; i++) {
      const bz = -L / 2 + i * HILL.terr;
      bands.push({ z0: bz - 0.4, z1: bz + 0.4, kind: 'terr' });
    }
  }
  bands.sort((a, b) => a.z0 - b.z0);

  // --- 区画(row0=道路沿い / row1=2列目簡易。海辺は +x 側が海=陸側のみ) ---
  const plots = [];
  let plotIndex = 0;
  const isEuro = P.location === 'euro', isSub = P.location === 'suburbia', isKow = P.location === 'kowloon';
  const oversKind = isEuro ? 'euro' : isSub ? 'suburb' : isKow ? 'kowloon' : null;   // 海外様式パック
  for (const side of (isSeaside ? [-1] : [1, -1])) {
    for (const row of [0, 1]) {
      const isShotengai = P.location === 'shotengai';
      const isRural = P.location === 'rural';
      const xNear = edge0 + (row === 0 ? 0 : 17.5);
      const depthK = isRural ? 1.35 : isSub ? 1.3 : isEuro ? 1.1 : 1;   // 米郊外=前庭で深い
      const depth = row === 0 ? rr(rng, 13, 16) * depthK : (isRural ? 17 : isSub ? 16 : 12);
      let pz = -L / 2 + 1.5;
      while (pz < L / 2 - 9) {
        // 間口レンジは様式で可変だが rr の消費は常に 1 回=既存ロケーションの乱数列を変えない
        let wa = 8, wb = 12.5;
        if (isShotengai && row === 0) { wa = 5; wb = 8.5; }
        else if (isRural) { wa = 12; wb = 19; }
        else if (isSub && row === 0) { wa = 13; wb = 18; }        // 郊外=広い間口
        else if (isEuro && row === 0) { wa = 6; wb = 9.5; }       // 連棟組積造=狭め
        else if (isKow && row === 0) { wa = 5; wb = 8; }          // 密集=狭い
        const w = rr(rng, wa, wb);
        const hit = bands.find(b => pz < b.z1 && pz + w > b.z0);
        if (hit) { pz = hit.z1 + 0.4; continue; }
        if (pz + w > L / 2 - 1) break;
        const sub = hash2(seed, plotIndex * 2654435761 + side * 97 + row * 31);
        const r2 = mulberry32(sub);
        let kind = 'house';
        if (row === 0) {
          const roll = r2();
          if (isShotengai) {
            if (roll < P.aptRatio * 0.5) kind = 'apt';
            else if (roll < P.aptRatio * 0.5 + 0.03) kind = 'lot';
            else kind = 'shop';
          } else if (isRural) {
            kind = roll < 0.18 ? 'house' : 'paddy';
          } else if (oversKind) {
            kind = (isSub && roll < 0.06) ? 'lot' : oversKind;   // 郊外はたまに空き地(roll 消費は JP と同数)
          } else {
            if (roll < P.aptRatio) kind = 'apt';
            else if (roll < P.aptRatio + 0.05) kind = 'lot';
          }
        } else if (isRural) {
          kind = r2() < 0.14 ? 'house' : 'paddy';   // 2 列目も田主体(r2 は区画個別なので他に波及しない)
        } else if (oversKind) {
          kind = oversKind;   // 2 列目も様式(r2 消費なし=JP 非田舎と同じ)
        }
        plots.push({ side, row, z0: pz, z1: pz + w, xNear, depth, sub, kind, groundY: hillYAt(isHillside, pz + w) });
        pz += w + rr(rng, 0.1, 0.7);
        plotIndex++;
      }
    }
  }

  // --- 駅前帯(#9): 線路の +z/+x 側を駅エリアとして確保。station 以外は一切走らない ---
  let station = null;
  if (isStation && railway) {
    const rz = railway.z;
    station = { x0: roadW / 2 + 0.85, x1: 58, z0: rz + 4.1, z1: rz + 24.5, rz };
    // 駅エリアと z 帯が重なる +x 側の区画を除去(ランドマーク束ねより先に行う)
    for (let i = plots.length - 1; i >= 0; i--) {
      const p = plots[i];
      if (p.side === 1 && p.z1 > station.z0 - 0.3 && p.z0 < station.z1 + 0.3) plots.splice(i, 1);
    }
    // 駅広場を横切る側道は除去(停止線・カーブミラー等の付属物ごと消える)
    for (let i = sideRoads.length - 1; i >= 0; i--) {
      const sr = sideRoads[i];
      if (sr.z + sr.w / 2 > station.z0 && sr.z - sr.w / 2 < station.z1) sideRoads.splice(i, 1);
    }
    // 向かい(-x 側 row0)の家 2-3 軒を駅前商店化(buildShop 流用。sub は既存のまま=決定的)
    let shopN = 0;
    for (const p of plots) {
      if (p.side === -1 && p.row === 0 && p.kind === 'house' && shopN < 3 &&
          p.z1 > station.z0 && p.z0 < station.z1 + 6) { p.kind = 'shop'; p.stationFront = true; shopN++; }
    }
  }

  // --- ランドマーク区画(#8): 生成済み row0 の隣接区画を束ねて 1 区画に置換。
  //     選定は独立 rng — 'none' のとき一切走らず、既存の乱数列・区画を変えない ---
  let landmark = null;
  if (['shrine', 'school', 'park', 'random'].includes(P.landmark)) {   // 未知値・未定義は none 扱い
    const rngLm = mulberry32(hash2(seed, 8888));
    const type = P.landmark === 'random' ? pick(rngLm, ['shrine', 'school', 'park']) : P.landmark;
    const need = LM_W[type];
    // row0 を側ごとに連続ラン(隙間 <2.5m。側道・踏切帯で切れる)へ分解
    // ※plots は side×row ごとに z 昇順で生成済みなので filter だけでソート済み
    const runs = [];
    for (const side of (isSeaside ? [-1] : [1, -1])) {
      let cur = null;
      // 駅前商店(stationFront)は束ね対象から外す=ランが切れて landmark は別の場所に建つ
      for (const p of plots.filter(p2 => p2.side === side && p2.row === 0 && !p2.stationFront)) {
        if (cur && p.z0 - cur[cur.length - 1].z1 < 2.5) cur.push(p);
        else runs.push(cur = [p]);
      }
    }
    const spanOf = r => r[r.length - 1].z1 - r[0].z0;
    const fits = runs.filter(r => spanOf(r) >= need);
    // 間口を満たすランが無い狭い街でも消さない: 最長ランで妥協(seed 再生成で必ず確保)
    const pool = fits.length ? fits : runs.length ? [runs.reduce((a, b) => spanOf(b) > spanOf(a) ? b : a)] : [];
    if (pool.length) {
      const run = pick(rngLm, pool);
      const zA = run[0].z0 + rr(rngLm, 0, Math.max(0, spanOf(run) - need));   // ラン内の配置位置
      const used = run.filter(p => p.z1 > zA + 0.01 && p.z0 < zA + need - 0.01);
      const z0 = used[0].z0, z1 = used[used.length - 1].z1;
      const side = used[0].side;
      for (const p of used) plots.splice(plots.indexOf(p), 1);
      landmark = { type, side, z0, z1 };
      plots.push({ side, row: 0, z0, z1, xNear: edge0, depth: 16,
                   sub: hash2(seed, 8889), kind: 'landmark', groundY: hillYAt(isHillside, z1), lmType: type });
    }
  }

  // --- 電柱(片側・~26m 間隔。踏切近傍は避ける。海辺は陸側に建てる。欧州は地中化=無し) ---
  const poles = [];
  const poleSide = isSeaside ? -1 : 1;
  const poleX = poleSide * (roadW / 2 + 0.35 + sidewalkW);
  const poleDir = -poleSide;   // 電柱付属物(防犯灯・自販機など)の道路向き
  if (!isEuro) {
    for (let pz = -L / 2 + rr(rng, 4, 10); pz < L / 2 - 4; pz += rr(rng, 24, 30)) {
      if (railway && Math.abs(pz - railway.z) < 7) continue;
      if (station && pz > station.z0 && pz < station.z1) continue;   // 駅前広場は無電柱
      poles.push({ x: poleX, z: pz, dir: poleDir, y: hillYAt(isHillside, pz) });
    }
  }

  return { seed, roadW, isArt, sidewalkW, edge0, sideRoads, railway, plots, poles, isSeaside, poleSide, landmark, station, isHillside,
           isEuro, isSub, isKow };
}

   街のビルド — 頂点色マージで少数メッシュへ
============================================================ */
const matSolid = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.96, metalness: 0 });
const matGlass = new THREE.MeshBasicMaterial({ vertexColors: true });   // unlit(夜の点灯用)
const matDbgLine = new THREE.LineBasicMaterial({ vertexColors: true });

/* --- 夜間 FX(L1: 線画 RT に入れないレイヤー) --- */
function makeRadialTex() {
  const c2 = document.createElement('canvas');
  c2.width = c2.height = 128;
  const ctx = c2.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 2, 64, 64, 62);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.35, 'rgba(255,255,255,0.45)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c2);
}
const gradTex = makeRadialTex();
const matDecal = new THREE.MeshBasicMaterial({ map: gradTex, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true, fog: false });
const matGlow = new THREE.PointsMaterial({ map: gradTex, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true, size: 2.4, sizeAttenuation: true, fog: false });

const UNIT_PLANE = new THREE.PlaneGeometry(1, 1).rotateX(-Math.PI / 2);  // 路面デカール用(uv あり)
function decal(D, cx, y, cz, r, hex) {
  const g = UNIT_PLANE.clone().toNonIndexed();
  _m4.compose(_v.set(cx, y, cz), _q.identity(), _s.set(r * 2, 1, r * 2));
  g.applyMatrix4(_m4);
  D.push(colorize(g, hex));
}

/* --- 雨(CLAY 用 3D 雨筋。カメラ追従 wrap・L1=線画対象外) --- */
const matPuddle = new THREE.MeshBasicMaterial({ map: gradTex, transparent: true, opacity: 0,
  depthWrite: false, fog: false });
const rainFx = (() => {
  const N = 2200, R = 26, H = 15;
  const pos = new Float32Array(N * 6);
  const seeds = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    seeds[i * 3]     = Math.random() * R * 2 - R;
    seeds[i * 3 + 1] = Math.random() * H;
    seeds[i * 3 + 2] = Math.random() * R * 2 - R;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mesh = new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color: 0xe6edf4, transparent: true, opacity: 0 }));
  mesh.layers.set(1);
  mesh.frustumCulled = false;
  mesh.visible = false;
  return { mesh, geo, pos, seeds, N, R, H, t: 0 };
})();

/* --- 季節パーティクル(花びら/落ち葉/粉雪。L1=線画対象外) --- */
const SEASON_FX = {
  sakura: { color: 0xf8cad8, size: 0.13, fall: 0.55, sway: 1.5, opacity: 0.9 },
  autumn: { color: 0xcc7a36, size: 0.15, fall: 0.8,  sway: 1.1, opacity: 0.85 },
  snow:   { color: 0xffffff, size: 0.1,  fall: 0.75, sway: 0.55, opacity: 0.9 },
};
const petalFx = (() => {
  const N = 900, R = 24, H = 13;
  const pos = new Float32Array(N * 3);
  const seeds = new Float32Array(N * 4);
  for (let i = 0; i < N; i++) {
    seeds[i * 4]     = Math.random() * R * 2 - R;
    seeds[i * 4 + 1] = Math.random() * H;
    seeds[i * 4 + 2] = Math.random() * R * 2 - R;
    seeds[i * 4 + 3] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ map: gradTex, size: 0.12, sizeAttenuation: true,
    transparent: true, opacity: 0, depthWrite: false, color: 0xffffff });
  const mesh = new THREE.Points(geo, mat);
  mesh.layers.set(1);
  mesh.frustumCulled = false;
  mesh.visible = false;
  return { mesh, geo, pos, seeds, N, R, H, t: 0 };
})();

function updatePetals(dt) {
  const fx = SEASON_FX[PARAMS.season];
  petalFx.mesh.visible = !!fx;
  if (!fx) return;
  petalFx.t += dt;
  const m = petalFx.mesh.material;
  m.color.set(fx.color);
  m.size = fx.size;
  m.opacity = fx.opacity;
  const { pos, seeds, N, H } = petalFx;
  const t = petalFx.t;
  const isH = city?.layout?.isHillside;   // 坂: 粒子ごとの z の段に載せる(帯またぎで浮き/埋没しない)
  for (let i = 0; i < N; i++) {
    const ph = seeds[i * 4 + 3];
    let y = (seeds[i * 4 + 1] - t * fx.fall) % H;
    if (y < 0) y += H;
    const z = cam.pos.z + seeds[i * 4 + 2] + Math.cos(t * 0.5 + ph * 1.3) * fx.sway * 0.6;
    pos[i * 3]     = cam.pos.x + seeds[i * 4] + Math.sin(t * 0.7 + ph) * fx.sway;
    pos[i * 3 + 1] = y + (isH ? hillYAt(true, z) : 0);
    pos[i * 3 + 2] = z;
  }
  petalFx.geo.attributes.position.needsUpdate = true;
}

function updateRain(dt) {
  const r = PARAMS.rain;
  rainFx.mesh.visible = r > 0.01;
  rainFx.mesh.material.opacity = 0.22 + r * 0.3;
  if (!rainFx.mesh.visible) return;
  rainFx.t += dt * (9 + r * 8);
  const { pos, seeds, N, R, H } = rainFx;
  const len = 0.32 + r * 0.3, drift = 0.14;
  const isH = city?.layout?.isHillside;   // 坂: 粒子ごとの z の段に載せる(帯またぎで浮き/埋没しない)
  for (let i = 0; i < N; i++) {
    let y = (seeds[i * 3 + 1] - rainFx.t) % H;
    if (y < 0) y += H;
    const x = cam.pos.x + seeds[i * 3] + y * drift;
    const z = cam.pos.z + seeds[i * 3 + 2];
    const base = isH ? hillYAt(true, z) : 0;
    pos[i * 6]     = x;               pos[i * 6 + 1] = y + len + base; pos[i * 6 + 2] = z;
    pos[i * 6 + 3] = x - len * drift; pos[i * 6 + 4] = y + base;       pos[i * 6 + 5] = z;
  }
  rainFx.geo.attributes.position.needsUpdate = true;
}

function signPlane(list, key, cx, cy, cz, w, h, ry = 0, rx = 0) {
  const e = SIGN_UV[key];
  const g = new THREE.PlaneGeometry(w, h);
  const uv = g.attributes.uv;
  for (let i = 0; i < uv.count; i++) {
    uv.setXY(i, e.u0 + uv.getX(i) * (e.u1 - e.u0), e.v0 + uv.getY(i) * (e.v1 - e.v0));
  }
  if (rx) g.rotateX(rx);
  if (ry) g.rotateY(ry);
  g.translate(cx, cy, cz);
  list.push(g);
}

/* ============================================================
   LINE パイプライン(EffectComposer 不使用の手組み G-buffer)
   ① normal+depth RT ② albedo RT ③ edge 合成 RT(SS 2x)
   ④ FullScreenQuad で膨張+紙白合成しながら画面へ縮小
============================================================ */
const matNormal = new THREE.MeshNormalMaterial();
const matAlbedo = new THREE.MeshBasicMaterial({ vertexColors: true, fog: false });

const FSQ_VERT = /* glsl */`
  varying vec2 vUv;
  void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
`;

const edgeMat = new THREE.ShaderMaterial({
  uniforms: {
    tNormal:   { value: null },
    tDepth:    { value: null },
    tAlbedo:   { value: null },
    texel:     { value: new THREE.Vector2(1, 1) },
    uNear:     { value: 0.1 },
    uFar:      { value: 600 },
    uThN:      { value: 0.4 },    // 法線エッジ閾値
    uThD:      { value: 0.02 },   // depth 相対差閾値
    uThA:      { value: 0.12 },   // アルベドエッジ閾値
    uFadeStart:{ value: 60 },     // 近景強調: 線のフェード開始距離
    uFadeEnd:  { value: 190 },
    uNearBoost:{ value: 1 },
  },
  vertexShader: FSQ_VERT,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D tNormal, tDepth, tAlbedo;
    uniform vec2 texel;
    uniform float uNear, uFar, uThN, uThD, uThA, uFadeStart, uFadeEnd, uNearBoost;

    float linD(vec2 uv) {
      float d = texture2D(tDepth, uv).x;
      return (2.0 * uNear * uFar) / (uFar + uNear - (d * 2.0 - 1.0) * (uFar - uNear));
    }
    void main() {
      vec2 ox = vec2(texel.x, 0.0), oy = vec2(0.0, texel.y);
      float dC = linD(vUv);
      float dDiff = abs(linD(vUv + ox) - linD(vUv - ox))
                  + abs(linD(vUv + oy) - linD(vUv - oy));
      vec3 nC = texture2D(tNormal, vUv).xyz * 2.0 - 1.0;
      vec3 nDx = texture2D(tNormal, vUv + ox).xyz - texture2D(tNormal, vUv - ox).xyz;
      vec3 nDy = texture2D(tNormal, vUv + oy).xyz - texture2D(tNormal, vUv - oy).xyz;
      vec3 aDx = texture2D(tAlbedo, vUv + ox).rgb - texture2D(tAlbedo, vUv - ox).rgb;
      vec3 aDy = texture2D(tAlbedo, vUv + oy).rgb - texture2D(tAlbedo, vUv - oy).rgb;

      // depth エッジ: 線形化+相対差+グレージング角補正(遠方路面の黒塗り防止)
      float slope = 1.0 / max(abs(nC.z), 0.14);
      float thD = uThD * dC * slope;
      float eD = smoothstep(thD, thD * 2.0, dDiff);

      // normal エッジ(凹の折れ線・稜線)
      float nDiff = length(nDx) * 2.0 + length(nDy) * 2.0;
      float eN = smoothstep(uThN, uThN * 1.8, nDiff);

      // albedo エッジ(路面標示・目地・素材境界。照明不変)
      float aDiff = length(aDx) + length(aDy);
      float eA = smoothstep(uThA, uThA * 2.0, aDiff);

      float e = max(eD, max(eN, eA));

      // 近景強調: 遠景の線を紙白へフェード(空気遠近)
      if (uNearBoost > 0.5) e *= 1.0 - smoothstep(uFadeStart, uFadeEnd, dC);

      gl_FragColor = vec4(e, dC / uFar, 0.0, 1.0);
    }
  `,
});

const lineFinalMat = new THREE.ShaderMaterial({
  uniforms: {
    tEdge:   { value: null },
    texelE:  { value: new THREE.Vector2(1, 1) },
    uDilate: { value: 1 },
    uPaper:  { value: new THREE.Color(0xf8f7f3) },
    uInk:    { value: new THREE.Color(0x1c1c20) },
    uAlphaMode: { value: 0 },                          // 1=透過(紙を抜く。書き出し専用)
    uLayerMin:  { value: 0 },                          // depth 帯マスク(far 正規化)。レイヤー分け書き出し用
    uLayerMax:  { value: 1.02 },
    uRain:      { value: 0 },                          // 雨線(スクリーン空間ストローク)
    uRainSlant: { value: 0.16 },
  },
  vertexShader: FSQ_VERT,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D tEdge;
    uniform vec2 texelE;
    uniform float uDilate, uAlphaMode, uLayerMin, uLayerMax, uRain, uRainSlant;
    uniform vec3 uPaper, uInk;

    float rainStroke(vec2 fc) {
      if (uRain <= 0.005) return 0.0;
      vec2 rp = fc;
      rp.x += rp.y * uRainSlant;                       // 斜めに流す
      float pitch = 7.0;
      float colId = floor(rp.x / pitch);
      float rnd  = fract(sin(colId * 127.1) * 43758.5453);
      float rnd2 = fract(rnd * 91.17);
      float y = fract(rp.y / (240.0 + rnd2 * 300.0) + rnd);   // 列ごとの位相(静止=トーンとして安定)
      float seg  = step(y, 0.3 + 0.45 * uRain);        // 雨足の長さ
      float thin = step(fract(rp.x / pitch), 0.15);    // 細線
      float keep = step(rnd2, 0.2 + uRain * 0.55);     // 降る列の密度
      return seg * thin * keep;
    }
    void main() {
      float e = 0.0;
      for (int dy = -2; dy <= 2; dy++) {
        for (int dx = -2; dx <= 2; dx++) {
          float fd = max(abs(float(dx)), abs(float(dy)));
          if (fd > uDilate + 0.01) continue;
          vec4 s = texture2D(tEdge, vUv + vec2(float(dx), float(dy)) * texelE);
          if (s.g >= uLayerMin && s.g < uLayerMax) e = max(e, s.r);   // g=線形深度/far
        }
      }
      e = max(e, rainStroke(gl_FragCoord.xy) * (0.3 + 0.3 * uRain));
      if (uAlphaMode > 0.5) {
        gl_FragColor = vec4(uInk * e, e);              // premultiplied 透過(クリスタ等に直貼り)
      } else {
        gl_FragColor = vec4(mix(uPaper, uInk, e), 1.0);
      }
    }
  `,
});

/* TONE: 線画 + 輝度量子化 45° 網点(最終解像度でかける — 縮小すると網点が灰に溶けるため) */
const toneFinalMat = new THREE.ShaderMaterial({
  uniforms: {
    tEdge:   { value: null },
    tBeauty: { value: null },
    texelE:  { value: new THREE.Vector2(1, 1) },
    uDilate: { value: 1 },
    uPaper:  { value: new THREE.Color(0xf8f7f3) },
    uInk:    { value: new THREE.Color(0x1c1c20) },
    uGain:   { value: 1 },
    uPitch:  { value: 5 },
    uAlphaMode: { value: 0 },                          // 1=透過(墨のみ残す)
    uRain:      { value: 0 },
    uRainSlant: { value: 0.16 },
  },
  vertexShader: FSQ_VERT,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D tEdge, tBeauty;
    uniform vec2 texelE;
    uniform float uDilate, uGain, uPitch, uAlphaMode, uRain, uRainSlant;
    uniform vec3 uPaper, uInk;

    float rainStroke(vec2 fc) {
      if (uRain <= 0.005) return 0.0;
      vec2 rp = fc;
      rp.x += rp.y * uRainSlant;
      float pitch = 7.0;
      float colId = floor(rp.x / pitch);
      float rnd  = fract(sin(colId * 127.1) * 43758.5453);
      float rnd2 = fract(rnd * 91.17);
      float y = fract(rp.y / (240.0 + rnd2 * 300.0) + rnd);
      float seg  = step(y, 0.3 + 0.45 * uRain);
      float thin = step(fract(rp.x / pitch), 0.15);
      float keep = step(rnd2, 0.2 + uRain * 0.55);
      return seg * thin * keep;
    }
    void main() {
      float e = 0.0;
      for (int dy = -2; dy <= 2; dy++) {
        for (int dx = -2; dx <= 2; dx++) {
          float fd = max(abs(float(dx)), abs(float(dy)));
          if (fd > uDilate + 0.01) continue;
          e = max(e, texture2D(tEdge, vUv + vec2(float(dx), float(dy)) * texelE).r);
        }
      }
      vec3 c = texture2D(tBeauty, vUv).rgb;
      c = c / (c + 1.0);                                   // 簡易トーンマップ(RT はリニアのため)
      float lum = pow(dot(c, vec3(0.299, 0.587, 0.114)), 0.6) * uGain * 1.35;  // sRGB 近似で持ち上げ

      // 硬い 4 帯: 白 / 薄トーン / 濃トーン / ベタ
      float density = lum > 0.66 ? 0.0 : lum > 0.45 ? 0.28 : lum > 0.26 ? 0.52 : 1.0;

      // 45° 回転ドットグリッド(device px 基準)
      vec2 p = mat2(0.70710678, -0.70710678, 0.70710678, 0.70710678) * gl_FragCoord.xy / uPitch;
      float d = length(fract(p) - 0.5) * 2.0;
      float radius = sqrt(density) * 1.13;
      float dotInk = density >= 0.99 ? 1.0 : (1.0 - smoothstep(radius - 0.18, radius + 0.18, d));

      float ink = max(e, dotInk * (density > 0.0 ? 1.0 : 0.0));
      ink = max(ink, rainStroke(gl_FragCoord.xy) * (0.3 + 0.3 * uRain));
      if (uAlphaMode > 0.5) {
        gl_FragColor = vec4(uInk * ink, ink);          // premultiplied 透過
      } else {
        gl_FragColor = vec4(mix(uPaper, uInk, ink), 1.0);
      }
    }
  `,
});

let rtNormal = null, rtAlbedo = null, rtEdge = null, rtBeauty = null, rtSizeKey = '';
function disposeRTs() {
  rtNormal?.depthTexture?.dispose();
  rtNormal?.dispose(); rtAlbedo?.dispose(); rtEdge?.dispose(); rtBeauty?.dispose();
  rtNormal = rtAlbedo = rtEdge = rtBeauty = null;
  rtSizeKey = '';
}
function ensureRTs() {
  // 実バッファ px 基準(PNG 書き出しの一時リサイズにも追従)
  const bw2 = renderer.domElement.width, bh2 = renderer.domElement.height;
  const ss = (PARAMS.ss2x && !exporting) ? 2 : 1;   // 書き出しは出力自体が高解像度なので SS 不要
  let W = Math.max(4, bw2 * ss), H = Math.max(4, bh2 * ss);
  const maxT = renderer.capabilities.maxTextureSize;  // WebGL 上限を超えると FBO incomplete/黒画像
  const mxD = Math.max(W, H);
  if (mxD > maxT) { const k = maxT / mxD; W = Math.floor(W * k); H = Math.floor(H * k); }
  const key = W + 'x' + H;
  if (key === rtSizeKey) return;
  disposeRTs();
  rtNormal = new THREE.WebGLRenderTarget(W, H, { minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter });
  rtNormal.depthTexture = new THREE.DepthTexture(W, H);
  rtAlbedo = new THREE.WebGLRenderTarget(W, H, { minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter });
  rtEdge   = new THREE.WebGLRenderTarget(W, H, { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter });
  let BW = bw2, BH = bh2;                              // TONE 用 beauty(最終解像度)も上限内に
  const mxB = Math.max(BW, BH);
  if (mxB > maxT) { const k = maxT / mxB; BW = Math.floor(BW * k); BH = Math.floor(BH * k); }
  rtBeauty = new THREE.WebGLRenderTarget(BW, BH, { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter });
  edgeMat.uniforms.texel.value.set(1 / W, 1 / H);
  lineFinalMat.uniforms.texelE.value.set(1 / W, 1 / H);
  toneFinalMat.uniforms.texelE.value.set(1 / W, 1 / H);
  rtSizeKey = key;
}

function renderStylized(activeCam, tone) {

  if (tone) {

    renderer.shadowMap.autoUpdate = true;
    activeCam.layers.enableAll();
    renderer.setRenderTarget(rtBeauty);
    renderer.clear();
    renderer.render(scene, activeCam);
    rainFx.mesh.visible = rainWas;
  }

  renderer.shadowMap.autoUpdate = false;   // G-buffer パスに影は不要
  const bg = scene.background, fg = scene.fog;
  scene.background = null;
  scene.fog = null;
  activeCam.layers.set(0);                 // L0=ソリッドのみ(空・夜FX・dbg 線を除外)

  // ① normal + depth
  scene.overrideMaterial = matNormal;
  renderer.setRenderTarget(rtNormal);

  renderer.clear();

  scene.overrideMaterial = null;
  scene.background = bg;
  scene.fog = fg;

  // ③ エッジ合成(SS 解像度)
  edgeMat.uniforms.tNormal.value = rtNormal.texture;
  edgeMat.uniforms.tDepth.value = rtNormal.depthTexture;
  edgeMat.uniforms.tAlbedo.value = rtAlbedo.texture;
  edgeMat.uniforms.uNear.value = activeCam.near;

  const fm = tone ? toneFinalMat : lineFinalMat;
  fm.uniforms.tEdge.value = rtEdge.texture;
  fm.uniforms.uDilate.value = PARAMS.lineWidth;
  fm.uniforms.uAlphaMode.value = exportAlphaMode;

function segmentsAvoiding(z0, z1, bands, pad = 0) {
  const out = [];
  let cur = z0;
  const bs = bands.filter(b => b.z1 > z0 && b.z0 < z1).sort((a, b) => a.z0 - b.z0);
  for (const b of bs) {
    if (b.z0 - pad > cur) out.push([cur, b.z0 - pad]);
    cur = Math.max(cur, b.z1 + pad);
  }
  if (cur < z1) out.push([cur, z1]);
  return out;
}

function buildCity(layout) {
