}

/* --- 俯瞰デバッグ線(区画=緑 / 道路=白 / 踏切=赤 / 電柱=黄) --- */
function buildDebugLines(layout) {
  const pos = [], col = [];
  const c = new THREE.Color();
  const rect = (x0, z0, x1, z1, hex, y = 0.3) => {
    c.set(hex);
    const pts = [[x0,z0],[x1,z0],[x1,z0],[x1,z1],[x1,z1],[x0,z1],[x0,z1],[x0,z0]];
    for (const [x, z] of pts) { pos.push(x, y, z); col.push(c.r, c.g, c.b); }
  };
  for (const p of layout.plots) {
    const xa = p.side * p.xNear, xb = p.side * (p.xNear + p.depth);
    rect(Math.min(xa, xb), p.z0, Math.max(xa, xb), p.z1,
         p.kind === 'landmark' ? 0xcc88ff : p.kind === 'apt' ? 0x77ffcc : p.kind === 'lot' ? 0xffcc77 : 0x66dd66,
         0.3 + (p.groundY || 0));
  }
  rect(-layout.roadW / 2, -L / 2, layout.roadW / 2, L / 2, 0xffffff);
  const srX0 = -46, srX1 = layout.isSeaside ? layout.roadW / 2 : 45;
  for (const sr of layout.sideRoads) rect(srX0, sr.z - sr.w / 2, srX1, sr.z + sr.w / 2, 0xffffff);
  if (layout.railway) rect(-100, layout.railway.z - 4.5, 100, layout.railway.z + 4.5, 0xff5555);
  if (layout.station) rect(layout.station.x0, layout.station.z0, layout.station.x1, layout.station.z1, 0x66ccff, 0.4);
  for (const p of layout.poles) rect(p.x - 0.4, p.z - 0.4, p.x + 0.4, p.z + 0.4, 0xffee55, 0.5 + (p.y || 0));
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
  return new THREE.LineSegments(g, matDbgLine);
}

/* ============================================================
   再生成(dispose 単一起点)
============================================================ */
function regenerate() {
  if (city) {
    scene.remove(city.group);
    city.geos.forEach(g => g.dispose());
    city = null;
  }
  city = buildCity(genLayout(PARAMS));
  scene.add(city.group);
  if (mannequin.visible) {   // 表示中にロケーション変更した場合、現在地形の高さへ載せ直す
    mannequin.position.y = city.layout.isHillside ? hillYAt(true, mannequin.position.z) : 0;
  }
  buildMob(city.layout);     // #12 モブを新しい街に合わせて再配置
  history.replaceState(null, '', stateToHash());
  updateHudStatic();
  applyLight();   // 新 glassMesh の窓色を現在時刻に合わせる
}

/* URL に「このカット」を保存(seed+時刻+カメラ+モード+コマ枠+街並みパラメータの差分) */
const GEN_KEYS = ['location', 'shutterRatio', 'season', 'landmark', 'roadType', 'sideRoadEvery', 'setback',
                  'houseGap', 'garageRatio', 'aptRatio', 'wires', 'signs', 'crossing', 'mountains'];
const GEN_DEFAULTS = Object.fromEntries(GEN_KEYS.map(k => [k, PARAMS[k]]));
const AR_OK = ['free', '4:3', '16:9', '2:1', '3:4'];

function stateToHash() {
  const p = [cam.pos.x, cam.pos.y, cam.pos.z, cam.yaw, cam.pitch].map(v => +v.toFixed(2)).join(',');
  let h = `#s=${PARAMS.seed}&t=${PARAMS.hour}&cam=${p}&fov=${PARAMS.fov}&roll=${PARAMS.roll}` +
          `&mode=${PARAMS.mode}&ar=${encodeURIComponent(PARAMS.aspect)}`;
  if (PARAMS.rain > 0) h += `&rain=${PARAMS.rain}`;
  if (PARAMS.windowFrame) h += `&wf=1`;
  if (PARAMS.mobDensity > 0) h += `&mob=${PARAMS.mobDensity}`;   // #12 モブありのカットを再現
  for (const k of GEN_KEYS) {
    if (PARAMS[k] !== GEN_DEFAULTS[k]) h += `&${k}=${encodeURIComponent(PARAMS[k])}`;
  }
  return h;
}
function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return;
  const q = new URLSearchParams(h);
  if (q.get('s')) PARAMS.seed = parseInt(q.get('s')) || PARAMS.seed;
  if (q.get('t')) PARAMS.hour = clamp(parseFloat(q.get('t')) || 13, 4, 24);
  if (q.get('rain')) PARAMS.rain = clamp(parseFloat(q.get('rain')) || 0, 0, 1);
  if (q.get('mob')) PARAMS.mobDensity = clamp(parseFloat(q.get('mob')) || 0, 0, 1);
  if (q.get('wf') === '1') PARAMS.windowFrame = true;
  if (q.get('fov')) PARAMS.fov = clamp(parseFloat(q.get('fov')) || 48, 20, 100);
  if (q.get('roll')) PARAMS.roll = clamp(parseFloat(q.get('roll')) || 0, -15, 15);
  if (q.get('mode') && ['clay', 'line', 'tone'].includes(q.get('mode'))) PARAMS.mode = q.get('mode');
  const ar = q.get('ar') && decodeURIComponent(q.get('ar'));
  if (ar && AR_OK.includes(ar)) PARAMS.aspect = ar;   // 未検証値で canvas を NaN にしない
  for (const k of GEN_KEYS) {
    const v = q.get(k);
    if (v == null) continue;
    const d = GEN_DEFAULTS[k];
    if (typeof d === 'boolean') PARAMS[k] = v === 'true';
    else if (typeof d === 'number') { const n = parseFloat(v); if (Number.isFinite(n)) PARAMS[k] = n; }
    else if (k === 'roadType' && (v === 'local' || v === 'arterial')) PARAMS[k] = v;
    else if (k === 'location' && ['residential', 'shotengai', 'seaside', 'rural', 'station', 'hillside', 'euro', 'suburbia', 'kowloon'].includes(v)) PARAMS[k] = v;
    else if (k === 'season' && ['none', 'sakura', 'autumn', 'snow'].includes(v)) PARAMS[k] = v;
    else if (k === 'landmark' && ['none', 'shrine', 'school', 'park', 'random'].includes(v)) PARAMS[k] = v;
  }
  const cs = q.get('cam');
  if (cs) {
    const [x, y, z, yaw, pitch] = cs.split(',').map(parseFloat);
    if ([x, y, z, yaw, pitch].every(Number.isFinite)) {
      cam.pos.set(x, y, z);
      cam.yaw = yaw;
      cam.pitch = pitch;
      PARAMS.eyeH = y;
    }
  }
}

/* ============================================================
   時刻 → 光(4:00-24:00 フルレンジ。stops を区分 lerp)
============================================================ */
const _sunDir = new THREE.Vector3(0.5, 1, -0.3).normalize();
const _skyColor = new THREE.Color(PAL.sky);
const _c2 = new THREE.Color(), _c3 = new THREE.Color();

const BOT_STOPS  = [[4,0x232c40],[5.5,0x90a0b8],[7,0xc8d2de],[12,0xccd6e0],[16.5,0xccd2d8],
                    [17.8,0xe8c298],[18.8,0x8a6880],[19.8,0x2c3248],[21,0x181e2e],[24,0x121620]];
const TOP_STOPS  = [[4,0x131a2c],[5.5,0x48587a],[7,0x93aecd],[12,0x9cb8d8],[16.5,0x96accc],
                    [17.8,0x8088b8],[18.8,0x464068],[19.8,0x1a2036],[21,0x121828],[24,0x0e1220]];
const SUN_I      = [[4,0],[5.3,0],[6,1.1],[9,2.4],[12,2.7],[15,2.4],[17,1.8],[18.2,1.0],[18.8,0.25],[19.2,0],[24,0]];
const SUN_C      = [[4,0xffb070],[5.5,0xffb070],[7,0xffd8b0],[10,0xfff4e6],[15,0xfff4e6],[17,0xffd8a0],[18.6,0xff9058],[19.2,0xa8bce0],[24,0xa8bce0]];
const HEMI_I     = [[4,0.3],[6,0.45],[9,0.72],[12,0.85],[16,0.72],[18,0.45],[19.5,0.32],[24,0.28]];
const MOON_I     = [[4,0.42],[5.2,0.2],[6,0],[18.5,0],[19.5,0.28],[21,0.44],[24,0.46]];
const NIGHT_FX   = [[4,0.85],[5.2,0.35],[6,0],[17,0],[18,0.35],[19.5,1],[24,1]];   // 窓・街灯の点き具合

function lerpStops(stops, h) {
  if (h <= stops[0][0]) return stops[0][1];
  for (let i = 0; i < stops.length - 1; i++) {
    const [h0, v0] = stops[i], [h1, v1] = stops[i + 1];
    if (h >= h0 && h <= h1) return lerp(v0, v1, (h - h0) / Math.max(1e-4, h1 - h0));
  }
  return stops[stops.length - 1][1];
}
function lerpColorStops(stops, h, target) {
  if (h <= stops[0][0]) return target.setHex(stops[0][1]);
  for (let i = 0; i < stops.length - 1; i++) {
    const [h0, v0] = stops[i], [h1, v1] = stops[i + 1];
    if (h >= h0 && h <= h1) {
      return target.setHex(v0).lerp(_c3.setHex(v1), (h - h0) / Math.max(1e-4, h1 - h0));
    }
  }
  return target.setHex(stops[stops.length - 1][1]);
}

const GLASS_DAY = new THREE.Color(PAL.glassDay);
const GLASS_NIGHT = new THREE.Color(0x10141c);
const GLASS_LIT = [new THREE.Color(0xffca70).multiplyScalar(1.5),
                   new THREE.Color(0xffe2a0).multiplyScalar(1.5),
                   new THREE.Color(0xf2e8c8).multiplyScalar(1.4)];
const VEND_DAY = new THREE.Color(0xd8e4ea);
const VEND_LIT = new THREE.Color(0xcfefff).multiplyScalar(1.6);
const SHOP_DAY = new THREE.Color(0x46525c);
const SHOP_LIT = new THREE.Color(0xffe6b0).multiplyScalar(1.12);  // 店明かり(暖白。大面積なので控えめ)
const _neonC = new THREE.Color();   // #11 九龍ネオンの色計算用(使い回し)

function updateWindowLights(fx) {
  if (!city?.glassMesh) return;
  const attr = city.glassMesh.geometry.attributes.color;
  const h = PARAMS.hour;
  const nightish = fx > 0.12;
  for (const w of city.windows) {
    let c;
    if (w.kind === 'neon') {                // 九龍のネオン管(夜は自色で強発光・昼は淡く点灯)
      _neonC.setRGB(w.neon[0], w.neon[1], w.neon[2]);
      c = nightish ? _neonC.multiplyScalar(1.7) : _neonC.multiplyScalar(0.55 + 0.35);
    } else if (w.kind === 'vend') {         // 自販機パネル(夜常時点灯)
      c = nightish ? VEND_LIT : VEND_DAY;
    } else if (w.kind === 'shop') {         // 店明かり・袖看板(夜常時点灯・暖色)
      c = nightish ? SHOP_LIT : SHOP_DAY;
    } else if (!nightish) {
      c = GLASS_DAY;
    } else {
      const lit = h < 6 ? (w.gi % 9 === 0) : h >= w.litAt;   // 未明はほぼ消灯
      c = lit ? GLASS_LIT[w.gi % 3] : GLASS_NIGHT;
    }
    const off = w.gi * 36 * 3;
    for (let i = 0; i < 36; i++) c.toArray(attr.array, off + i * 3);
  }
  attr.needsUpdate = true;
}

function applyLight() {
  const h = PARAMS.hour;
  const t = clamp((h - 5.7) / (18.8 - 5.7), 0, 1);   // 太陽軌道 0..1
  const day = h >= 5.7 && h <= 18.8;
  const fx = PARAMS.overcast ? Math.max(lerpStops(NIGHT_FX, h), 0) : lerpStops(NIGHT_FX, h);

  if (day) {
    _sunDir.set(Math.cos(Math.PI * t), Math.max(Math.sin(Math.PI * t), 0.03) * 1.08,
                -Math.sin(Math.PI * t) * 0.62).normalize();  // 南=-z 寄り
  } else {
    _sunDir.set(0.32, 0.82, -0.42).normalize();               // 月
  }

  if (PARAMS.overcast && day) {
    sun.intensity = 0.22;
    sun.castShadow = false;
    hemi.intensity = 1.05;
    hemi.color.setHex(0xdfe3e8);
    _skyColor.setHex(0xc2c6cc);
    skyMat.uniforms.uTop.value.setHex(0xaeb4bc);
    skyMat.uniforms.uBot.value.copy(_skyColor);
  } else {
    sun.intensity = lerpStops(SUN_I, h) + lerpStops(MOON_I, h);
    sun.castShadow = true;
    lerpColorStops(SUN_C, h, sun.color);
    hemi.intensity = lerpStops(HEMI_I, h);
    hemi.color.setHex(h >= 19 || h < 5.5 ? 0x4a5878 : 0xdfe8f0);
    lerpColorStops(BOT_STOPS, h, _skyColor);
    lerpColorStops(TOP_STOPS, h, skyMat.uniforms.uTop.value);
    skyMat.uniforms.uBot.value.copy(_skyColor);
  }
  // 雪の日: 空を白灰に・雪面反射で明るく(彩度を落とした静けさ)
  if (PARAMS.season === 'snow') {
    _skyColor.lerp(_c2.setHex(h >= 5.7 && h <= 18.8 ? 0xc9ced4 : 0x1c222c), 0.45);
    skyMat.uniforms.uTop.value.lerp(_c2.setHex(h >= 5.7 && h <= 18.8 ? 0xacb4bd : 0x141a24), 0.45);
    skyMat.uniforms.uBot.value.copy(_skyColor);
    hemi.intensity *= 1.15;
  }

  // 雨: 太陽を潰し空をグレーへ寄せる(overcast とは独立に効く)
  const rain = PARAMS.rain;
  if (rain > 0) {
    sun.intensity *= 1 - rain * 0.82;
    hemi.intensity = lerp(hemi.intensity, Math.max(hemi.intensity, 0.9), rain * 0.7);
    _skyColor.lerp(_c2.setHex(day ? 0xb0b6bc : 0x14181f), rain * 0.72);
    skyMat.uniforms.uTop.value.lerp(_c2.setHex(day ? 0x969ea8 : 0x0e1218), rain * 0.72);
    skyMat.uniforms.uBot.value.copy(_skyColor);
  }
  hemi.groundColor.setHex(0x9a938a).multiplyScalar(Math.max(0.25, 1 - fx * 0.75));
  scene.background.copy(_skyColor);
  scene.fog.color.copy(_skyColor);
  matMountain.color.copy(_skyColor).multiplyScalar(0.9);   // 空より一段濃いシルエット
  matSea.color.copy(_skyColor).lerp(_c2.setHex(0x4a7690), 0.42);   // 海=空を拾いつつ青味(夕方は茜色に)
  // 水田の季節色(春だけ水鏡=空を映す)
  if (PARAMS.season === 'sakura') matPaddy.color.copy(_skyColor).lerp(_c2.setHex(0x7290a0), 0.3);
  else matPaddy.color.setHex({ none: 0x6f9a4e, autumn: 0xcfae50, snow: 0xe4e7ea }[PARAMS.season] ?? 0x6f9a4e);
  renderer.toneMappingExposure = PARAMS.exposure;

  // 夜間 FX(デカール・グロー・窓)
  matDecal.opacity = 0.5 * fx;
  matGlow.opacity = 0.95 * fx;
  updateWindowLights(fx);

  // 雨 FX(水たまり・傘)
  matPuddle.opacity = rain * 0.55;
  matPuddle.color.copy(_skyColor).multiplyScalar(1.25 + fx * 0.6);   // 夜は街明かりの映り込み気味に
  const umb = mannequin.getObjectByName('umbrella');
  if (umb) umb.visible = rain > 0.01;
}

/* 影ボックスをカメラ前方に追従(テクセルスナップ) */
function updateShadowBox() {
  const ahead = 22;
  const tx = cam.pos.x - Math.sin(cam.yaw) * ahead;
  const tz = cam.pos.z - Math.cos(cam.yaw) * ahead;
  const texel = (SHADOW_R * 2) / sun.shadow.mapSize.x;
  const sx = Math.round(tx / texel) * texel;
  const sz = Math.round(tz / texel) * texel;
  const sy = city?.layout?.isHillside ? hillYAt(true, sz) : 0;   // 坂: 影ボックスを局所地面高に載せる
  sun.target.position.set(sx, sy, sz);
  sun.position.set(sx + _sunDir.x * 110, sy + _sunDir.y * 110, sz + _sunDir.z * 110);
  sun.target.updateMatrixWorld();
}

============================================================ */
const cam = {
  pos: new THREE.Vector3(1.1, PARAMS.eyeH, 88),
  yaw: 0, pitch: -0.02,
};
const keys = {};

function applyCamera() {
  camera.fov = PARAMS.fov;
  camera.updateProjectionMatrix();
  cam.pos.y = PARAMS.eyeH;   // cam.pos.y は「地面からの目線高」に保つ(坂の街は描画時に地形高を足す)
  const gy = city?.layout?.isHillside ? hillYAt(true, cam.pos.z) : 0;
  camera.position.set(cam.pos.x, cam.pos.y + gy, cam.pos.z);
  camera.quaternion.setFromEuler(new THREE.Euler(cam.pitch, cam.yaw, THREE.MathUtils.degToRad(PARAMS.roll), 'YXZ'));
  updateWindowFrame();
}

const cv = renderer.domElement;
let dragging = false, lastX = 0, lastY = 0;
cv.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  cv.setPointerCapture(e.pointerId);
  hint.style.opacity = '0';
});
cv.addEventListener('pointermove', e => {
  if (!dragging) return;
  cam.yaw -= (e.clientX - lastX) * 0.0034;
  cam.pitch = clamp(cam.pitch - (e.clientY - lastY) * 0.0034, -1.45, 1.45);
  lastX = e.clientX; lastY = e.clientY;
});
cv.addEventListener('pointerup', () => dragging = false);
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? 2.2 : -2.2;
  cam.pos.x += Math.sin(cam.yaw) * d;
  cam.pos.z += Math.cos(cam.yaw) * d;
}, { passive: false });

addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  keys[e.code] = true;
  if (e.code === 'KeyT') { topView = !topView; if (city) city.dbg.visible = topView; }
  if (e.code === 'KeyR') { PARAMS.seed = (Math.random() * 1e9) | 0; regenerate(); syncPanel(); }
});
addEventListener('keyup', e => keys[e.code] = false);

/* 構図補助: 消失点スナップ(最寄りの 90° 軸へイーズ吸着)+水平線ロック */
function applyCompositionAids(dt) {
  if (PARAMS.vpSnap && !dragging) {
    const q = Math.round(cam.yaw / (Math.PI / 2)) * (Math.PI / 2);
    const d = q - cam.yaw;
    if (Math.abs(d) < 0.22) cam.yaw += d * Math.min(1, dt * 9);
  }
  if (PARAMS.horizonLock && !dragging) {
    cam.pitch += (0 - cam.pitch) * Math.min(1, dt * 9);
  }
}

function moveCamera(dt) {
  const sp = (keys.ShiftLeft || keys.ShiftRight ? 12 : 4.2) * dt;
  let fw = 0, st = 0;
  if (keys.KeyW || keys.ArrowUp) fw += 1;
  if (keys.KeyS || keys.ArrowDown) fw -= 1;
  if (keys.KeyA || keys.ArrowLeft) st -= 1;
  if (keys.KeyD || keys.ArrowRight) st += 1;
  if (fw) {
    cam.pos.x -= Math.sin(cam.yaw) * sp * fw;
    cam.pos.z -= Math.cos(cam.yaw) * sp * fw;
  }
  if (st) {
    cam.pos.x += Math.cos(cam.yaw) * sp * st;
    cam.pos.z -= Math.sin(cam.yaw) * sp * st;
  }
  cam.pos.x = clamp(cam.pos.x, -140, 140);
  cam.pos.z = clamp(cam.pos.z, -140, 140);
}

function makeCtrl(it) {
  const wrap = document.createElement('div');
  if (it.type === 'check') {
    wrap.className = 'ctrl chk';
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.id = 'c_' + it.k;
    input.checked = PARAMS[it.k];
    input.disabled = !!it.disabled;
    const label = document.createElement('label');
    label.htmlFor = input.id;
    label.textContent = it.label;
    input.oninput = () => {
      PARAMS[it.k] = input.checked;
      it.regen ? scheduleRegen() : applyLive();
    };
    wrap.append(input, label);
    ctrlRefs[it.k] = { input, it };
    return wrap;
  }
  wrap.className = 'ctrl';
  const label = document.createElement('label');
  const name = document.createElement('span');
  name.textContent = it.label;
  const val = document.createElement('span');
  val.className = 'val';
  label.append(name, val);
  wrap.appendChild(label);
  let input;
  if (it.type === 'select') {
    input = document.createElement('select');
    for (const [v, txt] of Object.entries(it.opts)) {
      const o = document.createElement('option');
      o.value = v; o.textContent = txt;
      input.appendChild(o);
    }
    input.value = PARAMS[it.k];
    input.oninput = () => {
      const v = input.value;
      PARAMS[it.k] = /^\d+(\.\d+)?$/.test(v) ? +v : v;   // 数値キー(倍率等)は数値化
      updateVal();
      it.regen ? scheduleRegen() : applyLive();
    };
  } else {
    input = document.createElement('input');
    input.type = 'range';
    input.min = it.min; input.max = it.max; input.step = it.step;
    input.value = PARAMS[it.k];
    input.oninput = () => {
      PARAMS[it.k] = parseFloat(input.value);
      updateVal();
      it.regen ? scheduleRegen() : applyLive();
    };
  }
  input.disabled = !!it.disabled;
  const updateVal = () => {
    const v = PARAMS[it.k];
    if (it.type === 'select') { val.textContent = ''; return; }
    val.textContent = it.fmt ? it.fmt(v) : it.pct ? Math.round(v * 100) + '%' : v + (it.unit || '');
  };
  updateVal();
  wrap.appendChild(input);
  ctrlRefs[it.k] = { input, it, updateVal };
  return wrap;
}

function syncPanel() {
  if (seedValEl) seedValEl.textContent = PARAMS.seed;
  for (const [k, ref] of Object.entries(ctrlRefs)) {
    if (ref.it.type === 'check') ref.input.checked = PARAMS[k];
    else { ref.input.value = PARAMS[k]; ref.updateVal?.(); }
  }
}
let lastAspect = PARAMS.aspect;
function applyLive() {

  applyLight();

  if (PARAMS.aspect !== lastAspect) { lastAspect = PARAMS.aspect; resize(); }
  else {
    const cw = renderer.domElement.clientWidth, ch = renderer.domElement.clientHeight;
    updateGuide(cw, ch, (stage.clientWidth - cw) / 2, (stage.clientHeight - ch) / 2);
  }
  if (PARAMS.mannequin && !mannequin.visible) {
    const mz = cam.pos.z - Math.cos(cam.yaw) * 5;

  const locName = { shotengai: '商店街', seaside: '海辺', rural: '田舎道', station: '駅前', hillside: '坂の街', euro: '欧州旧市街', suburbia: '米郊外', kowloon: '密集街' }[PARAMS.location] ?? (l.isArt ? '幹線' : '住宅街');
  hudStat.textContent = `[${locName}] 道路 ${l.roadW}m / 余白 ${PARAMS.setback}m / seed ${PARAMS.seed}`;
}
let fpsFrames = 0, fpsTime = 0, fpsNow = 0;
function updateHud(dt) {
  fpsFrames++; fpsTime += dt;
  if (fpsTime >= 0.5) {
    fpsNow = Math.round(fpsFrames / fpsTime);
    fpsFrames = 0; fpsTime = 0;
    const inf = renderer.info;
    hudPerf.textContent = `${fpsNow}fps / draw ${inf.render.calls} / tri ${(inf.render.triangles / 1000).toFixed(0)}k` +
      ` / geo ${inf.memory.geometries} tex ${inf.memory.textures}`;
  }
}

/* ============================================================
   リサイズ(コマ枠=キャンバス自体をそのアスペクトに)+ガイド
============================================================ */
function resize() {
  const sw = stage.clientWidth, sh = stage.clientHeight;
  let w = sw, h = sh;
  if (PARAMS.aspect !== 'free') {
    const [aw, ah] = PARAMS.aspect.split(':').map(Number);
    const r = aw / ah;
    if (sw / sh > r) { h = sh; w = Math.round(sh * r); }
    else { w = sw; h = Math.round(sw / r); }
  }
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  const oa = w / h, oz = 120;
  orthoCam.left = -oz * oa; orthoCam.right = oz * oa;
  orthoCam.top = oz; orthoCam.bottom = -oz;
  orthoCam.updateProjectionMatrix();
  updateGuide(w, h, (sw - w) / 2, (sh - h) / 2);
}
addEventListener('resize', resize);

/* ガイド線(DOM/SVG なので書き出しに写らない) */
const guideEl = document.getElementById('guide');
function updateGuide(w, h, left, top) {
  guideEl.style.display = PARAMS.guides ? 'block' : 'none';
  if (!PARAMS.guides) return;
  guideEl.style.left = left + 'px';
  guideEl.style.top = top + 'px';
  guideEl.setAttribute('width', w);
  guideEl.setAttribute('height', h);
  guideEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
  guideEl.replaceChildren();
  const mk = (x1, y1, x2, y2, op) => {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', '#7cf'); l.setAttribute('stroke-opacity', op);
    l.setAttribute('stroke-width', '1');
    guideEl.appendChild(l);
  };
  mk(w / 3, 0, w / 3, h, 0.4); mk(w * 2 / 3, 0, w * 2 / 3, h, 0.4);   // 三分割
  mk(0, h / 3, w, h / 3, 0.4); mk(0, h * 2 / 3, w, h * 2 / 3, 0.4);
  mk(0, 0, w, h, 0.22); mk(w, 0, 0, h, 0.22);                          // 対角(消失点)
  mk(w / 2 - 12, h / 2, w / 2 + 12, h / 2, 0.6);                       // 中心十字
  mk(w / 2, h / 2 - 12, w / 2, h / 2 + 12, 0.6);
}

/* 窓越しフレーム(室内から窓外に街を見る構図。カメラの子・L0 で線画にも写る) */
const winFrame = (() => {
  const parts = [];
  const t = 0.05;
  box(parts, 0,  0.5 - t / 2, 0, 1.04, t, 0.02, 0xeceae2);      // 外枠
  box(parts, 0, -0.5 + t / 2, 0, 1.04, t, 0.02, 0xeceae2);
  box(parts, -0.52 + t / 2, 0, 0, t, 1, 0.02, 0xeceae2);
  box(parts,  0.52 - t / 2, 0, 0, t, 1, 0.02, 0xeceae2);
  box(parts, 0, 0, 0.002, 0.018, 1, 0.012, 0xd8d6ce);           // 十字桟
  box(parts, 0, 0, 0.002, 1.04, 0.018, 0.012, 0xd8d6ce);
  box(parts, -0.46, 0, -0.012, 0.1, 0.94, 0.014, 0xd9ccb9);     // カーテン(束ね)
  box(parts,  0.46, 0, -0.012, 0.1, 0.94, 0.014, 0xd9ccb9);
  // 外周の室内壁(枠の外に街が見えないよう視界の縁を覆う)
  box(parts, 0,  1.75, 0.01, 6.4, 2.5, 0.012, 0xf0eee6);
  box(parts, 0, -1.75, 0.01, 6.4, 2.5, 0.012, 0xf0eee6);
  box(parts, -1.71, 0, 0.01, 2.5, 1.1, 0.012, 0xf0eee6);
  box(parts,  1.71, 0, 0.01, 2.5, 1.1, 0.012, 0xf0eee6);
  const geo = mergeGeometries(parts, false);
  const mesh = new THREE.Mesh(geo, matGlass);   // unlit(照明に依らず常に見える)
  mesh.visible = false;
  return mesh;
})();
function updateWindowFrame() {
  winFrame.visible = PARAMS.windowFrame && !topView;   // 俯瞰デバッグに写り込ませない
  if (!winFrame.visible) return;
  const d = 0.62;
  const h = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * d * 2;
  winFrame.scale.set(h * camera.aspect * 0.92, h * 0.92, 1);    // ビューの 92% を枠が覆う
  winFrame.position.z = -d;
}

/* マネキン(1.6m スケール確認用。トグル時にカメラ前方 5m へ固定配置) */
const mannequin = new THREE.Group();
{
  const mMat = new THREE.MeshStandardMaterial({ color: 0xb85a72, roughness: 0.9 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.2, 1.15, 10), mMat);
  body.position.y = 0.88;
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), mMat);
  head.position.y = 1.48;
  const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.62, 8), mMat);
  legL.position.set(0.09, 0.31, 0);
  const legR = legL.clone();
  legR.position.x = -0.09;
  mannequin.add(body, head, legL, legR);
  // 傘(雨のとき自動表示)

  umbrella.name = 'umbrella';
  umbrella.visible = false;

  mannequin.traverse(o => { o.castShadow = true; });
  mannequin.visible = false;
}

/* ============================================================
   #12 モブ(粘土人形/自転車/猫)— 位置アニメのみ・L0(線画に出る)
   静的マージには入れず、動的 mobGroup を毎フレーム動かす。密度 0=無人(既定)
============================================================ */
const mobGroup = new THREE.Group();
let mobs = [], lastMobKey = null;
const SKIN = [0xcaa38a, 0xe0c0a4, 0xb98a68, 0xd8b090];
const CLOTH = [0x3a4a6a, 0x8a3a30, 0x2e5a44, 0x4a4650, 0x6a5a3e, 0xb0b4b8, 0x7a3a58, 0x2e3e52];

function mergeMob(list) {
  const g = mergeGeometries(list, false);
  g.computeBoundingSphere();
  return new THREE.Mesh(g, matSolid);
}
function pedestrianGeo(rng) {                    // 原点=足元・高さ ~1.65m
  const parts = [];
  const skin = pick(rng, SKIN), top = pick(rng, CLOTH), bot = pick(rng, CLOTH);
  const scale = rr(rng, 0.92, 1.08);
  cyl(parts, 0.09, 0.32 * scale, 0, 0.065, 0.62 * scale, bot);    // 脚 L
  cyl(parts, -0.09, 0.32 * scale, 0, 0.065, 0.62 * scale, bot);   // 脚 R
  box(parts, 0, (0.66 + 0.5) * scale, 0, 0.34, 0.56 * scale, 0.22, top);  // 胴
  for (const s of [1, -1]) cyl(parts, s * 0.22, 0.98 * scale, 0, 0.05, 0.5 * scale, top);  // 腕
  blob(parts, 0, (1.28 + 0.14) * scale, 0, 0.15, skin);          // 頭
  if (rng() < 0.35) blob(parts, 0, (1.44) * scale, 0, 0.17, pick(rng, [0x2e2a26, 0x4a3a2e, 0x6a5a4a]));  // 髪/帽子
  return mergeMob(parts);
}
function bikeGeo(rng) {                           // 原点=接地・進行 +z 向き
  const parts = [];
  clayBike(parts, 0, 0, 0);                        // 既存の粘土自転車(origin)
  const skin = pick(rng, SKIN), top = pick(rng, CLOTH);
  cyl(parts, 0, 0.95, -0.05, 0.06, 0.5, pick(rng, CLOTH));       // 乗員の脚
  box(parts, 0, 1.28, -0.05, 0.3, 0.5, 0.22, top);              // 胴
  blob(parts, 0, 1.62, -0.05, 0.14, skin);                      // 頭
  return mergeMob(parts);
}
function catGeo(rng) {                             // 原点=接地・高さ ~0.35m
  const parts = [];
  const c = pick(rng, [0x2e2a28, 0xc9a86a, 0xe8e4dc, 0x8a7a68, 0x4a4642]);
  box(parts, 0, 0.2, 0, 0.5, 0.18, 0.2, c);                      // 胴
  box(parts, 0, 0.26, 0.28, 0.18, 0.18, 0.16, c);               // 頭
  for (const dz of [0.18, -0.18]) for (const dx of [0.07, -0.07]) cyl(parts, dx, 0.09, dz, 0.03, 0.18, c);  // 脚
  cyl(parts, 0, 0.28, -0.32, 0.025, 0.34, c);                    // 尾(斜めは省略)
  return mergeMob(parts);
}

function disposeMob() {
  for (const m of mobs) { mobGroup.remove(m.mesh); m.mesh.geometry.dispose(); }
  mobs = [];
}
function buildMob(layout) {
  disposeMob();
  lastMobKey = mobKey();
  const d = PARAMS.mobDensity;
  if (d <= 0 || !layout) return;
  const rng = mulberry32(hash2(layout.seed, 24680));
  const { roadW } = layout;
  const sides = layout.isSeaside ? [-1] : [1, -1];
  const N = Math.round(d * 22);                   // 最大 22 体
  for (let i = 0; i < N; i++) {
    const roll = rng();
    const side = pick(rng, sides);
    if (roll < 0.62) {                            // 歩行者(路肩を z 方向に往復。道路面内=建物にめり込まない)
      const mesh = pedestrianGeo(rng);
      const zc = rr(rng, -L / 2 + 15, L / 2 - 15), span = rr(rng, 10, 26);
      const walkX = layout.sidewalkW > 0 ? roadW / 2 + 0.65 + rr(rng, 0.4, layout.sidewalkW - 0.3)  // 幹線=歩道
                                         : roadW / 2 - rr(rng, 0.4, 1.1);                            // 生活道路=路肩
      mobs.push({ mesh, kind: 'ped', axis: 'z', fixed: side * walkX,
        a: zc - span / 2, b: zc + span / 2, p: rng(), spd: rr(rng, 0.9, 1.5), dir: rng() < 0.5 ? 1 : -1, ph: rng() * 6.28 });
      mobGroup.add(mesh);
    } else if (roll < 0.85) {                     // 自転車(路肩を z 方向に速く)
      const mesh = bikeGeo(rng);
      mobs.push({ mesh, kind: 'bike', axis: 'z', fixed: side * (roadW / 2 - 0.5),
        a: -L / 2 + 6, b: L / 2 - 6, p: rng(), spd: rr(rng, 3.2, 5.0), dir: rng() < 0.5 ? 1 : -1, ph: 0 });
      mobGroup.add(mesh);
    } else {                                      // 猫(道路を x 方向に横断)
      const mesh = catGeo(rng);
      mobs.push({ mesh, kind: 'cat', axis: 'x', fixed: rr(rng, -L / 2 + 12, L / 2 - 12),
        a: -roadW / 2 - 1, b: roadW / 2 + 1, p: rng(), spd: rr(rng, 0.8, 1.6), dir: rng() < 0.5 ? 1 : -1, ph: rng() * 6.28 });
      mobGroup.add(mesh);
    }
  }
}
function updateMob(dt) {
  if (!mobs.length) return;
  const isH = city?.layout?.isHillside;
  for (const m of mobs) {
    const len = m.b - m.a;
    m.p += (m.spd / Math.max(0.5, len)) * dt * m.dir;
    if (m.p > 1) { m.p = 1; m.dir = -1; } else if (m.p < 0) { m.p = 0; m.dir = 1; }
    const u = m.a + len * m.p;
    let x, z;
    if (m.axis === 'z') { x = m.fixed; z = u; m.mesh.rotation.y = m.dir > 0 ? 0 : Math.PI; }   // 部品は +z 前
    else { x = u; z = m.fixed; m.mesh.rotation.y = m.dir > 0 ? Math.PI / 2 : -Math.PI / 2; }
    const bob = m.kind === 'ped' ? Math.abs(Math.sin(m.p * len * 3 + m.ph)) * 0.04 : 0;   // 歩行のボビング
    m.mesh.position.set(x, (isH ? hillYAt(true, z) : 0) + bob, z);
  }
}
function mobKey() { return PARAMS.mobDensity; }

/* ============================================================
   PNG 書き出し(書き出し直前に該当モードで render → toBlob)
============================================================ */
function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 8000);
}
let exporting = false;
/* 書き出しジョブ実行。job = { mode, alpha, layer:[min,max](far正規化), suffix } */
async function exportJobs(jobs) {
  if (exporting) return;
  exporting = true;
  const cssW = renderer.domElement.clientWidth, cssH = renderer.domElement.clientHeight;
  const pr = renderer.getPixelRatio();
  const mobWas = mobGroup.visible;
  if (PARAMS.mobExportEmpty) mobGroup.visible = false;   // #12 無人プレートで書き出し
  try {
    const scale = PARAMS.exportScale;
    let ew = Math.round(cssW * scale), eh = Math.round(cssH * scale);
    const mx = Math.max(ew, eh);
    if (mx > 8192) { const k = 8192 / mx; ew = Math.round(ew * k); eh = Math.round(eh * k); }
    renderer.setPixelRatio(1);
    renderer.setSize(ew, eh, false);
    exportPitchScale = ew / (cssW * pr);   // 網点ピッチを倍率追従
    for (const job of jobs) {
      exportAlphaMode = job.alpha ? 1 : 0;
      exportLayerRange = job.layer || [0, 1.02];
      exportRainOverride = job.rainOverride ?? null;
      renderFrame(job.mode, camera);
      const blob = await new Promise(res => renderer.domElement.toBlob(res, 'image/png'));
      if (blob) downloadBlob(blob, `street_${PARAMS.seed}_${job.suffix}.png`);
    }
  } finally {
    // 例外時も表示状態を必ず復元し、書き出し解像度の RT は破棄する
    exportPitchScale = 1;
    exportAlphaMode = 0;
    exportLayerRange = [0, 1.02];
    exportRainOverride = null;
    renderer.setPixelRatio(pr);
    renderer.setSize(cssW, cssH, false);
    disposeRTs();
    mobGroup.visible = mobWas;
    exporting = false;
    renderFrame(PARAMS.mode, camera);
  }
}
function exportPNG(modes) {
  return exportJobs(modes.map(m => ({
    mode: m,
    alpha: PARAMS.exportAlpha && m !== 'clay',   // CLAY に透過は無意味
    suffix: m + (PARAMS.exportAlpha && m !== 'clay' ? '_alpha' : ''),
  })));
}
/* レイヤー分け書き出し(LINE・透過固定): 近/中/遠の 3 枚。重ねると単発 LINE と一致する */
function exportLayers() {
  const far = camera.far;
  const nf = clamp(PARAMS.layerNear, 2, far) / far;
  const mf = Math.max(nf + 0.002, clamp(PARAMS.layerMid, 2, far) / far);
  return exportJobs([
    // 雨線は手前に降るものなので near レイヤーにのみ入れる(重ね合成での重複防止)
    { mode: 'line', alpha: true, layer: [0, nf],    suffix: 'line_near' },
    { mode: 'line', alpha: true, layer: [nf, mf],   suffix: 'line_mid', rainOverride: 0 },
    { mode: 'line', alpha: true, layer: [mf, 1.02], suffix: 'line_far', rainOverride: 0 },
  ]);
}

let lastT = performance.now();
function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (exporting) return;   // 書き出し中はライブ描画を止める(toBlob 前の canvas 汚染防止)
  moveCamera(dt);
  applyCompositionAids(dt);
  applyCamera();
  updateShadowBox();
  updateCrossing(dt);
  updateRain(dt);
  updatePetals(dt);
  updateMob(dt);
  const activeCam = topView ? orthoCam : camera;
  renderFrame(PARAMS.mode, activeCam);
  updateHud(dt);
}

/* ============================================================
   boot
============================================================ */
parseHash();

scene.add(skyDome);
scene.add(mannequin);
scene.add(mobGroup);
scene.add(rainFx.mesh);
scene.add(petalFx.mesh);
scene.add(camera);        // カメラの子(窓越しフレーム)を描画可能に
camera.add(winFrame);
buildPanel();
buildModebar();
resize();
applyLight();
applyCamera();
regenerate();
requestAnimationFrame(tick);

/* デバッグフック(Playwright 検証用) */
window.__street = {
  params: PARAMS,
  set(k, v) { PARAMS[k] = v; applyLive(); },
  regen(seed) { if (seed != null) PARAMS.seed = seed; regenerate(); syncPanel(); },
  layout: () => city?.layout,
  city: () => city,
  scene, renderer,
  info: () => ({ calls: renderer.info.render.calls, tris: renderer.info.render.triangles,
                 geos: renderer.info.memory.geometries, tex: renderer.info.memory.textures, fps: fpsNow }),
  cam,
};
