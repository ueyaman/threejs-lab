<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08 - Metaball Field | Three.js Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #eef0f2; overflow: hidden; }
    canvas { display: block; }
    #back {
      position: fixed; top: 1rem; left: 1rem; z-index: 10;
      color: #7cf; font-size: 0.85rem; text-decoration: none;
      font-family: monospace;
      background: rgba(0,0,0,0.5); padding: 0.3rem 0.6rem;
      border-radius: 4px; border: 1px solid #333;
    }
    #back:hover { border-color: #7cf; }
  </style>
</head>
<body>
  <a id="back" href="index.html">← 一覧へ</a>
  <video id="bgVideo" src="docs/260719/bg-blur.mp4"
         autoplay muted loop playsinline
         style="display:none"></video>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const MAX = 24;
    const INIT_N = 12;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(1);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.Camera();

    // ---- Wall bounds (field coords) ----
    // Wall bounds derived from camera visible area (focal=1.6, camZ varies with aspect)
    function getCamZ() {
      const aspect = window.innerWidth / window.innerHeight;
      return 3.8 + Math.max(0, 1.0 - aspect) * 2.5;
    }
    function wallX() { return getCamZ() / 3.2 * (window.innerWidth / window.innerHeight) * 0.85; }
    function wallY() { return getCamZ() / 3.2 * 0.85; }

    // ---- Ball management ----
    function makeBall() {
      const wx = wallX(), wy = wallY();
      const angle = Math.random() * Math.PI * 2;
      const spd = 0.8 + Math.random() * 0.8;
      const angle2 = Math.random() * Math.PI * 2;
      return {
        x: (Math.random() * 2 - 1) * wx * 0.8,
        y: (Math.random() * 2 - 1) * wy * 0.8,
        z: (Math.random() * 2 - 1) * 0.25,
        vx: Math.cos(angle) * spd * 0.9,
        vy: Math.sin(angle) * spd * 0.9,
        vz: Math.sin(angle2) * spd * 0.3,
        r: 0.18 + Math.random() * 0.16,
        pf: 0.5 + Math.random() * 0.9,
        pp: Math.random() * Math.PI * 2,
        hue: Math.random(),
        life: 1.0,
        dying: false,
        sqX: 1.0, sqY: 1.0, sqVx: 0, sqVy: 0,
        wallStick: 0, wallDirX: 0, wallDirY: 0, wallTanV: 0, preSpeed: 0,
        sf1: 0.15 + Math.random() * 0.35,
        sf2: 0.07 + Math.random() * 0.15,
        sf3: 0.4 + Math.random() * 0.8,
        sp1: Math.random() * Math.PI * 2,
        sp2: Math.random() * Math.PI * 2,
        sp3: Math.random() * Math.PI * 2,
        samp: 0.4 + Math.random() * 0.5,
      };
    }

    let balls = [];
    for (let i = 0; i < INIT_N; i++) balls.push(makeBall());

    const centers = [], radii = [], hueArr = [], squashArr = [];
    for (let i = 0; i < MAX; i++) {
      centers.push(new THREE.Vector2());
      radii.push(0);
      hueArr.push(0);
      squashArr.push(new THREE.Vector2(1, 1));
    }

    const uniforms = {
      uResolution: { value: new THREE.Vector2() },
      uCenters:    { value: centers },
      uRadii:      { value: radii },
      uHue:        { value: hueArr },
      uCount:      { value: 0 },
      uTime:       { value: 0.0 },
      uScroll:     { value: 0.0 },
      uSpeed:      { value: new Float32Array(MAX) },
      uSquash:     { value: squashArr },
      uZ:          { value: new Float32Array(MAX) },
      uBgTex:      { value: null },
      uHasVideo:   { value: 0.0 },
    };

    // Video texture
    const videoEl = document.getElementById('bgVideo');
    function initVideoTex() {
      if (uniforms.uHasVideo.value > 0) return;
      const vTex = new THREE.VideoTexture(videoEl);
      vTex.minFilter = THREE.LinearFilter;
      vTex.magFilter = THREE.LinearFilter;
      uniforms.uBgTex.value = vTex;
      uniforms.uHasVideo.value = 1.0;
    }
    videoEl.addEventListener('loadeddata', () => {
      initVideoTex();
      videoEl.play().catch(() => {});
    });
    if (videoEl.readyState >= 2) {
      initVideoTex();
      videoEl.play().catch(() => {});
    }
    document.addEventListener('click', () => {
      if (videoEl.paused) videoEl.play().catch(() => {});
    }, { once: true });

    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader: /* glsl */`
        void main() { gl_Position = vec4(position, 1.0); }
      `,
      fragmentShader: /* glsl */`
        uniform vec2  uResolution;
        uniform vec2  uCenters[${MAX}];
        uniform float uRadii[${MAX}];
        uniform float uHue[${MAX}];
        uniform int   uCount;
        uniform float uTime;
        uniform float uScroll;
        uniform float uSpeed[${MAX}];
        uniform vec2  uSquash[${MAX}];
        uniform float uZ[${MAX}];
        uniform sampler2D uBgTex;
        uniform float uHasVideo;

        const int   MAX_STEPS = 48;
        const float MAX_DIST  = 20.0;
        const float SURF_DIST = 0.002;
        const float BLEND_K   = 0.6;

        vec3 palette(float t) {
          return 0.5 + 0.5 * cos(6.28318 * (t + vec3(0.0, 0.33, 0.67)));
        }

        float smin(float a, float b, float k) {
          float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
          return mix(b, a, h) - k*h*(1.0-h);
        }

        float sceneSDF(vec3 p) {
          float d = MAX_DIST;
          for (int i = 0; i < ${MAX}; i++) {
            if (i >= uCount) break;
            float r = uRadii[i];
            if (r <= 0.0) continue;
            vec3 center = vec3(uCenters[i], uZ[i]);
            vec3 q = p - center;
            q.x /= uSquash[i].x;
            q.y /= uSquash[i].y;
            float sd = length(q) - r;
            sd *= min(min(uSquash[i].x, uSquash[i].y), 1.0);
            d = smin(d, sd, BLEND_K);
          }
          return d;
        }

        vec3 sceneColor(vec3 p) {
          float totalW = 0.0;
          vec3 col = vec3(0.0);
          float spd = 0.0;
          for (int i = 0; i < ${MAX}; i++) {
            if (i >= uCount) break;
            float r = uRadii[i];
            if (r <= 0.0) continue;
            vec3 center = vec3(uCenters[i], uZ[i]);
            float dist = length(p - center);
            float w = exp(-dist*dist / (r*r*2.0));
            col += w * palette(uHue[i] + uTime * 0.03);
            spd += w * uSpeed[i];
            totalW += w;
          }
          col /= max(totalW, 0.001);
          spd /= max(totalW, 0.001);
          return col * (0.9 + min(spd * 0.1, 0.3));
        }

        vec3 getNormal(vec3 p) {
          vec2 e = vec2(0.002, 0.0);
          return normalize(vec3(
            sceneSDF(p+e.xyy) - sceneSDF(p-e.xyy),
            sceneSDF(p+e.yxy) - sceneSDF(p-e.yxy),
            sceneSDF(p+e.yyx) - sceneSDF(p-e.yyx)
          ));
        }

        vec3 glowColor(vec3 p) {
          float totalW = 0.0;
          vec3 col = vec3(0.0);
          for (int i = 0; i < ${MAX}; i++) {
            if (i >= uCount) break;
            float r = uRadii[i];
            if (r <= 0.0) continue;
            vec3 center = vec3(uCenters[i], uZ[i]);
            float dist = length(p - center);
            float w = exp(-dist*dist / (r*r*3.0));
            col += w * palette(uHue[i] + uTime * 0.03);
            totalW += w;
          }
          return col / max(totalW, 0.001);
        }

        float hash21(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        float vnoise(vec2 p) {
          vec2 i = floor(p), f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          return mix(
            mix(hash21(i), hash21(i + vec2(1,0)), f.x),
            mix(hash21(i + vec2(0,1)), hash21(i + vec2(1,1)), f.x), f.y);
        }
        float fbm(vec2 p) {
          float v = 0.0, a = 0.5;
          for (int i = 0; i < 4; i++) { v += a * vnoise(p); p = p * 2.0 + 0.5; a *= 0.5; }
          return v;
        }

        vec3 journey(float t, vec2 px) {
          vec2 np = px * 0.003;
          vec3 c = vec3(1.0, 1.0, 0.98);
          c = mix(c, vec3(1.0, 0.82, 0.3), smoothstep(0.02, 0.06, t));
          c = mix(c, vec3(0.95, 0.4, 0.08), smoothstep(0.06, 0.10, t));
          c = mix(c, vec3(0.01, 0.01, 0.03), smoothstep(0.10, 0.18, t));
          float starZone = smoothstep(0.14, 0.18, t) * (1.0 - smoothstep(0.22, 0.27, t));
          c += step(0.97, hash21(floor(px * 0.4))) * starZone * vec3(0.6, 0.7, 1.0);
          c = mix(c, vec3(0.04, 0.08, 0.25), smoothstep(0.22, 0.28, t));
          c = mix(c, vec3(0.15, 0.3, 0.7), smoothstep(0.28, 0.33, t));
          c = mix(c, vec3(0.4, 0.65, 0.95), smoothstep(0.33, 0.38, t));
          c = mix(c, vec3(0.88, 0.90, 0.94), smoothstep(0.40, 0.46, t));
          float cloudZ = smoothstep(0.39, 0.43, t) * (1.0 - smoothstep(0.49, 0.53, t));
          c = mix(c, vec3(0.96), fbm(np * 4.0 + t * 8.0) * cloudZ * 0.6);
          c = mix(c, vec3(0.4, 0.65, 0.95), smoothstep(0.50, 0.56, t));
          c = mix(c, vec3(0.15, 0.5, 0.75), smoothstep(0.56, 0.62, t));
          float oceanZ = smoothstep(0.58, 0.63, t) * (1.0 - smoothstep(0.72, 0.78, t));
          c += vnoise(px * 0.008 + vec2(0.0, uTime * 0.2)) * oceanZ * 0.06 * vec3(0.2, 0.5, 0.8);
          c = mix(c, vec3(0.04, 0.15, 0.4), smoothstep(0.62, 0.70, t));
          c = mix(c, vec3(0.005, 0.01, 0.03), smoothstep(0.70, 0.80, t));
          c = mix(c, vec3(0.04, 0.025, 0.015), smoothstep(0.80, 0.84, t));
          c = mix(c, vec3(0.12, 0.06, 0.03), smoothstep(0.84, 0.88, t));
          c = mix(c, vec3(0.5, 0.12, 0.02), smoothstep(0.88, 0.93, t));
          float magmaZ = smoothstep(0.90, 0.94, t);
          c = mix(c, vec3(1.0, 0.35, 0.05), fbm(np * 3.0 + uTime * 0.08) * magmaZ * 0.4);
          c = mix(c, vec3(1.0, 0.55, 0.1), smoothstep(0.93, 0.96, t));
          c = mix(c, vec3(1.0, 1.0, 0.98), smoothstep(0.96, 1.0, t));
          return c;
        }

        void main() {
          vec2 uv = (gl_FragCoord.xy - 0.5*uResolution) / uResolution.y;

          // Camera: fixed, pulls back on portrait screens
          float aspect = uResolution.x / uResolution.y;
          float camZ = 3.8 + max(0.0, 1.0 - aspect) * 2.5;
          vec3 ro = vec3(0.0, 0.3, camZ);
          vec3 target = vec3(0.0);
          vec3 fwd = normalize(target - ro);
          vec3 right = normalize(cross(fwd, vec3(0.0, 1.0, 0.0)));
          vec3 up = cross(right, fwd);
          vec3 rd = normalize(uv.x*right + uv.y*up + 1.6*fwd);

          // Background
          vec2 screenUV = gl_FragCoord.xy / uResolution;
          float bgT = clamp(uScroll + (1.0 - screenUV.y) * 0.06, 0.0, 1.0);
          vec3 jBg = journey(bgT, gl_FragCoord.xy);
          vec3 bg = jBg;
          if (uHasVideo > 0.5) {
            vec2 vuv = vec2(screenUV.x, 1.0 - screenUV.y);
            vec3 vid = vec3(0.0);
            for (int bx = -1; bx <= 1; bx++) {
              for (int by = -1; by <= 1; by++) {
                vec2 off = vec2(float(bx), float(by)) * 20.0 / uResolution;
                vid += texture2D(uBgTex, clamp(vuv + off, 0.0, 1.0)).rgb;
              }
            }
            vid /= 9.0;
            bg = mix(jBg, vid, 0.6);
          }

          vec3 lightDir = normalize(vec3(0.5, 0.8, 0.6));

          // --- 2-layer raymarching for transparency ---
          float t = 0.0;
          float closestDist = MAX_DIST;
          vec3 closestPos = ro;
          vec3 col = bg;
          int layers = 0;

          for (int layer = 0; layer < 2; layer++) {
            bool hit = false;
            int steps = layer == 0 ? MAX_STEPS : 32;
            for (int i = 0; i < MAX_STEPS; i++) {
              if (i >= steps) break;
              vec3 p = ro + t*rd;
              float d = sceneSDF(p);
              if (layer == 0 && d < closestDist) { closestDist = d; closestPos = p; }
              if (d < SURF_DIST) { hit = true; break; }
              t += d;
              if (t > MAX_DIST) break;
            }

            if (!hit) break;
            layers++;

            vec3 p = ro + t*rd;
            vec3 n = getNormal(p);
            vec3 v = -rd;

            float diff = max(dot(n, lightDir), 0.0);
            vec3 h = normalize(lightDir + v);
            float spec = pow(max(dot(n, h), 0.0), 80.0);
            float fresnel = pow(1.0 - max(dot(n, v), 0.0), 3.0);

            vec3 baseCol = sceneColor(p);
            vec3 iridescent = palette(fresnel*0.8 + dot(n, lightDir)*0.25 + 0.05);
            vec3 specCol = vec3(1.0, 0.98, 0.92) * spec;

            vec3 refl = reflect(rd, n);
            float reflT = clamp(uScroll + (1.0 - (refl.y*0.5+0.5)) * 0.06, 0.0, 1.0);
            vec3 reflCol = journey(reflT, gl_FragCoord.xy + refl.xz*200.0);
            if (uHasVideo > 0.5) {
              vec2 reflUV = clamp(vec2(screenUV.x, 1.0 - screenUV.y) + refl.xz * 0.08, 0.0, 1.0);
              reflCol = mix(reflCol, texture2D(uBgTex, reflUV).rgb, 0.4);
            }

            float layerFade = (layer == 0) ? 1.0 : 0.4;
            float lift = (0.12 + fresnel * 0.08) * layerFade;
            col *= (1.0 + lift);
            col += iridescent * fresnel * 0.5 * layerFade;
            col += baseCol * 0.06 * layerFade;
            col += reflCol * fresnel * 0.3 * layerFade;
            col += specCol * 1.2 * layerFade;

            // Step through entire current object before looking for the next
            t += 0.3;
            for (int skip = 0; skip < 16; skip++) {
              if (sceneSDF(ro + t*rd) > 0.05) break;
              t += 0.08;
            }
          }

          // Soft glow for rays that missed entirely
          if (layers == 0) {
            float glow = exp(-closestDist * 4.0) * 0.25;
            if (glow > 0.005) {
              vec3 gc = glowColor(closestPos);
              col += gc * glow;
            }
          }

          gl_FragColor = vec4(col, 1.0);
        }
      `,
    });

    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

    // ---- Mouse ----
    const mouse = { x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, inside: false };

    function toField(cx, cy) {
      let x = (cx / window.innerWidth) * 2 - 1;
      let y = -((cy / window.innerHeight) * 2 - 1);
      x *= window.innerWidth / window.innerHeight;
      return [x, y];
    }

    window.addEventListener('pointermove', e => {
      const [x, y] = toField(e.clientX, e.clientY);
      if (!mouse.inside) { mouse.px = x; mouse.py = y; }
      mouse.x = x; mouse.y = y; mouse.inside = true;
    });
    window.addEventListener('pointerleave', () => { mouse.inside = false; });

    // ---- Scroll ----
    const JOURNEY_WINDOW = 0.06;
    const CYCLE_SEC = 25;
    let scrollPos = 0, maxScroll = 1.0 - JOURNEY_WINDOW;
    let manualScroll = false, manualTimer = 0;

    window.addEventListener('wheel', e => {
      e.preventDefault();
      scrollPos += e.deltaY * 0.0004;
      scrollPos = Math.max(0, Math.min(scrollPos, maxScroll));
      uniforms.uScroll.value = scrollPos;
      manualScroll = true;
      manualTimer = 3.0;
    }, { passive: false });

    // ---- Resolution (device pixels) ----
    function updateResolution() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.getDrawingBufferSize(uniforms.uResolution.value);
    }
    updateResolution();

    window.addEventListener('resize', updateResolution);

    // ---- Animation loop ----
    const MOUSE_PUSH = 2.0;
    const DRIFT_SPEED = 2.50;
    let simTime = 0, last = performance.now();
    let fissionTimer = 12;

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;

      simTime += dt * DRIFT_SPEED;
      uniforms.uTime.value = simTime;

      // Auto-scroll journey (pauses briefly after manual scroll)
      if (manualScroll) {
        manualTimer -= dt;
        if (manualTimer <= 0) manualScroll = false;
      }
      if (!manualScroll) {
        scrollPos += dt / CYCLE_SEC * maxScroll;
        if (scrollPos > maxScroll) scrollPos -= maxScroll;
        uniforms.uScroll.value = scrollPos;
      }

      const wx = wallX(), wy = wallY();

      // Mouse velocity
      if (mouse.inside && dt > 0) {
        const rawVx = (mouse.x - mouse.px) / dt;
        const rawVy = (mouse.y - mouse.py) / dt;
        const smooth = Math.min(5.0 * dt, 1.0);
        mouse.vx += (rawVx - mouse.vx) * smooth;
        mouse.vy += (rawVy - mouse.vy) * smooth;
      } else {
        mouse.vx *= 0.9; mouse.vy *= 0.9;
      }
      mouse.px = mouse.x; mouse.py = mouse.y;
      const mspeed = Math.hypot(mouse.vx, mouse.vy);
      const maxMV = 2.0;
      if (mspeed > maxMV) { mouse.vx *= maxMV / mspeed; mouse.vy *= maxMV / mspeed; }

      // #2 Fission: occasionally split a large ball into two
      fissionTimer -= dt;
      if (fissionTimer <= 0 && balls.length < MAX - 2) {
        let maxR = 0, maxIdx = 0;
        for (let k = 0; k < balls.length; k++) {
          if (balls[k].r > maxR) { maxR = balls[k].r; maxIdx = k; }
        }
        const parent = balls[maxIdx];
        if (parent.r > 0.14) {
          const child = makeBall();
          child.x = parent.x; child.y = parent.y; child.z = parent.z;
          child.r = parent.r * 0.55;
          parent.r *= 0.65;
          const splitAngle = Math.atan2(parent.vy, parent.vx) + Math.PI * 0.5;
          child.vx = Math.cos(splitAngle) * 1.2;
          child.vy = Math.sin(splitAngle) * 1.2;
          parent.vx += -Math.cos(splitAngle) * 0.6;
          parent.vy += -Math.sin(splitAngle) * 0.6;
          balls.push(child);
        }
        fissionTimer = 15 + Math.sin(simTime * 0.3) * 5;
      }

      for (let i = 0; i < balls.length; i++) {
        const b = balls[i];
        const sticking = b.wallStick > 0;

        if (!sticking) {
          const steerAngle = Math.sin(simTime * 0.3 * b.pf + b.pp) * 0.8;
          const cs = Math.cos(steerAngle * dt), sn = Math.sin(steerAngle * dt);
          const nvx = b.vx * cs - b.vy * sn;
          const nvy = b.vx * sn + b.vy * cs;
          b.vx = nvx; b.vy = nvy;
          // Z-axis drift via slow noise
          const zSteer = Math.sin(simTime * 0.2 * b.pf + b.pp * 1.7) * 0.4;
          b.vz += (zSteer - b.vz) * Math.min(2.0 * dt, 1.0);

          // Multi-frequency speed modulation — each ball has its own rhythm
          const s1 = Math.sin(simTime * b.sf1 + b.sp1);
          const s2 = Math.sin(simTime * b.sf2 + b.sp2);
          const s3 = Math.sin(simTime * b.sf3 + b.sp3);
          const speedMod = 1.0 + b.samp * (s1 * s2 + s3 * 0.3);
          const curSpd = Math.hypot(b.vx, b.vy);
          const baseSpd = (0.8 + b.r * 0.5) * Math.max(speedMod, 0.15);
          const targetSpd = baseSpd;
          const adj = 1.0 + (targetSpd / Math.max(curSpd, 0.01) - 1.0) * Math.min(3.0 * dt, 1.0);
          b.vx *= adj; b.vy *= adj;
        }

        // Ball-to-ball interaction — repulsion + occasional attraction pulses
        for (let j = i + 1; j < balls.length; j++) {
          const o = balls[j];
          const dx = o.x - b.x, dy = o.y - b.y, dz = o.z - b.z;
          const d = Math.sqrt(dx * dx + dy * dy + dz * dz + 0.001);
          const rSum = b.r + o.r;
          const coreDist = rSum * 0.8;
          const envDist  = rSum * 2.5;

          // #1 Attraction pulse: pair-specific noise crosses threshold
          const pairSeed = i * 31.0 + j * 17.0;
          const attr = Math.sin(simTime * 0.12 + pairSeed) * Math.sin(simTime * 0.08 + pairSeed * 0.7);
          const attracting = attr > 0.75;

          let push = 0;
          if (d < coreDist) {
            const t = 1.0 - d / coreDist;
            push = 6.0 * t * t / d;
          } else if (d < envDist) {
            const t = 1.0 - (d - coreDist) / (envDist - coreDist);
            push = attracting ? -0.9 * t / d : 0.6 * t / d;
          }
          if (push !== 0) {
            if (!sticking) { b.vx -= dx * push * dt; b.vy -= dy * push * dt; b.vz -= dz * push * dt; }
            if (o.wallStick <= 0) { o.vx += dx * push * dt; o.vy += dy * push * dt; o.vz += dz * push * dt; }
          }
        }

        // Mouse disturbance
        if (mouse.inside && !sticking) {
          const dx = b.x - mouse.x, dy = b.y - mouse.y;
          const infl = Math.exp(-(dx * dx + dy * dy) / 0.5);
          b.vx += mouse.vx * infl * MOUSE_PUSH * dt;
          b.vy += mouse.vy * infl * MOUSE_PUSH * dt;
        }

        const bx = wx - b.r * 0.5;
        const by = wy - b.r * 0.5;

        const wallZ = 0.35;
        if (!sticking) {
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.z += b.vz * dt;
          if (b.z > wallZ) { b.z = wallZ; b.vz *= -0.5; }
          else if (b.z < -wallZ) { b.z = -wallZ; b.vz *= -0.5; }

          let hitWall = false, impactSpd = 0;
          if (b.x > bx) {
            b.x = bx; impactSpd = b.preSpeed = Math.hypot(b.vx, b.vy); hitWall = true;
            b.wallTanV = b.vy; b.wallDirX = -1; b.wallDirY = 0;
            b.vx = 0; b.wallStick = 0.7;
            b.sqX = 1.0; b.sqY = 1.0; b.sqVx = 0; b.sqVy = 0;
          } else if (b.x < -bx) {
            b.x = -bx; impactSpd = b.preSpeed = Math.hypot(b.vx, b.vy); hitWall = true;
            b.wallTanV = b.vy; b.wallDirX = 1; b.wallDirY = 0;
            b.vx = 0; b.wallStick = 0.7;
            b.sqX = 1.0; b.sqY = 1.0; b.sqVx = 0; b.sqVy = 0;
          } else if (b.y > by) {
            b.y = by; impactSpd = b.preSpeed = Math.hypot(b.vx, b.vy); hitWall = true;
            b.wallTanV = b.vx; b.wallDirX = 0; b.wallDirY = -1;
            b.vy = 0; b.wallStick = 0.7;
            b.sqX = 1.0; b.sqY = 1.0; b.sqVx = 0; b.sqVy = 0;
          } else if (b.y < -by) {
            b.y = -by; impactSpd = b.preSpeed = Math.hypot(b.vx, b.vy); hitWall = true;
            b.wallTanV = b.vx; b.wallDirX = 0; b.wallDirY = 1;
            b.vy = 0; b.wallStick = 0.7;
            b.sqX = 1.0; b.sqY = 1.0; b.sqVx = 0; b.sqVy = 0;
          }

          // #3 Chain reaction: wall impact pushes nearby balls
          if (hitWall && impactSpd > 0.5) {
            for (let j = 0; j < balls.length; j++) {
              if (j === i) continue;
              const o = balls[j];
              const cdx = o.x - b.x, cdy = o.y - b.y;
              const cd = Math.hypot(cdx, cdy);
              if (cd < 1.2 && cd > 0.01) {
                const impulse = (1.0 - cd / 1.2) * impactSpd * 0.35;
                o.vx += (cdx / cd) * impulse;
                o.vy += (cdy / cd) * impulse;
              }
            }
          }
        } else {
          b.wallStick -= dt;
          if (b.wallDirX !== 0) b.y += b.wallTanV * dt * 0.5;
          else b.x += b.wallTanV * dt * 0.5;
          b.wallTanV *= (1.0 - dt);

          const prog = 1.0 - Math.max(b.wallStick, 0) / 0.7;
          const eased = prog * prog;
          const peakSq = 0.12 + Math.min(b.preSpeed * 0.06, 0.18);
          const sq = 1.0 + eased * peakSq;
          if (b.wallDirX !== 0) { b.sqX = sq; b.sqY = 1.0 / sq; }
          else { b.sqY = sq; b.sqX = 1.0 / sq; }

          b.x = Math.max(-bx, Math.min(bx, b.x));
          b.y = Math.max(-by, Math.min(by, b.y));

          if (b.wallStick <= 0) {
            b.wallStick = 0;
            const cx = -b.x, cy = -b.y;
            const clen = Math.hypot(cx, cy) + 0.01;
            const launchSpd = Math.max(b.preSpeed * 0.5, 0.4);
            b.vx = (b.wallDirX * 0.3 + cx / clen * 0.4) * launchSpd;
            b.vy = (b.wallDirY * 0.3 + cy / clen * 0.4) * launchSpd;
            b.sqVx = 0; b.sqVy = 0;
          }
        }

        if (b.wallStick <= 0) {
          b.sqX += (1.0 - b.sqX) * Math.min(14.0 * dt, 1.0);
          b.sqY += (1.0 - b.sqY) * Math.min(14.0 * dt, 1.0);
        }

        const spd = Math.hypot(b.vx, b.vy, b.vz);
        const targetStretch = 1.0 + Math.min(spd * 0.25, 0.5);
        b.stretch = b.stretch || 1.0;
        b.stretch += (targetStretch - b.stretch) * Math.min(3.0 * dt, 1.0);

        centers[i].set(b.x, b.y);
        const pulse = 0.88 + 0.12 * Math.sin(simTime * b.pf + b.pp);
        const rScale = Math.min(window.innerWidth / window.innerHeight, 1.0);
        radii[i] = b.r * pulse * b.life * b.stretch * (0.4 + rScale * 0.6);
        hueArr[i] = b.hue;
        uniforms.uSpeed.value[i] = spd;
        squashArr[i].set(b.sqX, b.sqY);
        uniforms.uZ.value[i] = b.z;
      }

      for (let i = balls.length; i < MAX; i++) { radii[i] = 0; uniforms.uZ.value[i] = 0; }

      // Mouse ball
      const mi = balls.length;
      centers[mi].set(mouse.x, mouse.y);
      uniforms.uZ.value[mi] = 0;
      radii[mi] = mouse.inside ? (0.05 + Math.min(mspeed * 0.05, 0.5)) : 0.0;
      hueArr[mi] = 0.08;
      uniforms.uSpeed.value[mi] = mspeed;
      squashArr[mi].set(1.0, 1.0);

      uniforms.uCount.value = balls.length + 1;
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
