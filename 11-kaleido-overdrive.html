  { kick: 1, hat: 1, acid: 1, clap: 1, bass: 1, arp: 1, gab: 0, org: 0.6,  spd: 1.5  }, // 3 フル+アープ
  { kick: 0, hat: 1, acid: 1, clap: 0, bass: 0, arp: 1, gab: 0, org: 1.0,  spd: 0.55 }, // 4 ブレイクダウン=有機の頂点
  { kick: 1, hat: 1, acid: 1, clap: 1, bass: 1, arp: 1, gab: 1, org: 0.15, spd: 1.85 }, // 5 ドロップ=ガバ・硬い幾何
];
// 対称数の候補（セクションのエネルギーで重みが変わる。切替はバキッと）
const SEG_SETS = [
  [4, 6],            // 0 イントロ
  [4, 6, 8],         // 1
  [6, 8, 3],         // 2
  [6, 8, 12, 3],     // 3
  [3, 4],            // 4 ブレイクダウンは疎に
  [8, 12, 6, 16],    // 5 ドロップは密に
];

/* ビート応答の重み付け — 10 の教訓「応答の一様性は数拍で読まれる」を継承 */
function kickWeight(beatInBar, barIn8) {
  let w = 0.4 + Math.random()*0.25;
  if (beatInBar === 0) w += 0.3;
  if (barIn8 === 7) w += 0.25;
  if (barIn8 % 4 === 3 && beatInBar === 3) w = 1.3;
  return Math.min(1.35, w);
}
function kickGlitchGate(beatInBar, barIn8) {
  let p = 0.2;
  if (beatInBar === 0) p = 0.45;
  if (barIn8 === 7) p = 0.7;
  return Math.random() < p ? 1 : 0;
}
function hatOWeight(isBreakdown) {
  const p = isBreakdown ? 0.9 : 0.4;
  return Math.random() < p ? 0.6 + Math.random()*0.5 : 0;
}

const state = {
  audio: false, muted: false, paused: false,
  drumKit: 't909',      // 't909' | 'synth'（K で切替。シンセはデコード失敗時の保険）
  lastKick: -10, lastHat: -10, lastHatO: -10, lastAcid: -10,
  kickW: 1, hatOW: 1, acidW: 0.5, glitch: 0,
  seg: 6, segFringe: 0.22, rotDir: 1,
  rotMode: 0,   // 0=連続回転 / 1=振り子 / 2=キックで角度スナップ / 3=半径ねじれスパイラル
  bgMode: 1,    // 背景 0=黒の虚空 / 1=ステンドグラス / 2=色霧 / 3=白(光にかざした万華鏡・減算合成)
  overStart: -10, overDur: 0,        // オーバードライブ（ズームサージ）ウィンドウ
  motifIdx: 0, motifStart: -10, motifUntil: -10, motifUnfoldLen: 0,   // 写真モチーフの幻視窓
  section: 0, flash: 0, invert: 0, seed: 0.37,
};
window.__state = state;   // 検証・チューニング用の読み書きフック

const bootT = performance.now() / 1000;
const countStart = bootT + 0.5;
const countEnd = countStart + COUNT_BEATS * BEAT_LEN;
const silentStart = countEnd;

/* ---------- 対称数の切替（音・無音の両クロックから呼ばれる） ---------- */
function pickSeg(sec) {
  const set = SEG_SETS[sec];
  let s = set[Math.floor(Math.random() * set.length)];
  if (s === state.seg) s = set[(set.indexOf(s) + 1) % set.length];   // 同値は隣へずらす
  return s;
}
function segCut(sec, strong) {
  state.seg = pickSeg(sec);
  state.segFringe = 0.12 + Math.random() * 0.3;          // RGB の対称数ズレ = 虹縁の強さ
  if (Math.random() < 0.4) state.rotDir *= -1;           // たまに回転方向も反転
  // 回転モードの抽選(万華鏡の回し方のバリエーション)
  const rm = Math.random();
  state.rotMode = rm < 0.35 ? 0 : rm < 0.55 ? 1 : rm < 0.85 ? 2 : 3;
  // 背景モードの抽選(黒 12% / ガラス 45% / 霧 23% / 白 20% — 面の万華鏡を主役に・ユーザー裁定)
  const bg = Math.random();
  state.bgMode = bg < 0.12 ? 0 : bg < 0.57 ? 1 : bg < 0.8 ? 2 : 3;
  state.seed = Math.random();
  state.flash = Math.max(state.flash, strong ? 1 : 0.55);
  if (strong) state.invert = 1;                          // 強切替は一瞬のネガ反転
  // --- 写真モチーフの幻視 ---
  // ブレイクダウン入り = 日食の長リビール(セクションいっぱい・徐々に正体を現す)。
  // 他のセクション頭 60% で 2 拍 / 小節頭 12% で 1 拍、虹彩/クラゲ/星雲をフラッシュ
  const nowW = performance.now() / 1000;
  if (strong) state.motifUntil = Math.min(state.motifUntil, nowW + 0.15);   // 継続中の幻視は強切替で断つ
  if (strong && sec === 4) {
    state.motifIdx = 0;
    state.motifStart = nowW; state.motifUntil = nowW + 32 * BEAT_LEN;
    state.motifUnfoldLen = 26 * BEAT_LEN;
  } else if (strong) {   // セクション頭は必ず 1.5 小節見せる(露出さらに増・ユーザー裁定)
    state.motifIdx = 1 + Math.floor(Math.random() * (MOTIF_FILES.length - 1));
    state.motifStart = nowW; state.motifUntil = nowW + 6 * BEAT_LEN;
    state.motifUnfoldLen = 0;
  } else if (!strong && Math.random() < 0.4) {
    state.motifIdx = 1 + Math.floor(Math.random() * (MOTIF_FILES.length - 1));
    state.motifStart = nowW; state.motifUntil = nowW + 3 * BEAT_LEN;
    state.motifUnfoldLen = 0;
  }
}

/* ---------- 無音フォールバッククロック（音声未解錠でも絵は同期） ---------- */
let silentHalf = -1;
function tickSilent(now) {
  if (state.audio) return;
  const tt = now - silentStart;
  if (tt < 0) return;
  const half = Math.floor(tt * BEATS_PER_SEC * 2);
  if (half === silentHalf) return;
  silentHalf = half;
  const beat = Math.floor(half / 2);
  const offbeat = (half % 2) === 1;
  const bar = Math.floor(beat / 4);
  const sec = Math.floor(bar / 8) % SECTION_COUNT;
  if (sec !== state.section) { state.section = sec; segCut(sec, true); }
  const arr = ARR[state.section];
  if (offbeat) {
    if (arr.hat) {
      const w = hatOWeight(!arr.kick);
      if (w > 0) { state.lastHatO = now; state.hatOW = w; }
    }
    return;
  }
  if (arr.kick) {
    state.lastKick = now;
    state.kickW = kickWeight(beat % 4, bar % 8);
    state.glitch = kickGlitchGate(beat % 4, bar % 8);
    if (state.glitch > 0) state.seed = Math.random();
  }
  state.lastHat = now;
  if (beat % 4 === 0 && Math.random() < 0.3) segCut(state.section, false);   // 小節頭の急変
  if (arr.acid && beat % 2 === 0) { state.lastAcid = now; state.acidW = 0.4 + Math.random()*0.6; }
  if (beat % 4 === 0 && arr.kick) {
    const dropHead = state.section === 5 && bar % 8 === 0;
    if (dropHead || Math.random() < 0.18) {
      state.overStart = now + BEAT_LEN*0.5;
      state.overDur = (4 + Math.floor(Math.random()*5)) * BEAT_LEN;
    }
  }
}

/* ---------- カウントダウン ---------- */
const countEl = document.getElementById('count');
const numEl = document.getElementById('countNum');
let countShown = -1, countDone = false;
let countTick = () => {};
function updateCount(now) {
  if (countDone) return;
  if (now < countStart) return;
  if (now >= countEnd) {
    countDone = true;
    countEl.style.display = 'none';
    segCut(0, true);
    return;
  }
  const idx = Math.floor((now - countStart) / BEAT_LEN);
  if (idx !== countShown) {
    countShown = idx;
    numEl.textContent = String(COUNT_BEATS - idx);
    numEl.classList.remove('pop'); void numEl.offsetWidth; numEl.classList.add('pop');
    state.flash = Math.max(state.flash, 0.45);
    countTick();
  }
}

/* =========================================================
   オーディオ — 138BPM アシッドテクノ
   kick/hats/clap = 10 で自作レンダした 909 ワンショット（base64 mp3）
   acid = TB-303 風 MonoSynth（フィルターエンベロープ + スライド + アクセント）
   ========================================================= */
let audioBuilt = false;
let pauseCleanup = () => {};
let resumeShiftAudio = () => {};   // buildAudio が実体を差し込む(resume 時のオーディオ時刻窓補正)
let manualOverdrive = () => {   // T キー: 無音時はウィンドウだけ置く
  state.overStart = performance.now() / 1000 + 0.4;
  state.overDur = 6 * BEAT_LEN;
};
function buildAudio() {
  if (audioBuilt) return;
  audioBuilt = true;

  Tone.Transport.bpm.value = BPM;
  Tone.Transport.swing = 0.04;           // アシッドはほぼストレート
  Tone.Transport.swingSubdivision = '16n';

  // --- マスターチェーン: duck(サイドチェーン) → comp → limiter ---
  const master = new Tone.Compressor(-18, 3);
  const limiter = new Tone.Limiter(-1);
  master.connect(limiter); limiter.toDestination();
  const duck = new Tone.Gain(1); duck.connect(master);
  const verb = new Tone.Reverb({ decay: 2.2, wet: 0.22 });
  if (verb.generate) verb.generate();
  verb.connect(duck);

  // --- シンセフォールバック（サンプルデコード失敗時の保険） ---
  const kick = new Tone.MembraneSynth({
    pitchDecay: 0.045, octaves: 7, oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 0.32, sustain: 0, release: 0.04 },
  });
  kick.volume.value = -4; kick.connect(master);
  const hatC = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.03, sustain: 0 } });
  const hatHP = new Tone.Filter(9000, 'highpass');
  hatC.volume.value = -18; hatC.connect(hatHP); hatHP.connect(duck);
  const hatO = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.22, sustain: 0 } });
  const hatOHP = new Tone.Filter(8000, 'highpass');
  hatO.volume.value = -9; hatO.connect(hatOHP); hatOHP.connect(duck);
  const clap = new Tone.NoiseSynth({ noise: { type: 'pink' }, envelope: { attack: 0.001, decay: 0.12, sustain: 0 } });
  const clapBP = new Tone.Filter(1100, 'bandpass'); clapBP.Q.value = 1.4;
  clap.volume.value = -10; clap.connect(clapBP); clapBP.connect(verb);

  // --- 909 ワンショット再生エンジン（10 から移植・実証済みパターン） ---
  const SMP_GAIN = { kick: -3, clap: -8, hatc: -16, hato: -8, gab1: 2, gab2: 3, whisS: -7, whisL: -6 };   // 音量ノブ (dB)。ガバは主張激しめ(ユーザー裁定)
  const smpBuf = { t909: {} };
  window.__smpBuf = smpBuf;
  async function decodeBank(src, dst) {
    if (!src) return;
    const raw = Tone.getContext().rawContext;
    for (const kit of Object.keys(dst)) {
      for (const [name, url] of Object.entries(src[kit] || {})) {
        try {
          const ab = await (await fetch(url)).arrayBuffer();
          const buf = await raw.decodeAudioData(ab);
          const ch = buf.getChannelData(0);
          let i = 0; while (i < ch.length && Math.abs(ch[i]) < 0.002) i++;
          if (i >= ch.length) continue;

  // 3〜4 発積み重なると連続轟音(道路工事)になる。新しいキックが前を止める
  let kickLast = null;

    if (!kickLast) return;
    kickLast.g.gain.setTargetAtTime(0, time, 0.01);
    try { kickLast.src.stop(time + 0.06); } catch (e) {}
    kickLast = null;
  }
  let hatOpen = null;
  function chokeOpenHat(time) {
    if (!hatOpen) return;
    hatOpen.g.gain.setTargetAtTime(0, time, 0.008);
    try { hatOpen.src.stop(time + 0.05); } catch (e) {}
    hatOpen = null;
  }

    src.playbackRate.value = rate;

    return { src, g };
  }

      if (state.drumKit === 'synth') return false;
      const s = smpBuf.t909[name];
      if (!s) return false;
      const node = playBuf(s, time, vel, SMP_GAIN[name] ?? 0, dest, rate);
      if (name === 'hato') hatOpen = node;
      if (name === 'kick' || name === 'gab1' || name === 'gab2') kickLast = node;
      return true;
    } catch (e) { return false; }
  }
  pauseCleanup = (t) => { chokeOpenHat(t); chokeKick(t); };   // ガバの長い尻尾も止める(Codex 指摘)

  // --- カウントダウン用ティック ---
  const tick = new Tone.MembraneSynth({
    pitchDecay: 0.008, octaves: 2, oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 0.08, sustain: 0 },
  });
  tick.volume.value = -10; tick.connect(master);
  countTick = () => { if (state.audio) tick.triggerAttackRelease('A4', '16n'); };

    oscillator: { type: 'sawtooth' },
    filter: { type: 'lowpass', Q: 9, rolloff: -24 },
    filterEnvelope: { attack: 0.004, decay: 0.14, sustain: 0.08, release: 0.08, baseFrequency: 180, octaves: 3.2 },
    envelope: { attack: 0.003, decay: 0.16, sustain: 0.35, release: 0.05 },

  const acidDist = new Tone.Distortion(0.35);

  // duck を通さない(キックの隙間に正確に置く方式なのでサイドチェーン不要)
  const roll = new Tone.MonoSynth({
    oscillator: { type: 'sawtooth' },
    filter: { type: 'lowpass', Q: 2, rolloff: -24 },
    filterEnvelope: { attack: 0.002, decay: 0.09, sustain: 0.0, release: 0.03, baseFrequency: 90, octaves: 2.2 },
    envelope: { attack: 0.002, decay: 0.1, sustain: 0.25, release: 0.03 },
  });
  roll.volume.value = -7;
  roll.connect(master);

  // --- ガバキック: 専用シンセ合成(長い胴鳴りを歪み 100% で潰す乱暴仕様・ユーザー裁定)。
  // ドロップ / オーバードライブ中は 909 サンプルの代わりにこれが鳴る ---
  const gabKick = new Tone.MembraneSynth({
    pitchDecay: 0.08, octaves: 9, oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 0.6, sustain: 0, release: 0.06 },

  const gabDist = new Tone.Distortion(1.0); gabDist.oversample = '4x';
  const gabCheb = new Tone.Chebyshev(3);            // 2 段目の倍音潰し = さらに乱暴に
  const gabTrim = new Tone.Gain(0.8);
  const gabLP = new Tone.Filter(3800, 'lowpass');   // 歪みのジャリだけ整える
  gabKick.volume.value = 0;
  gabKick.connect(gabDist); gabDist.connect(gabCheb); gabCheb.connect(gabTrim);
  gabTrim.connect(gabLP); gabLP.connect(master);
  let overAudioUntil = -1;   // オーバードライブ中はガバ化(オーディオ時刻基準)
  // pause 中も AudioContext 時刻は進むため、resume 時に停止時間ぶんずらす(Codex 指摘)
  resumeShiftAudio = (d) => { if (overAudioUntil > 0) overAudioUntil += d; };

  // --- レイブホイッスル(審判笛): 口笛と違い「豆のコロコロ = 高速 AM フラッター +

  const whis = new Tone.Synth({
    oscillator: { type: 'square' },

    noise: { type: 'white' },

  });

  const whisTrem = new Tone.Tremolo(34, 0.85).start();   // 豆のコロコロ(34Hz AM)
  whis.volume.value = -11; whisNoise.volume.value = -20;
  whis.connect(whisBP); whisNoise.connect(whisBP);
  whisBP.connect(whisTrem); whisTrem.connect(verb);
  function whistleBurst(time, pattern) {

    try {
      const f = 2750 + Math.random() * 250;   // 合成フォールバック用ピッチ
      const rate = 0.9 + Math.random() * 0.7;   // ピッチ広域ランダム(0.9〜1.6 ≈ 10 半音・吹くたび別の笛)
      const safeBase = Math.max(time, Tone.now() + 0.03);   // スケジューラ遅延時の過去時刻を防ぐ(Codex 指摘)
      pattern.forEach((p, i) => {
        const last = i === pattern.length - 1;
        const t = safeBase + p * BEAT_LEN;
        if (!smpPlay(last ? 'whisL' : 'whisS', t, 0.9, verb, rate)) {
          whis.triggerAttackRelease(f, last ? '4n' : '16n', t, 0.9);
          whisNoise.triggerAttackRelease(last ? '4n' : '16n', t, 0.8);
        }

    } catch (e) { /* 時刻順序違反は 1 回諦める */ }
  }

  const arp = new Tone.FMSynth({
    harmonicity: 2, modulationIndex: 6,
    oscillator: { type: 'sine' }, modulation: { type: 'square' },
    envelope: { attack: 0.003, decay: 0.12, sustain: 0.0, release: 0.05 },
    modulationEnvelope: { attack: 0.002, decay: 0.1, sustain: 0.2, release: 0.05 },
  });
  const arpDly = new Tone.FeedbackDelay('8n.', 0.4); arpDly.wet.value = 0.35;
  arp.volume.value = -16;
  arp.connect(arpDly); arpDly.connect(verb);
  const ARP_NOTES = ['A3', 'Bb3', 'C#4', 'E4', 'F4', 'A4', 'G4', 'E4'];   // フリジアンドミナント
  let arpStep = 0;
  new Tone.Loop((time) => {
    if (!arrNow.arp) { arpStep++; return; }
    const n = ARP_NOTES[(arpStep * 3 + Math.floor(arpStep / 8)) % 8]; arpStep++;   // 3 飛びで回して単調回避
    if (Math.random() < 0.12) return;   // たまに抜く

  const ACID_SCALE = ['A', 'Bb', 'C#', 'D', 'E', 'F', 'G'];

  // r = 32 分ラチェット(2 連打)。フラグは末尾に s/a/h/r を複合可
  function genAcidPat() {
    const pat = [];
    let deg = 0, oct = 1 + Math.floor(Math.random() * 2);

    while (i < 16) {
      if (Math.random() < 0.14) { pat.push(null); i++; continue; }
      if (Math.random() < 0.18) {                                // 大ジャンプ(高低へ自由に)
        oct = 1 + Math.floor(Math.random() * 4);
        deg = Math.floor(Math.random() * 7);
      } else {                                                   // 近傍ウォーク

        if (deg < 0) { deg += 7; oct = Math.max(1, oct - 1); }
        if (deg > 6) { deg -= 7; oct = Math.min(4, oct + 1); }

      const r = Math.random();
      if (r < 0.3) n += 's';         // スライド多め = うねり
      else if (r < 0.52) n += 'a';   // アクセント
      const rr = Math.random();
      if (rr < 0.28 && i < 15) { pat.push(n + 'h'); pat.push(null); i += 2; }   // 8 分ホールド(次マス消費)
      else if (rr < 0.36) { pat.push(n + 'r'); i++; }                            // 32 分ラチェット
      else { pat.push(n); i++; }
    }
    if (!pat[0]) pat[0] = 'A1';
    return pat;
  }
  let acidPat = genAcidPat();
  let acidStep = 0;
  new Tone.Loop((time) => {
    if (!arrNow.acid) { acidStep++; return; }
    const cell = acidPat[acidStep % 16]; acidStep++;
    if (cell === null) return;
    const accent = cell.includes('a');
    const slide = cell.includes('s');
    const hold = cell.includes('h');
    const ratch = cell.includes('r');
    const note = cell.replace(/[sahr]+$/, '');
    acid.portamento = slide ? (hold ? 0.13 : 0.07) : 0;   // ホールド+スライド = 長い唸り
    // カットオフ: 8 小節ビルド + グルーヴゆらぎ + 毎音ジッタでフィルターが常にうねる
    const build = (Math.max(0, barsA - 1) % 8) / 8;
    acid.filterEnvelope.baseFrequency = 120 + build * 900 + grooveG * 400 + (accent ? 400 : 0) + Math.random() * 150;
    if (ratch) {   // 32 分 2 連打(時刻は単調増加なので Mono でも安全)
      acid.triggerAttackRelease(note, '32n', time, accent ? 1.0 : 0.6);
      acid.triggerAttackRelease(note, '32n', time + Tone.Time('32n').toSeconds(), accent ? 0.8 : 0.5);
    } else {
      acid.triggerAttackRelease(note, hold ? '8n' : '16n', time, accent ? 1.0 : 0.6);
    }
    const w = accent ? 0.9 + Math.random()*0.3 : 0.35 + Math.random()*0.2;
    Tone.Draw.schedule(() => { state.lastAcid = nowSec(); state.acidW = w; }, time);
  }, '16n').start(0);

  // --- rolling bass のループ: キック位置(拍頭)を空け、残り 3 つの 16 分を刻む ---
  const ROLL_VEL = [0, 0.9, 0.72, 0.82];   // 拍内 16 分ごと(0 番 = キックの席 = 休み)
  let rollStep = 0;
  new Tone.Loop((time) => {
    const pos = rollStep % 4; rollStep++;
    if (!arrNow.bass || pos === 0) return;
    roll.triggerAttackRelease('A1', '16n', time, ROLL_VEL[pos] * (0.92 + Math.random() * 0.16));   // ローリングベースはシンセ版(Ableton 版はボツ・ユーザー裁定)
  }, '16n').start(0);

  // --- オーバードライブの合図音(フーバー)は撤去 — 「どぴゃーん」系は全部不要のユーザー裁定。
  // 合図は「キックがガバに切り替わること」自体と絵のズームサージが担う ---
  function overdriveHit(time) {
    Tone.Draw.schedule(() => {
      state.lastAcid = nowSec(); state.acidW = 1.3;
      state.flash = Math.max(state.flash, 0.5);
    }, time);
  }
  manualOverdrive = () => {
    const time = Tone.now() + 0.02;
    const durBeats = 4 + Math.floor(Math.random()*5);
    overAudioUntil = time + durBeats * BEAT_LEN;   // キックのガバ化窓
    overdriveHit(time);
    Tone.Draw.schedule(() => {
      state.overStart = nowSec(); state.overDur = durBeats * BEAT_LEN;
    }, time);
  };

  const nowSec = () => performance.now() / 1000;
  let arrNow = ARR[state.section];
  let barsA = 0, secA = state.section;
  let grooveG = 0.5;

  // キック（4 つ打ち）+ サイドチェーン
  let kickIdx = 0;
  new Tone.Loop((time) => {
    const beatInBar = kickIdx % 4, barIn8 = Math.floor(kickIdx / 4) % 8;
    kickIdx++;
    if (!arrNow.kick) return;
    // ガバモード(ドロップ / オーバードライブ中 / 各セクション最終小節のビルドアップ)
    const gab = arrNow.gab === 1 || time < overAudioUntil || barIn8 === 7;
    chokeKick(time);   // 前のキックの尻尾を止める(重なり轟音の防止)
    if (gab) {
      // ビルドアップ小節 = gab1(909 潰し・タイト)/ ドロップ & オーバードライブ = gab2(808 3 段・凶悪)
      const heavy = arrNow.gab === 1 || time < overAudioUntil;
      if (!smpPlay(heavy ? 'gab2' : 'gab1', time, 1, master)) {
        try { gabKick.triggerAttackRelease('A1', '8n', time); } catch (e) {}
      }
    } else if (!smpPlay('kick', time, 1, master)) {
      kick.triggerAttackRelease('G1', '8n', time);
    }
    const g = duck.gain;
    g.cancelScheduledValues(time);
    g.setValueAtTime(g.value, time);
    // ガバ中はサイドチェーンを深く速く = キックのたびに他の全音がへこむ(主張激しめ)
    g.linearRampToValueAtTime(gab ? 0.26 : 0.45, time + 0.015);
    g.linearRampToValueAtTime(1.0, time + (gab ? 0.18 : 0.28));
    const w = kickWeight(beatInBar, barIn8);
    const gl = kickGlitchGate(beatInBar, barIn8);
    Tone.Draw.schedule(() => {
      state.lastKick = nowSec(); state.kickW = w; state.glitch = gl;
      if (gl > 0) state.seed = Math.random();
    }, time);
  }, '4n').start(0);

  // クローズハット 16 分
  const HAT_VEL = [1, 0.35, 0.65, 0.4, 0.9, 0.35, 0.65, 0.4, 1, 0.35, 0.65, 0.4, 0.9, 0.4, 0.7, 0.5];
  let hatStep = 0;
  let hatRingUntil = -1;
  new Tone.Loop((time) => {
    if (!arrNow.hat) { hatStep++; return; }
    const v = HAT_VEL[hatStep % 16]; hatStep++;
    if (time < hatRingUntil) return;
    chokeOpenHat(time);
    if (!smpPlay('hatc', time, v * 0.8, duck)) hatC.triggerAttackRelease('32n', time, v * 0.8);
    Tone.Draw.schedule(() => { state.lastHat = nowSec(); }, time);
  }, '16n').start(0);

  // 裏拍 — ハウス的なオープンのリングは廃止(ユーザー裁定「テクノやハウスっぽくなる」)。
  // ハットの主体は 16 分クローズに任せ、オープンはごく稀なアクセント(10%・短いリング)だけ
  new Tone.Loop((time) => {
    if (!arrNow.hat) return;
    if (Math.random() >= 0.35) return;
    const tOff = time + Tone.Time('8n').toSeconds();
    hatRingUntil = tOff + BEAT_LEN * 0.28;
    chokeOpenHat(tOff);
    if (!smpPlay('hato', tOff, 0.6, duck)) hatO.triggerAttackRelease('16n', tOff, 0.6);
    Tone.Draw.schedule(() => { state.lastHatO = nowSec(); state.hatOW = 0.9; }, tOff);
  }, '4n').start(0);

  // クラップ 2・4 拍
  const clapPart = new Tone.Part((time) => {
    if (!arrNow.clap) return;
    if (!smpPlay('clap', time, 0.7, verb)) clap.triggerAttackRelease('16n', time, 0.7);
  }, [['0:1:0'], ['0:3:0']]);
  clapPart.loop = true; clapPart.loopEnd = '1m'; clapPart.start(0);

  // セクション進行 + 対称数の急変 + オーバードライブ判定（小節頭）
  // 注: '1m' コールバックと 4n/16n ループは同一小節頭時刻を共有し、同時刻の実行順は
  // Tone 依存のため境界の頭 1 発だけ旧/新アレンジが揺れ得る(10 と同じ許容・Codex 指摘の既知事項)
  Tone.Transport.scheduleRepeat((time) => {
    const barIdx = barsA;
    barsA++;
    grooveG = Math.random();
    if (barIdx % 8 === 7) grooveG = Math.max(grooveG, 0.7);
    if (barIdx % 2 === 0) acidPat = genAcidPat();          // 2 小節ごとに新しいうねりを生成
    acid.filter.Q.value = 6 + Math.random() * 8;           // レゾナンスも小節ごとに揺れる
    if (barIdx > 0 && barIdx % 8 === 0) {
      secA = (secA + 1) % SECTION_COUNT;
      arrNow = ARR[secA];
      Tone.Draw.schedule(() => { state.section = secA; segCut(secA, true); }, time);
    } else if (Math.random() < 0.35) {
      Tone.Draw.schedule(() => { segCut(secA, false); }, time);   // 小節頭のバキッと切替
    }
    // ホイッスル: ガバ突入 1 小節前(6 小節目後半)に予告、最中(ドロップ/ビルドアップ)は確率でトリル
    if (barIdx % 8 === 6) {
      whistleBurst(time + 2 * BEAT_LEN, [0, 0.5, 1, 1.5]);
    } else if ((arrNow.gab === 1 || barIdx % 8 === 7) && Math.random() < 0.45) {
      whistleBurst(time + BEAT_LEN * Math.floor(Math.random() * 2), [0, 0.25, 0.5]);
    }
    const dropHead = secA === 5 && barIdx % 8 === 0;
    if (arrNow.kick && (dropHead || Math.random() < 0.28)) {
      const durBeats = 4 + Math.floor(Math.random()*5);
      const tHit = time + Tone.Time('8n').toSeconds();
      overAudioUntil = tHit + durBeats * BEAT_LEN;   // キックのガバ化窓
      overdriveHit(tHit);
      Tone.Draw.schedule(() => {
        state.overStart = nowSec(); state.overDur = durBeats * BEAT_LEN;
      }, tHit);
    }
  }, '1m');

  Tone.Destination.mute = state.muted;
}

/* ---------- 音声の自動解錠（10 と同じ多重掛け・lessons.md 準拠） ---------- */
const SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
let unmuteEl = null;
function primeMobileAudio() {
  try {
    if (navigator.audioSession) navigator.audioSession.type = 'playback';
    if (!unmuteEl) { unmuteEl = new Audio(SILENT_WAV); unmuteEl.loop = true; }
    unmuteEl.play().catch(() => {});
  } catch (err) { /* 非対応環境は無視 */ }
}
async function unlockAudio() {
  if (state.audio) return;
  primeMobileAudio();
  try { await Tone.start(); } catch (err) { return; }
  if (state.audio) return;
  buildAudio();
  const remain = countEnd - performance.now() / 1000;
  let startDelay;
  if (remain > 0.05) {
    startDelay = remain;
  } else {
    startDelay = BEAT_LEN - ((-remain) % BEAT_LEN);
    if (startDelay < 0.05) startDelay += BEAT_LEN;
  }
  Tone.Transport.start(`+${startDelay.toFixed(3)}`);
  state.audio = true;
  unlockedAt = performance.now();
  console.log('[11] audio unlocked');
  const h = document.getElementById('sndhint');
  if (h) h.style.display = 'none';
}
let unlockedAt = 0;
let pausedAt = 0;
unlockAudio();
window.addEventListener('pointerdown', unlockAudio);
window.addEventListener('touchend', unlockAudio);
window.addEventListener('click', unlockAudio);
window.addEventListener('keydown', unlockAudio);

// クリック / タップ = 再生・停止トグル（10 で確立した型）
window.addEventListener('click', (e) => {
  if (!state.audio) return;
  if (performance.now() - unlockedAt < 600) return;
  if (e.target && e.target.closest && e.target.closest('a')) return;
  if (performance.now() / 1000 < countEnd) return;
  state.paused = !state.paused;
  if (state.paused) {
    Tone.Transport.pause();
    pausedAt = performance.now() / 1000;
    pauseCleanup(Tone.now());
  } else {
    const d = performance.now() / 1000 - pausedAt;
    state.overStart += d;                     // 壁時計ウィンドウの補正
    state.motifStart += d; state.motifUntil += d;
    resumeShiftAudio(d);                      // オーディオ時刻側(ガバ化窓)も補正(Codex 指摘)
    Tone.Transport.start();
  }
  const h = document.getElementById('sndhint');
  if (h) {
    h.textContent = '⏸ paused — click / tap to resume';
    h.style.display = state.paused ? '' : 'none';
  }
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'm' || e.key === 'M') {
    state.muted = !state.muted;
    if (window.Tone && audioBuilt) Tone.Destination.mute = state.muted;
  }
  if (e.key === 't' || e.key === 'T') manualOverdrive();
  if (e.key === 'k' || e.key === 'K') {
    state.drumKit = state.drumKit === 't909' ? 'synth' : 't909';
    const el = document.getElementById('kitName');
    if (el) el.textContent = state.drumKit === 't909' ? '909' : 'SYN';
  }
});

/* =========================================================
   ビジュアル — 万華鏡 2 パス:
   fb パス   = 前フレーム(回転+ズーム)を減衰合成しつつ万華鏡パターンを描く
   post パス = fb 結果にグリッチ / ビネット / フラッシュを掛けて画面へ
   ========================================================= */
const IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(IS_MOBILE ? 1.0 : Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const FB_SCALE = IS_MOBILE ? 0.6 : 0.8;   // フィードバック解像度（負荷ノブ）
function makeRT() {
  return new THREE.WebGLRenderTarget(
    Math.max(2, Math.floor(window.innerWidth * FB_SCALE)),
    Math.max(2, Math.floor(window.innerHeight * FB_SCALE)),
    { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, depthBuffer: false });
}
let rtA = makeRT(), rtB = makeRT();

const quadCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const quadGeo = new THREE.PlaneGeometry(2, 2);

const COMMON_GLSL = /* glsl */`
  // 日本の伝統色 8 色を巡回補間するパレット(ユーザー裁定: あの手の彩度の抑え方)
  // 藍 / 錆浅葱 / 鶯 / 芥子 / 蘇芳 / 江戸紫 / 撫子 / 藍鼠
  vec3 pal(float t) {
    const vec3 J0 = vec3(0.086, 0.369, 0.514);   // 藍
    const vec3 J1 = vec3(0.361, 0.573, 0.569);   // 錆浅葱
    const vec3 J2 = vec3(0.573, 0.549, 0.212);   // 鶯
    const vec3 J3 = vec3(0.816, 0.686, 0.298);   // 芥子
    const vec3 J4 = vec3(0.620, 0.239, 0.247);   // 蘇芳
    const vec3 J5 = vec3(0.455, 0.325, 0.600);   // 江戸紫
    const vec3 J6 = vec3(0.863, 0.624, 0.706);   // 撫子
    const vec3 J7 = vec3(0.424, 0.518, 0.553);   // 藍鼠
    float x = fract(t) * 8.0;
    float i = floor(x);
    float f = smoothstep(0.15, 0.85, fract(x));
    vec3 a; vec3 b;
    if      (i < 0.5) { a = J0; b = J1; }
    else if (i < 1.5) { a = J1; b = J2; }
    else if (i < 2.5) { a = J2; b = J3; }
    else if (i < 3.5) { a = J3; b = J4; }
    else if (i < 4.5) { a = J4; b = J5; }
    else if (i < 5.5) { a = J5; b = J6; }
    else if (i < 6.5) { a = J6; b = J7; }
    else              { a = J7; b = J0; }
    return mix(a, b, f);
  }
  float hash21(vec2 p) {
    p = fract(p * vec2(234.34, 435.345));
    p += dot(p, p + 34.23);
    return fract(p.x * p.y);
  }
  float vnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash21(i), hash21(i + vec2(1, 0)), f.x),
               mix(hash21(i + vec2(0, 1)), hash21(i + vec2(1, 1)), f.x), f.y);
  }
  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 4; i++) { v += a * vnoise(p); p = p * 2.03 + 17.7; a *= 0.5; }
    return v;
  }
`;

const fbUniforms = {
  uPrev:    { value: null },
  uTime:    { value: 0 },
  uTravel:  { value: 0 },     // log ズーム位相（吸い込み）
  uRot:     { value: 0 },     // パターン回転位相
  uSeg:     { value: 6 },
  uFringe:  { value: 0.22 },  // RGB の対称数ズレ
  uKick:    { value: 0 },
  uHatO:    { value: 0 },
  uAcid:    { value: 0 },
  uOver:    { value: 0 },
  uHue:     { value: 0 },
  uSeed:    { value: 0.37 },
  uDecay:   { value: 0.86 },  // トレイル減衰
  uZoomFb:  { value: 0.985 }, // 前フレームの縮小率（<1 = 中心へ吸い込む）
  uRotFb:   { value: 0.004 },
  uInvert:  { value: 0 },
  uOrganic: { value: 0 },     // 幾何(0) ↔ 有機(1)。セクションで往復
  uMotif:   { value: 0 },     // 写真モチーフの幻視ブレンド
  uUnfold:  { value: 0 },     // 万華鏡がほどけて写真の正体が現れる度合い
  uMotifTex:{ value: null },
  uTexel:   { value: new THREE.Vector2(1/512, 1/512) },
  uTwist:   { value: 0 },     // 半径ねじれ(回転モード 3)
  uRes:     { value: new THREE.Vector2(1, 1) },
};
const fbMat = new THREE.ShaderMaterial({
  uniforms: fbUniforms,
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D uPrev;
    uniform sampler2D uMotifTex;
    uniform float uTime, uTravel, uRot, uSeg, uFringe, uKick, uHatO, uAcid, uOver,
                  uHue, uSeed, uDecay, uZoomFb, uRotFb, uInvert, uOrganic, uMotif, uUnfold, uTwist;
    uniform vec2 uRes, uTexel;
    ${COMMON_GLSL}
    mat2 rot2(float a) { float c = cos(a), s = sin(a); return mat2(c, -s, s, c); }

    // 万華鏡フォールド + log リングのパターン（1 チャネルぶん）
    float kalePattern(vec2 p, float seg, float travel, float rotP) {
      float r = length(p);
      // uTwist = 半径ねじれ(回転モード 3): 中心と外周で回転角が変わりスパイラルに巻く
      float a = atan(p.y, p.x) + rotP + uTwist * log(max(r, 1e-4)) * 1.2;
      float w = 6.2831 / seg;
      a = mod(a, w); a = abs(a - w * 0.5);          // 1 ウェッジへ畳んで鏡映
      // log ズーム: 半径を log 空間のセルに割ると自己相似の吸い込みになる
      float lr = log(max(r, 1e-4)) * 2.2 - travel;
      vec2 q = vec2(a * seg * 0.8, lr);
      // ドメインワープ: 有機セクションでは格子座標が fbm でうねり、
      // 直線レイが蔦・触手のようにたわむ
      q += (vec2(fbm(q * 0.9 + uTime * 0.05), fbm(q * 0.9 - uTime * 0.04)) - 0.5) * uOrganic * 1.6;
      // 結晶格子: 細いネオンライン（リング×放射）+ fbm で割れ目
      float ring = smoothstep(0.10, 0.02, abs(fract(q.y) - 0.5));
      float ray  = smoothstep(0.12, 0.03, abs(fract(q.x * 1.5 + uSeed * 7.0) - 0.5));
      float lat = ring * 0.8 + ray * 0.55 + ring * ray * 1.4;
      float n = fbm(q * 1.7 + uSeed * 31.0);
      lat *= 0.45 + 0.9 * smoothstep(0.35, 0.75, n);
      // 結晶シャード: log セルごとにハッシュ配置した菱形。ウェッジの鏡映で
      // 万華鏡らしい「破片が対称に散る」見た目を作る主役
      vec2 sc = vec2(q.x * 1.5, q.y);
      vec2 cell = floor(sc);
      vec2 fc = fract(sc) - 0.5;
      float h = hash21(cell + floor(uSeed * 29.0));
      vec2 off = (vec2(hash21(cell + 1.7), hash21(cell + 9.1)) - 0.5) * 0.5;
      float dia = abs(fc.x - off.x) * 1.2 + abs(fc.y - off.y) * 1.6;
      float shard = smoothstep(0.34, 0.28, dia) * step(0.35, h);
      float shardEdge = smoothstep(0.06, 0.015, abs(dia - 0.3)) * step(0.35, h);
      lat += shard * (0.25 + 0.3 * h) + shardEdge * (0.7 + uAcid * 0.5);
      // アシッドのスクエルチで細部が湧く
      lat += smoothstep(0.86 - uAcid * 0.12, 0.97, n) * (0.35 + uAcid * 0.6);
      // 中心グロー（控えめ — フィードバックで育つぶんを見込む）
      lat += exp(-r * 3.2) * (0.22 + uKick * 0.6);
      return lat;
    }

    // 写真モチーフを折りたたんだ極座標でサンプリング（= 写真の万華鏡化）。
    // uUnfold が上がると素の写真に戻っていき「正体」が現れる
    float motifCh(vec2 p, float seg, float rotP, int ch) {
      float r = length(p);
      float a0 = atan(p.y, p.x) + rotP + uTwist * log(max(r, 1e-4)) * 1.2;
      float w = 6.2831 / seg;
      float a = mod(a0, w); a = abs(a - w * 0.5);
      vec2 kUv = 0.5 + vec2(cos(a), sin(a)) * r * 0.62;
      vec2 dUv = clamp(p * 0.62 + 0.5, 0.0, 1.0);
      vec3 c = texture2D(uMotifTex, clamp(mix(kUv, dUv, uUnfold), 0.0, 1.0)).rgb;
      return ch == 0 ? c.r : (ch == 1 ? c.g : c.b);
    }

    void main() {
      vec2 uv = vUv;
      vec2 p = (uv - 0.5) * vec2(uRes.x / uRes.y, 1.0);

      // --- フィードバック: 前フレームを回転 + 縮小して減衰合成（トレイル） ---
      // 液状メルト: トレイルの取り出し座標を fbm でずらす = 残像がドロドロ溶けて流れる
      vec2 melt = (vec2(fbm(uv * 3.0 + uTime * 0.13), fbm(uv * 3.0 - uTime * 0.11)) - 0.5)
                * (0.006 + uAcid * 0.02 + uOrganic * 0.012 + uOver * 0.022);
      vec2 fbP = rot2(uRotFb) * (uv - 0.5) * uZoomFb + 0.5 + melt;
      vec3 prev = texture2D(uPrev, fbP).rgb;
      // 反応拡散風: 有機セクションではラプラシアンで滲み育つ（珊瑚・菌糸の質感）
      if (uOrganic > 0.02) {
        vec3 nb = texture2D(uPrev, fbP + vec2(uTexel.x, 0.0)).rgb
                + texture2D(uPrev, fbP - vec2(uTexel.x, 0.0)).rgb
                + texture2D(uPrev, fbP + vec2(0.0, uTexel.y)).rgb
                + texture2D(uPrev, fbP - vec2(0.0, uTexel.y)).rgb;
        vec3 lap = nb * 0.25 - prev;
        prev += lap * 0.55 * uOrganic - 0.012 * uOrganic;
      }
      prev *= uDecay;
      // 中心への吸い込みで輝度が溜まるのを防ぐ（中心ほど強めに減衰）
      prev *= 0.94 + 0.06 * smoothstep(0.03, 0.35, length(p));

      // --- 万華鏡パターン: RGB でわずかに違う対称数 = 虹の縁取り ---
      float travel = uTravel;
      float rotP = uRot;
      vec3 pat;
      pat.r = kalePattern(p, uSeg,            travel, rotP);
      pat.g = kalePattern(p, uSeg + uFringe,  travel + 0.02, rotP - 0.01);
      pat.b = kalePattern(p, uSeg - uFringe,  travel - 0.02, rotP + 0.01);

      float lr = log(max(length(p), 1e-4)) * 2.2 - travel;
      // 幾何セクション = 虹パレット / 有機セクション = 生物発光系(緑・シアン・紫)
      vec3 tintGeo = pal(uHue + lr * 0.07 + uSeed * 0.5);
      vec3 tintBio = pal(uHue * 0.6 + lr * 0.05 + 0.28) * vec3(0.85, 1.05, 0.9);   // 鶯〜苔寄りに寄せる
      vec3 tint = mix(tintGeo, tintBio, uOrganic * 0.75);
      vec3 col = pat * tint * (0.42 + uKick * 0.45 + uHatO * 0.2 + uOver * 0.4);

      // --- 写真モチーフの幻視(切替フラッシュ / ブレイクダウンの日食リビール) ---
      if (uMotif > 0.004) {
        vec3 mo;
        mo.r = motifCh(p, uSeg,           uRot, 0);
        mo.g = motifCh(p, uSeg + uFringe, uRot, 1);
        mo.b = motifCh(p, uSeg - uFringe, uRot, 2);
        // 現行パレットでグレーディングしつつ原色も少し残して世界観を揃える
        float lum = dot(mo, vec3(0.299, 0.587, 0.114));
        vec3 graded = mix(mo, pal(uHue + lum * 0.6) * lum * 1.6, 0.45 * (1.0 - uUnfold));
        col = mix(col, graded * (0.8 + uKick * 0.3), uMotif);
      }

      col = max(prev, col);                       // トレイルは max 合成で残光らしく
      col = min(col, vec3(1.6));                  // 飽和の天井
      col = mix(col, 1.0 - min(col, vec3(1.0)), uInvert * 0.85);  // ネガ反転フラッシュ
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  depthTest: false, depthWrite: false,
});
const fbScene = new THREE.Scene();
fbScene.add(new THREE.Mesh(quadGeo, fbMat));

const postUniforms = {
  uTex:    { value: null },
  uTime:   { value: 0 },
  uGlitch: { value: 0 },
  uFlash:  { value: 0 },
  uSeed:   { value: 0.37 },
  uSwirl:  { value: 0 },     // 中心渦の強さ(LSD の回り込み)
  uBreath: { value: 0 },     // バレル呼吸(空間が脈打つ)
  uShear:  { value: 0 },     // 波シアー(横に波打つ)
  uCA:     { value: 0.004 }, // 放射色収差
  uSeg:    { value: 6 },     // ↓ 背景の面(ステンドグラス / 色霧)用
  uRot:    { value: 0 },
  uTwist:  { value: 0 },
  uTravel: { value: 0 },
  uHue:    { value: 0 },
  uBg:     { value: 0 },     // 面の量(0 = 黒の虚空)
  uBgFog:  { value: 0 },     // 面の質(0 = ステンドグラス / 1 = 色霧)
  uBgWhite:{ value: 0 },     // 白バック(減算合成)の量
  uRes:    { value: new THREE.Vector2(1, 1) },
};
const postMat = new THREE.ShaderMaterial({
  uniforms: postUniforms,
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D uTex;
    uniform float uTime, uGlitch, uFlash, uSeed, uSwirl, uBreath, uShear;
    uniform float uCA, uSeg, uRot, uTwist, uTravel, uHue, uBg, uBgFog, uBgWhite;
    uniform vec2 uRes;
    ${COMMON_GLSL}
    // 背景の面: 万華鏡セルを色ガラスとして塗る(ステンドグラス) or 色霧ウォッシュ。
    // フィードバックの外(ポスト)で足すので、動いても濁らず常に鮮明
    vec3 kaleFieldCol(vec2 p) {
      float r = length(p);
      float a = atan(p.y, p.x) + uRot * 0.7 + uTwist * log(max(r, 1e-4)) * 1.2;
      float w = 6.2831 / uSeg;
      a = mod(a, w); a = abs(a - w * 0.5);
      float lr = log(max(r, 1e-4)) * 2.2 - uTravel;
      vec2 sc = vec2(a * uSeg * 1.2, lr);
      vec2 cell = floor(sc);
      float h = hash21(cell + floor(uSeed * 23.0));
      vec3 glass = pal(uHue + h * 0.9 + lr * 0.04) * (0.2 + 0.28 * h);
      float fog = fbm(sc * 0.8 + uSeed * 11.0 + uTime * 0.03);
      vec3 fogCol = pal(uHue + fog * 0.5 + 0.3) * (0.1 + fog * 0.28);
      return mix(glass, fogCol, uBgFog);
    }
    void main() {
      vec2 uv = vUv;
      vec2 d0 = uv - 0.5;
      float r0 = length(d0);
      // 中心渦(LSD の回り込み): 中心ほど強くねじれる
      float ang = atan(d0.y, d0.x) + uSwirl * (1.0 - r0) * (1.0 - r0);
      // バレル呼吸: 空間が同心円状に脈打つ
      float rr = r0 * (1.0 + uBreath * sin(r0 * 9.0 - uTime * 2.4));
      uv = 0.5 + vec2(cos(ang), sin(ang)) * rr;
      // 波シアー: 横に波打つ
      uv.x += sin(uv.y * 26.0 + uTime * 3.1) * uShear;
      // グリッチ: 水平スライスずれ + モザイク
      if (uGlitch > 0.01) {
        float band = floor(uv.y * 14.0 + uSeed * 40.0);
        float sh = (hash21(vec2(band, uSeed * 91.0)) - 0.5) * 0.22 * uGlitch;
        uv.x += sh;
        if (hash21(vec2(band, uSeed * 17.0)) < 0.25 * uGlitch) {
          vec2 cell = vec2(26.0, 15.0);
          uv = (floor(uv * cell) + 0.5) / cell;
        }
      }
      // 放射色収差: RGB を半径方向に裂く
      vec2 ca = d0 * uCA;
      vec3 col;
      col.r = texture2D(uTex, uv + ca).r;
      col.g = texture2D(uTex, uv).g;
      col.b = texture2D(uTex, uv - ca).b;
      // 背景の面を下敷きに(歪んだ後の uv 基準 = 渦・呼吸も面に掛かる)
      vec2 p2 = (uv - 0.5) * vec2(uRes.x / uRes.y, 1.0);
      vec3 field = kaleFieldCol(p2);
      vec3 colAdd = 1.0 - exp(-(col + field * uBg) * 1.25);   // 通常: 加算 + トーンマップ
      // 白バック: 生成りの和紙に伝統色の柄を「そのまま刷る」染め物式。
      // (減算だと補色に反転して洋風パステルになるため、mix で色相を保つ)
      vec3 paper = vec3(0.95, 0.93, 0.87);
      vec3 paperT = mix(paper, clamp(field * 2.2, 0.0, 1.0), 0.3 * uBg + 0.18);
      float inkA = clamp(dot(col, vec3(0.299, 0.587, 0.114)) * 1.5, 0.0, 1.0);
      vec3 colWhite = mix(paperT, clamp(col, 0.0, 1.0) * 0.8, inkA) - uFlash * 0.3;
      vec3 outCol = mix(colAdd, colWhite, uBgWhite);
      // 彩度圧縮(伝統色自体が渋いので軽めに)。0.78 が現在のノブ
      float lum2 = dot(outCol, vec3(0.299, 0.587, 0.114));
      outCol = mix(vec3(lum2), outCol, 0.78);
      // ビネット(白バックでは弱める)
      outCol *= 1.0 - dot(d0, d0) * mix(0.9, 0.3, uBgWhite);
      // フラッシュ(白バック中は暗転側で処理済み)。青白でなく温白に
      outCol += uFlash * vec3(1.0, 0.95, 0.85) * 0.5 * (1.0 - uBgWhite);
      // 白黒の両極を和らげる: 純黒 → 墨、白飛び → 生成りへ(伝統色の世界に両極を収める)
      outCol = vec3(0.075, 0.068, 0.060) + outCol * vec3(0.88, 0.87, 0.83);
      gl_FragColor = vec4(outCol, 1.0);
    }
  `,
  depthTest: false, depthWrite: false,
});
const postScene = new THREE.Scene();
postScene.add(new THREE.Mesh(quadGeo, postMat));

/* ---------- 写真モチーフのテクスチャ（自家生成 NanoBanana Pro・assets/11-motifs/） ---------- */
const texLoader = new THREE.TextureLoader();
const MOTIF_FILES = ['eclipse', 'iris', 'jellyfish', 'nebula', 'koi', 'lotus', 'ripple', 'momiji'];   // 0 = 日食(ブレイクダウンの主役)。4〜7 = 和モチーフ(伝統色に合わせ追加)
const motifTexs = MOTIF_FILES.map((n) => {
  const t = texLoader.load(`assets/11-motifs/${n}.jpg`);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
});
// 写真 D&D: 落とした画像がフラッシュ枠のモチーフになる(02 の前例。日食は温存)
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
  e.preventDefault();
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!f || !f.type.startsWith('image/')) return;
  const url = URL.createObjectURL(f);
  texLoader.load(url, (t) => {
    t.colorSpace = THREE.SRGBColorSpace;
    for (let i = 1; i < motifTexs.length; i++) motifTexs[i] = t;   // フラッシュ枠を全部差し替え
    URL.revokeObjectURL(url);
  });
});

/* ---------- 入力（マウス = 回転/ズームバイアス・ホイール = ズーム倍率） ---------- */
let mx = 0, myUp = 0, steerX = 0, steerY = 0, speedMult = 1;
window.addEventListener('pointermove', (e) => {   // touch でもドラッグで steer できるように(Codex 指摘)
  mx = (e.clientX / window.innerWidth - 0.5) * 2;
  myUp = (0.5 - e.clientY / window.innerHeight) * 2;
});
window.addEventListener('wheel', (e) => {
  speedMult = Math.min(2, Math.max(0.5, speedMult * (e.deltaY > 0 ? 0.92 : 1.08)));
}, { passive: true });
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  rtA.dispose(); rtB.dispose();
  rtA = makeRT(); rtB = makeRT();
  // 未初期化テクスチャの一瞬ノイズを防ぐ(Codex 指摘)
  for (const rt of [rtA, rtB]) { renderer.setRenderTarget(rt); renderer.clear(); }
  renderer.setRenderTarget(null);
});

/* ---------- メインループ ---------- */
let travel = 0, rotPhase = 0, zoomSpeed = BEATS_PER_SEC * 0.22, lastT = performance.now() / 1000;
let organicAmt = 0, motifAmt = 0, unfoldAmt = 0;
let rotSnap = 0, rotSnapS = 0, twistS = 0, lastKickSeen = -10;   // 回転モード用
let bgAmt = 0, bgFogAmt = 0, bgWhiteAmt = 0;   // 背景モードの滑らか追従
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now() / 1000;
  const dt = Math.min(now - lastT, 0.05);
  lastT = now;

  tickSilent(now);
  updateCount(now);
  state.flash *= Math.exp(-dt * 2.8);
  state.invert *= Math.exp(-dt * 7.0);   // ネガ反転は一瞬で抜ける

  // オーバードライブ包絡線（急峻ズームサージ）
  const oSince = now - state.overStart;
  let over = 0;
  if (oSince >= 0 && oSince < state.overDur) {
    over = Math.min(Math.min(1, oSince / 0.2), Math.min(1, (state.overDur - oSince) / 0.7));
  }

  const preGo = now < countEnd;
  // スピード狂仕様: 基礎倍率 0.32 → 0.5(ユーザー裁定「サイケデリック感とスピード」)
  const target = state.paused ? 0
    : BEATS_PER_SEC * (preGo ? 0.22 : ARR[state.section].spd * 0.5 * speedMult) * (1 + over * 1.6);
  zoomSpeed += (target - zoomSpeed) * Math.min(1, dt * 3);

  const kickEnv = Math.exp(-(now - state.lastKick) * 6.5) * state.kickW;
  const hatOEnv = Math.exp(-(now - state.lastHatO) * 9.0) * state.hatOW;
  const acidEnv = Math.exp(-(now - state.lastAcid) * 7.0) * state.acidW;

  travel += zoomSpeed * dt * (1 + kickEnv * 0.6);
  // 回転モード(segCut で抽選): 0=連続 / 1=振り子 / 2=キックスナップ / 3=スパイラルねじれ
  const rotSpeed = (0.22 + acidEnv * 0.35 + hatOEnv * 0.4 + over * 0.5) * (1 + steerX * 0.9);
  if (state.rotMode === 1) {
    rotPhase += state.rotDir * dt * rotSpeed * Math.sin(now * 0.9) * 1.7;   // 揺れ戻る振り子
  } else {
    rotPhase += state.rotDir * dt * rotSpeed;
  }
  if (state.lastKick !== lastKickSeen) {   // キックごとに 1 回だけ発火
    lastKickSeen = state.lastKick;
    if (state.rotMode === 2) {
      rotSnap += (Math.random() < 0.5 ? -1 : 1) * (Math.PI / state.seg) * (1 + Math.floor(Math.random() * 2));
    }
  }
  rotSnapS += (rotSnap - rotSnapS) * Math.min(1, dt * 11);   // スナップはバキッと追従
  const twistTarget = state.rotMode === 3 ? state.rotDir * (0.3 + 0.18 * Math.sin(now * 0.35)) : 0;
  twistS += (twistTarget - twistS) * Math.min(1, dt * 1.6);
  steerX += (mx - steerX) * Math.min(1, dt * 2.5);
  steerY += (myUp - steerY) * Math.min(1, dt * 2.5);

  const w = renderer.domElement.width, h = renderer.domElement.height;
  fbUniforms.uRes.value.set(w, h);
  postUniforms.uRes.value.set(w, h);
  fbUniforms.uPrev.value = rtA.texture;
  fbUniforms.uTime.value = now;
  fbUniforms.uTravel.value = travel;
  fbUniforms.uRot.value = rotPhase + rotSnapS;
  fbUniforms.uTwist.value = twistS;
  fbUniforms.uSeg.value = state.seg;
  fbUniforms.uFringe.value = state.segFringe;
  fbUniforms.uKick.value = kickEnv;
  fbUniforms.uHatO.value = hatOEnv;
  fbUniforms.uAcid.value = acidEnv;
  fbUniforms.uOver.value = over;
  fbUniforms.uHue.value = now * 0.045 + state.section * 0.21;   // 色相は速く回す(LSD)
  fbUniforms.uSeed.value = state.seed;
  // ブレイクダウンはトレイル長め + ズーム方向がマウス Y で行き来
  const isBD = state.section === 4;
  fbUniforms.uDecay.value = isBD ? 0.93 : 0.86;
  fbUniforms.uZoomFb.value = 0.985 - kickEnv * 0.025 + steerY * 0.006;   // キックの吸い込みを深く
  fbUniforms.uRotFb.value = state.rotDir * (0.003 + hatOEnv * 0.004);
  fbUniforms.uInvert.value = Math.min(1, state.invert);
  // 幾何 ↔ 有機の往復(セクションの org 値へゆっくり寄せる)
  organicAmt += (ARR[state.section].org - organicAmt) * Math.min(1, dt * 1.2);
  fbUniforms.uOrganic.value = organicAmt;
  // 写真モチーフの幻視包絡線 + 日食のほどけ(unfold)
  const mIn = now < state.motifUntil;
  motifAmt += ((mIn ? 1 : 0) - motifAmt) * Math.min(1, dt * 7);
  let unfoldT = 0;
  if (mIn) {
    if (state.motifIdx === 0 && state.motifUnfoldLen > 0) {
      unfoldT = Math.min(1, (now - state.motifStart) / state.motifUnfoldLen);   // 日食: 8 小節かけて全開
    } else {
      unfoldT = 0.45;   // フラッシュも薄くほどく = 正体が読める(露出増で 0.3→0.45)
    }
  }
  unfoldAmt += (unfoldT - unfoldAmt) * Math.min(1, dt * 4);
  fbUniforms.uMotif.value = motifAmt;
  fbUniforms.uUnfold.value = unfoldAmt;
  fbUniforms.uMotifTex.value = motifTexs[state.motifIdx] || motifTexs[0];
  fbUniforms.uTexel.value.set(1 / rtA.width, 1 / rtA.height);

  renderer.setRenderTarget(rtB);
  renderer.render(fbScene, quadCam);

  postUniforms.uTex.value = rtB.texture;
  postUniforms.uTime.value = now;
  postUniforms.uGlitch.value = Math.exp(-(now - state.lastKick) * 6.5) * state.glitch;
  postUniforms.uFlash.value = state.flash;
  postUniforms.uSeed.value = state.seed;
  // LSD × スピードの歪みパッケージ(アシッドで渦・キックで呼吸・オーバードライブで全部)
  postUniforms.uSwirl.value = Math.sin(now * 0.6) * (0.25 + acidEnv * 0.5 + over * 1.1) * state.rotDir;
  postUniforms.uBreath.value = 0.015 + kickEnv * 0.05 + over * 0.04;
  postUniforms.uShear.value = acidEnv * 0.005 + over * 0.011;
  postUniforms.uCA.value = 0.004 + kickEnv * 0.012 + over * 0.02 + organicAmt * 0.006;
  // 背景の面(黒 / ステンドグラス / 色霧 / 白)— フィードバック外・ポストで合成
  bgAmt += (((state.bgMode === 1 || state.bgMode === 2) ? 1 : 0) - bgAmt) * Math.min(1, dt * 2.2);
  bgFogAmt += ((state.bgMode === 2 ? 1 : 0) - bgFogAmt) * Math.min(1, dt * 2.2);
  bgWhiteAmt += ((state.bgMode === 3 ? 1 : 0) - bgWhiteAmt) * Math.min(1, dt * 2.2);
  postUniforms.uBgWhite.value = bgWhiteAmt;
  postUniforms.uSeg.value = state.seg;
  postUniforms.uRot.value = rotPhase + rotSnapS;
  postUniforms.uTwist.value = twistS;
  postUniforms.uTravel.value = travel;
  postUniforms.uHue.value = fbUniforms.uHue.value;
  postUniforms.uBg.value = bgAmt * (0.85 + kickEnv * 0.3);
  postUniforms.uBgFog.value = bgFogAmt;
  renderer.setRenderTarget(null);
  renderer.render(postScene, quadCam);

  const tmp = rtA; rtA = rtB; rtB = tmp;   // ping-pong
}
frame();
</script>
</body>
</html>
